<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<header class="bg-slate-900 text-white shadow-lg p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400">総合演習Ⅰ 過去問マスター</h1>
        <select id="global-year" class="bg-slate-800 text-teal-300 text-sm px-3 py-1 rounded-lg" onchange="filterQuestionsByYear(this.value)">
            <option value="2025">2025年度</option>
            <option value="all">全年度ミックス</option>
        </select>
    </div>
</header>

<main class="max-w-5xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="space-y-6">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black mb-3">出題モード</h3>
            <div class="space-y-2">
                <button class="w-full text-left p-3 rounded-lg border-2 border-teal-500 bg-teal-50 text-sm font-bold" onclick="setMode('normal')">通常（順次）</button>
                <button class="w-full text-left p-3 rounded-lg border border-slate-200 text-sm font-bold" onclick="setMode('random15')">ランダム15問</button>
            </div>
        </div>
    </div>

    <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
        <p id="problem-text" class="text-lg font-bold mb-6">読み込み中...</p>
        <div id="options-wrap" class="space-y-3"></div>
        <div id="correction-box" class="mt-6 p-4 rounded-xl border hidden"></div>
        <div class="flex justify-between mt-8">
            <button class="px-6 py-2 bg-slate-200 rounded-lg font-bold" onclick="goToPrev()">前へ</button>
            <button id="btn-reveal" class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold" onclick="revealAnswer()">正解・解説</button>
            <button class="px-6 py-2 bg-teal-500 text-white rounded-lg font-bold" onclick="goToNext()">次へ</button>
        </div>
    </div>
</main>

<script>
    // サンプルデータ（外部ファイルがない場合でも動くようにしました）
    let masterQuestions = [
        { id: 'q1', year: '2025', num: 1, text: '薬学の基礎となる学問はどれか？', options: ['生薬学', '歴史学', '経済学', '天文学'], answer: 0, explanation: '薬学の根幹は生薬学です。' }
    ];
    let currentQuestions = [], currentIdx = 0, mode = 'normal';

    function initializeApp() {
        filterQuestionsByYear('2025');
    }

    function filterQuestionsByYear(year) {
        currentQuestions = masterQuestions.filter(q => q.year === year);
        loadQuestion(0);
    }

    function loadQuestion(idx) {
        currentIdx = idx;
        const q = currentQuestions[idx];
        document.getElementById('problem-text').innerText = q.text;
        const wrap = document.getElementById('options-wrap');
        wrap.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 font-bold text-sm";
            btn.innerText = (i+1) + ": " + opt;
            btn.onclick = () => revealAnswer(i === q.answer, i);
            wrap.appendChild(btn);
        });
        document.getElementById('correction-box').classList.add('hidden');
    }

    function revealAnswer(isCorrect, chosenIdx) {
        const box = document.getElementById('correction-box');
        box.classList.remove('hidden');
        box.className = `mt-6 p-4 rounded-xl border ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`;
        box.innerHTML = `<div>${isCorrect ? '正解！' : '不正解...'}</div><button onclick="markAsWrong()" class="mt-2 text-xs text-rose-600 underline">この問題を間違いリストに追加</button>`;
    }

    function markAsWrong() {
        alert("「間違い」としてローカルストレージに記録しました");
    }

    function goToNext() { if(currentIdx < currentQuestions.length -1) loadQuestion(currentIdx + 1); }
    function goToPrev() { if(currentIdx > 0) loadQuestion(currentIdx - 1); }

    window.onload = initializeApp;
</script>
</body>
</html>
