<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <script src="https://cdn.tailwindcss.com\"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, \"Helvetica Neue\", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-16">

<header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-6 text-center">
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">総合演習Ⅰ 過去問マスター</h1>
        <p class="text-xs text-slate-400 mt-2 font-medium tracking-wide">
            局方・生薬・生物・衛生・薬理・薬剤・法規・実務 (Ver 6.0)
        </p>
    </div>
</header>

<main class="flex-grow max-w-3xl w-full mx-auto px-4 py-6">
    <div id="quiz-panel" class="panel space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <span id="question-meta" class="text-xs font-bold tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">LOADING...</span>
                <span id="question-progress" class="text-xs font-semibold text-slate-400">0 / 0</span>
            </div>
            <div id="question-text" class="text-base md:text-lg font-bold text-slate-800 leading-relaxed mb-6 whitespace-pre-wrap">
                問題を読み込んでいます...
            </div>
            <div id="options-container" class="space-y-3">
                </div>
        </div>

        <div id="explanation-container" class="hidden bg-white rounded-2xl shadow-sm p-6 border border-slate-100 space-y-4">
            <div class="flex items-center gap-2">
                <div id="result-badge" class="font-black px-4 py-1.5 rounded-xl text-sm tracking-wide"></div>
                <div id="correct-answer-display" class="text-sm font-bold text-slate-600"></div>
            </div>
            <div class="border-t border-slate-100 pt-4">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">解説</h4>
                <p id="explanation-text" class="text-sm md:text-base text-slate-600 leading-relaxed whitespace-pre-wrap"></p>
            </div>
            <button onclick="nextQuestion()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm text-sm tracking-wide mt-2">
                次の問題へ
            </button>
        </div>
    </div>

    <div id="stats-panel" class="panel hidden space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1 h-5 bg-indigo-600 rounded-full"></span>総合進捗・正答率
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 rounded-xl p-4 text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">総解答回数</p>
                    <p id="stat-total-attempts" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div class="bg-slate-50 rounded-xl p-4 text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">総合正答率</p>
                    <p id="stat-overall-accuracy" class="text-2xl font-black text-slate-800">0%</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <span class="w-1 h-5 bg-rose-500 rounded-full"></span>要復習リスト（弱点補強）
            </h3>
            <p class="text-xs text-slate-400 mb-4">直近で間違えた問題がここに自動蓄積されます。右側のボタンからピンポイントで特訓可能です。</p>
            <div id="weak-questions-list" class="space-y-3 max-h-96 overflow-y-auto pr-1">
                </div>
        </div>
    </div>

    <div id="settings-panel" class="panel hidden space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 space-y-6">
            <div>
                <h3 class="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="w-1 h-5 bg-indigo-600 rounded-full"></span>1. 出題対象の年度
                </h3>
                <div class="flex flex-wrap gap-3">
                    <label class="flex items-center gap-2 bg-slate-50 hover:bg-slate-100 px-4 py-2.5 rounded-xl cursor-pointer border border-slate-200 transition text-sm font-semibold">
                        <input type="checkbox" name="setting-year" value="2019" checked onchange="initQuizFlow()" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> 2019年
                    </label>
                    <label class="flex items-center gap-2 bg-slate-50 hover:bg-slate-100 px-4 py-2.5 rounded-xl cursor-pointer border border-slate-200 transition text-sm font-semibold">
                        <input type="checkbox" name="setting-year" value="2021" checked onchange="initQuizFlow()" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> 2021年
                    </label>
                    <label class="flex items-center gap-2 bg-slate-50 hover:bg-slate-100 px-4 py-2.5 rounded-xl cursor-pointer border border-slate-200 transition text-sm font-semibold">
                        <input type="checkbox" name="setting-year" value="2022" checked onchange="initQuizFlow()" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> 2022年
                    </label>
                    <label class="flex items-center gap-2 bg-slate-50 hover:bg-slate-100 px-4 py-2.5 rounded-xl cursor-pointer border border-slate-200 transition text-sm font-semibold">
                        <input type="checkbox" name="setting-year" value="2023" checked onchange="initQuizFlow()" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> 2023年
                    </label>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="w-1 h-5 bg-indigo-600 rounded-full"></span>2. 出題モード
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <button id="mode-btn-normal" onclick="changePlayMode('normal')" class="flex flex-col text-left p-4 rounded-xl border-2 transition duration-150">
                        <span class="font-bold text-sm">通常モード</span>
                        <span class="text-xs text-slate-400 mt-1">選択した年度の問題を番号順にすべて解きます。</span>
                    </button>
                    <button id="mode-btn-random" onclick="changePlayMode('random')" class="flex flex-col text-left p-4 rounded-xl border-2 transition duration-150">
                        <span class="font-bold text-sm">ランダム全問</span>
                        <span class="text-xs text-slate-400 mt-1">選択した年度の問題をシャッフルしてすべて解きます。</span>
                    </button>
                    <button id="mode-btn-quick" onclick="changePlayMode('quick')" class="flex flex-col text-left p-4 rounded-xl border-2 transition duration-150">
                        <span class="font-bold text-sm">15問クイックテスト</span>
                        <span class="text-xs text-slate-400 mt-1">対象問題からランダムで15問だけ抽出し、ミニテストを行います。</span>
                    </button>
                    <button id="mode-btn-weak" onclick="changePlayMode('weak')" class="flex flex-col text-left p-4 rounded-xl border-2 transition duration-150">
                        <span class="font-bold text-sm">弱点補強モード</span>
                        <span class="text-xs text-slate-400 mt-1">要復習リスト（現在間違えている問題）からのみ出題します。</span>
                    </button>
                </div>
            </div>

            <div class="border-t border-slate-100 pt-6">
                <h3 class="text-sm font-bold text-rose-600 mb-2 uppercase tracking-wider">Danger Zone</h3>
                <button onclick="clearAllData()" class="bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 font-bold py-2.5 px-4 rounded-xl transition text-xs tracking-wide">
                    すべての解答データ・弱点リストをリセットする
                </button>
            </div>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-50">
    <div class="max-w-3xl mx-auto flex justify-around">
        <button id="nav-quiz" onclick="switchTab('quiz')" class="flex flex-col items-center justify-center py-3 w-full text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            <span class="text-[10px] font-bold tracking-wider">問題演習</span>
        </button>
        <button id="nav-stats" onclick="switchTab('stats')" class="flex flex-col items-center justify-center py-3 w-full text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path></svg>
            <span class="text-[10px] font-bold tracking-wider">個人成績</span>
        </button>
        <button id="nav-settings" onclick="switchTab('settings')" class="flex flex-col items-center justify-center py-3 w-full text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold tracking-wider">出題設定</span>
        </button>
    </div>
</nav>

<script>
    // ==========================================
    // 過去問マスターデータ (2019, 2021, 2022, 2023)
    // ==========================================
    const quizData = [
        // --- 2019年度 総合演習Ⅰ（追加分） ---
        {
            id: "2019_q1",
            year: "2019",
            num: 1,
            text: "【正誤問題】冷所は、別に規定するもののほか4℃以下の場所とする。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。日本薬局方（日局）通則において、「冷所」とは別に規定するもののほか、1〜15℃の場所を指します。4℃以下ではありません。"
        },
        {
            id: "2019_q2",
            year: "2019",
            num: 2,
            text: "【正誤問題】医薬品の試験操作において、「直ちに」とあるのは、通例、前の操作の終了から30分以内に次の操作を開始することを意味する。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。日局通則において、「直ちに」とあるのは、通例、前の操作の終了から「30秒以内」に次の操作を開始することを意味します。30分以内ではありません。"
        },
        {
            id: "2019_q3",
            year: "2019",
            num: 3,
            text: "【正誤問題】日本薬局方の医薬品名の次に ( ) で分子式又は組成式をつけたものは、化学的純物質を意味する。",
            options: ["1. 正", "2. 誤"],
            answer: 0,
            explanation: "正しい。日局通則の規定通り、医薬品名の次に（）で分子式または組成式を記載しているものは、それが化学的純物質であることを示しています。"
        },
        {
            id: "2019_q4",
            year: "2019",
            num: 4,
            text: "【正誤問題】性状の項に記載されている融点は、適否の判定基準にならない。",
            options: ["1. 正", "2. 誤"],
            answer: 0,
            explanation: "正しい。日局において「性状」の項に記載されている融点、沸点、溶解度などの記述は、原則として参考値であり、医薬品の適否の絶対的な判定基準にはなりません。"
        },
        {
            id: "2019_q5",
            year: "2019",
            num: 5,
            text: "【正誤問題】単位 ppm は日本薬局方では質量百万分率を示す。",
            options: ["1. 正", "2. 誤"],
            answer: 0,
            explanation: "正しい。日局通則において、ppm（parts per million）は「質量百万分率」を示すと明確に規定されています。"
        },
        {
            id: "2019_q6",
            year: "2019",
            num: 6,
            text: "【正誤問題】気密容器の規定がある場合には、密閉容器を用いることができる。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。容器の密閉性の厳しさは【密封容器 ＞ 気密容器 ＞ 密閉容器】の順です。そのため、気密容器の規定がある場合に、それより密閉性の低い「密閉容器」で代用することはできません。"
        },
        {
            id: "2019_q7",
            year: "2019",
            num: 7,
            text: "【正誤問題】確認試験は、医薬品又は医薬品中に含有されている主成分などを、その特性に基づいて調べるために必要な試験である。",
            options: ["1. 正", "2. 誤"],
            answer: 0,
            explanation: "正しい。日局一般試験法における「確認試験」の定義そのものです。医薬品またはその主成分を、その化学的・物理的特性に基づいて識別・確認するために行われます。"
        },
        {
            id: "2019_q8",
            year: "2019",
            num: 8,
            text: "【正誤問題】放射線照射滅菌法で通常用いられる放射線源は、60Coなどのベータ線である。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。放射線照射滅菌法において、コバルト60（60Co）などの放射性同位元素から得られるのは「ガンマ線（γ線）」です。ベータ線ではありません。"
        },
        {
            id: "2019_q9",
            year: "2019",
            num: 9,
            text: "【正誤問題】無菌操作とは、最終滅菌法を適用して無菌医薬品を製造するために行う操作のことをいう。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。無菌操作法は、「最終滅菌法（加熱など）が適用できない」熱に不安定な医薬品などを製造するために、あらかじめ滅菌された原材料や器具を用い、無菌化された環境下で調製・充填を行う操作を指します。"
        },
        {
            id: "2019_q10",
            year: "2019",
            num: 10,
            text: "【正誤問題】高周波滅菌法は、熱に不安定な物質に適した滅菌法である。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。高周波滅菌法は、高周波を照射することで物質内部の分子を振動させ、その「摩擦熱（加熱）」によって微生物を死滅させる方法です。加熱を伴うため、熱に不安定な物質には適していません。"
        },
        {
            id: "2019_q11",
            year: "2019",
            num: 11,
            text: "【正誤問題】エンドトキシン試験は、エンドトキシンがカブトガニの血球抽出成分より調製されたライセート試薬を溶解させる反応に基づく。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。エンドトキシン試験法は、エンドトキシンがカブトガニの血球抽出成分（ライセート試薬）の凝固酵素系を活性化させ、「ゲル化」または「凝集」を誘発する反応に基づきます。「溶解」させるわけではありません。"
        },
        {
            id: "2019_q12",
            year: "2019",
            num: 12,
            text: "【正誤問題】0.05gを正確に量る場合、適切なはかりを用いて 0.045~0.054gを量る。",
            options: ["1. 正", "2. 誤"],
            answer: 1,
            explanation: "誤り。日局通則において「正確に量る」とは、記載された桁数の1つ下の位まで考慮し、例えば 0.05g を正確に量る場合は「0.045〜0.055g」の範囲内で量ることを意味します。問題文の「0.054g」という範囲指定は誤りです。"
        },
        {
            id: "2019_q61",
            year: "2019",
            num: 61,
            text: "ヒトの細胞でパルミチン酸 (C16:0) が酸化を受けるのはどこか。",
            options: ["1. 核", "2. ゴルジ体", "3. 細胞質", "4. 小胞体", "5. ミトコンドリア"],
            answer: 4,
            explanation: "正解は 5。パルミチン酸などの長鎖脂肪酸が酸化されてアセチルCoAを生じる「β酸化」の主要な代謝経路は、細胞内の【ミトコンドリア】のマトリックスに存在します。"
        },
        {
            id: "2019_q62",
            year: "2019",
            num: 62,
            text: "原核生物はどれか。",
            options: ["1. 赤痢アメーバ", "2. インフルエンザウイルス", "3. 皮膚糸状菌", "4. 黄色ブドウ球菌", "5. マラリア原虫"],
            answer: 3,
            explanation: "正解は 4。細菌（バクテリア）である【黄色ブドウ球菌】は核膜を持たない原核生物です。赤痢アメーバやマラリア原虫は単細胞の真核生物（原生生物）、皮膚糸状菌は真菌（真核生物）です。"
        },
        {
            id: "2019_q63",
            year: "2019",
            num: 63,
            text: "n-3系脂肪酸はどれか。",
            options: ["1. アラキドン酸", "2. オレイン酸", "3. リノール酸", "4. α-リノレン酸", "5. γ-リノレン酸"],
            answer: 3,
            explanation: "正解は 4。【α-リノレン酸】はメチル末端（n末端）から数えて3番目の炭素に最初の二重結合を持つn-3系（ω-3系）不飽和脂肪酸です。"
        },
        {
            id: "2019_q64",
            year: "2019",
            num: 64,
            text: "真核細胞でのmRNAのプロセシングによる成熟過程において、イントロンの除去に関わるのはどれか。",
            options: ["1. オートファゴソーム", "2. スプライソソーム", "3. ヌクレオソーム", "4. プロテアソーム", "5. リソソーム"],
            answer: 1,
            explanation: "正解は 2。転写されたばかりのmRNA前駆体から不要な配列（イントロン）を切り捨て、必要な配列（エキソン）を繋ぎ合わせる「スプライシング」を行う巨大なRNA-タンパク質複合体を【スプライソソーム】と呼びます。"
        },
        {
            id: "2019_q65",
            year: "2019",
            num: 65,
            text: "翻訳過程において、リボソームへアミノ酸を運ぶ役割を担うRNAはどれか。",
            options: ["1. mRNA (メッセンジャーRNA)", "2. miRNA (マイクロRNA)", "3. rRNA (リボソームRNA)", "4. tRNA (トランスファーRNA)", "5. siRNA (低分子干渉RNA)"],
            answer: 3,
            explanation: "正解は 4。【tRNA（トランスファーRNA / 転移RNA）】は、自身のアンチコドンに対応する特定のアミノ酸と結合し、タンパク質合成の場であるリボソームへとそのアミノ酸を運搬する役割を担います。"
        },
        {
            id: "2019_q66",
            year: "2019",
            num: 66,
            text: "セロトニンの生合成の前駆体はどれか。",
            options: ["1. アラキドン酸", "2. コリン", "3. L-チロシン", "4. L-トリプトファン", "5. L-ヒスチジン"],
            answer: 3,
            explanation: "正解は 4。神経伝伝達物質であるセロトニン（5-ヒドロキシトリプタミン）は、必須アミノ酸である【L-トリプトファン】から水酸化および脱炭酸反応を経て生合成されます。"
        },

        // --- 2023年度 ---
        {
            id: "2023_q1",
            year: "2023",
            num: 1,
            text: "【第17改正日本薬局方 通則】に記載されている「常温」の温度範囲として、正しいものはどれか。",
            options: ["1. 15〜25℃", "2. 15〜30℃", "3. 15〜35℃", "4. 20〜25℃", "5. 20〜30℃"],
            answer: 0,
            explanation: "正解は 1。日本薬局方通則における温度定義は以下の通りです：\n・標準温度：20℃\n・常温：15〜25℃\n・室温：1〜30℃\n・微温：30〜40℃"
        },
        {
            id: "2023_q2",
            year: "2023",
            num: 2,
            text: "生薬マオウ（麻黄）の基原植物の学名（Ephedra sinica）において、属名を示す部分はどれか。",
            options: ["1. Ephedra", "2. sinica", "3. Ephedra sinica", "4. sinica Ephedra"],
            answer: 0,
            explanation: "正解は 1。二名法による学名では、最初の単語（大文字で始まる）が「属名」、2番目の単語（小文字で始まる）が「種小名」を表します。"
        },

        // --- 2022年度 ---
        {
            id: "2022_q1",
            year: "2022",
            num: 1,
            text: "生薬シャクヤク（芍薬）の主要な有効成分として知られるモノテルペン配糖体はどれか。",
            options: ["1. グリチルリチン", "2. ペオニフロリン", "3. ゲンチオピクシド", "4. センノシド"],
            answer: 1,
            explanation: "正解は 2。シャクヤク（芍薬）の根に含まれる主要成分は「ペオニフロリン (Paeoniflorin)」であり、鎮痛・鎮痙作用を持ちます。グリチルリチンはカンゾウ、センノシドはセンナの成分です。"
        },

        // --- 2021年度 ---
        {
            id: "2021_q1",
            year: "2021",
            num: 1,
            text: "真核細胞の細胞内小器官のうち、独自のDNAを持ち、独自の電子伝達系を駆動してATPを産生する器官はどれか。",
            options: ["1. リソソーム", "2. ゴルジ体", "3. ミトコンドリア", "4. 小胞体"],
            answer: 2,
            explanation: "正解は 3。ミトコンドリアは細胞内のエネルギー産生の中心であり、独自のミトコンドリアDNA（mtDNA）を保有しています。"
        }
    ];

    // ==========================================
    // アプリケーション制御ロジック
    // ==========================================
    const STORAGE_KEY = 'yakugaku_quiz_progress_v6';
    let activeQuestions = [];
    let currentIdx = 0;
    let playMode = 'normal'; // normal, random, quick, weak
    let isAnswered = false;

    // タブ切り替えシステム
    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        document.getElementById(`${tabId}-panel`).classList.remove('hidden');

        document.querySelectorAll('nav button').forEach(b => {
            b.classList.remove('text-indigo-600', 'border-t-2', 'border-indigo-600', 'bg-slate-50/50');
            b.classList.add('text-slate-400');
        });

        const activeNav = document.getElementById(`nav-${tabId}`);
        if (activeNav) {
            activeNav.classList.remove('text-slate-400');
            activeNav.classList.add('text-indigo-600', 'border-t-2', 'border-indigo-600', 'bg-slate-50/50');
        }

        if (tabId === 'stats') {
            updateStatsPanel();
        }
    }

    // 選択された年度の取得
    function getSelectedYears() {
        const checkboxes = document.querySelectorAll('input[name="setting-year"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    // クイズフローの初期化
    function initQuizFlow() {
        const selectedYears = getSelectedYears();
        
        if (playMode === 'weak') {
            const stats = getStats();
            activeQuestions = quizData.filter(q => stats.weakList && stats.weakList[q.id]);
        } else {
            activeQuestions = quizData.filter(q => selectedYears.includes(q.year));
        }

        if (playMode === 'random') {
            shuffleArray(activeQuestions);
        } else if (playMode === 'quick') {
            shuffleArray(activeQuestions);
            activeQuestions = activeQuestions.slice(0, 15);
        } else if (playMode === 'normal') {
            // 年度順 → 問題番号順にソート
            activeQuestions.sort((a, b) => {
                if (a.year !== b.year) return a.year.localeCompare(b.year);
                return a.num - b.num;
            });
        }

        currentIdx = 0;
        loadQuestion();
    }

    // モード変更
    function changePlayMode(mode) {
        playMode = mode;
        document.querySelectorAll('[id^="mode-btn-"]').forEach(btn => {
            btn.classList.remove('border-indigo-600', 'bg-indigo-50/30', 'text-indigo-900');
            btn.classList.add('border-slate-200', 'bg-white', 'text-slate-700');
        });

        const activeBtn = document.getElementById(`mode-btn-${mode}`);
        if (activeBtn) {
            activeBtn.classList.remove('border-slate-200', 'bg-white', 'text-slate-700');
            activeBtn.classList.add('border-indigo-600', 'bg-indigo-50/30', 'text-indigo-900');
        }

        initQuizFlow();
    }

    // 配列のシャッフル
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 問題の描画
    function loadQuestion() {
        isAnswered = false;
        document.getElementById('explanation-container').classList.add('hidden');

        const total = activeQuestions.length;
        const progressText = document.getElementById('question-progress');
        const metaText = document.getElementById('question-meta');
        const qTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');

        if (total === 0) {
            progressText.innerText = "0 / 0";
            metaText.innerText = "NO DATA";
            if (playMode === 'weak') {
                qTextEl.innerText = "現在、要復習リスト（弱点）に登録されている問題はありません！設定画面から他のモードを選んで学習を進めましょう。";
            } else {
                qTextEl.innerText = "選択された年度の問題データがありません。設定画面で年度を選択してください。";
            }
            optionsContainer.innerHTML = '';
            return;
        }

        progressText.innerText = `${currentIdx + 1} / ${total}`;
        const q = activeQuestions[currentIdx];

        metaText.innerText = `${q.year}年度 - 問${q.num}`;
        qTextEl.innerText = q.text;
        optionsContainer.innerHTML = '';

        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:border-slate-300 hover:bg-slate-50 font-medium transition duration-150 text-sm md:text-base flex items-center justify-between group";
            btn.innerHTML = `<span>${opt}</span><span class="opacity-0 group-hover:opacity-100 transition text-xs font-bold text-indigo-500 tracking-wider">選択する &rarr;</span>`;
            btn.onclick = () => checkAnswer(idx);
            optionsContainer.appendChild(btn);
        });
    }

    // 解答判定
    function checkAnswer(selectedIdx) {
        if (isAnswered) return;
        isAnswered = true;

        const q = activeQuestions[currentIdx];
        const isCorrect = (selectedIdx === q.answer);

        // ローカルストレージに保存
        saveAttempt(q.id, isCorrect);

        // UI表示の更新
        const optionsContainer = document.getElementById('options-container');
        Array.from(optionsContainer.children).forEach((btn, idx) => {
            btn.onclick = null; // クリック無効化
            if (idx === q.answer) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-bold text-emerald-900 text-sm md:text-base flex justify-between items-center";
                btn.innerHTML += `<span class="text-emerald-600 font-extrabold text-sm">正解</span>`;
            } else if (idx === selectedIdx && !isCorrect) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-400 bg-rose-50 font-bold text-rose-900 text-sm md:text-base flex justify-between items-center";
                btn.innerHTML += `<span class="text-rose-500 font-extrabold text-sm">あなたの解答</span>`;
            } else {
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-400 text-sm md:text-base cursor-not-allowed";
            }
        });

        const badge = document.getElementById('result-badge');
        const correctDisplay = document.getElementById('correct-answer-display');
        const expText = document.getElementById('explanation-text');

        if (isCorrect) {
            badge.className = "font-black px-4 py-1.5 rounded-xl text-sm tracking-wide bg-emerald-100 text-emerald-700";
            badge.innerText = "正解";
            correctDisplay.innerText = "";
        } else {
            badge.className = "font-black px-4 py-1.5 rounded-xl text-sm tracking-wide bg-rose-100 text-rose-700";
            badge.innerText = "不正解";
            correctDisplay.innerText = `正解は: ${q.options[q.answer]}`;
        }

        expText.innerText = q.explanation || "解説はまだありません。";
        document.getElementById('explanation-container').classList.remove('hidden');

        // 自動スクロール
        setTimeout(() => {
            document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    // 次の問題へ
    function nextQuestion() {
        currentIdx++;
        if (currentIdx >= activeQuestions.length) {
            alert("全ての出題が終了しました！最初の問題に戻ります。");
            currentIdx = 0;
            if (playMode === 'random' || playMode === 'quick') {
                initQuizFlow(); // シャッフル再実行
                return;
            }
        }
        loadQuestion();
    }

    // ==========================================
    // データ永続化システム (localStorage)
    // ==========================================
    function getStats() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : { totalAttempts: 0, totalCorrect: 0, history: {}, weakList: {} };
        } catch (e) {
            return { totalAttempts: 0, totalCorrect: 0, history: {}, weakList: {} };
        }
    }

    function saveAttempt(qId, isCorrect) {
        const stats = getStats();
        stats.totalAttempts++;
        if (isCorrect) stats.totalCorrect++;

        if (!stats.history[qId]) {
            stats.history[qId] = { attempts: 0, correct: 0 };
        }
        stats.history[qId].attempts++;
        if (isCorrect) {
            stats.history[qId].correct++;
            delete stats.weakList[qId]; // 正解したら弱点リストから除外
        } else {
            stats.weakList[qId] = true; // 間違えたら弱点リストに強制追加
        }

        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
        } catch (e) {}
    }

    function updateStatsPanel() {
        const stats = getStats();
        const totalAttempts = stats.totalAttempts || 0;
        const totalCorrect = stats.totalCorrect || 0;

        document.getElementById('stat-total-attempts').innerText = totalAttempts;
        const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
        document.getElementById('stat-overall-accuracy').innerText = accuracy + "%";

        const list = document.getElementById('weak-questions-list');
        list.innerHTML = '';

        let hasWeak = false;

        quizData.forEach(q => {
            if (stats.weakList && stats.weakList[q.id]) {
                hasWeak = true;
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-slate-50 p-3.5 rounded-xl border border-slate-200 gap-4";
                item.innerHTML = `
                    <div class="min-w-0">
                        <span class="text-[10px] font-black tracking-wider text-rose-500 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100">${q.year}年 問${q.num}</span>
                        <p class="text-xs font-bold text-slate-700 mt-1.5 truncate">${q.text}</p>
                    </div>
                    <button onclick="window.startSpecificQuestion('${q.id}')" class="flex-shrink-0 bg-white hover:bg-slate-100 border border-slate-300 text-slate-700 font-bold py-1.5 px-3 rounded-lg text-xs transition shadow-sm">
                        特訓 &rarr;
                    </button>
                `;
                list.appendChild(item);
            }
        });

        // 弱点リストから個別特訓に飛ぶ仕組み
        window.startSpecificQuestion = function(qId) {
            const q = quizData.find(item => item.id === qId);
            if (q) {
                playMode = 'normal';
                activeQuestions = [q];
                currentIdx = 0;
                switchTab('quiz');
                loadQuestion();
            }
        };

        if (!hasWeak) {
            list.innerHTML = `
                <div class="text-center py-8">
                    <p class="text-slate-400 text-sm font-semibold">現在、間違えている問題（弱点）はありません！</p>
                </div>`;
        }
    }

    function clearAllData() {
        if (confirm("全ての解答データ、弱点リストを完全にリセットします。本当によろしいですか？")) {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {}
            updateStatsPanel();
            changePlayMode('normal');
            initQuizFlow();
            switchTab('quiz');
        }
    }

    window.onload = function() {
        changePlayMode('normal'); // 初期モード
        switchTab('quiz');        // デフォルト表示
    }
</script>
</body>
</html>
