<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-16">

<header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-6 text-center">
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">総合演習Ⅰ 過去問マスター</h1>
        <p class="text-xs text-slate-400 mt-2 font-medium tracking-wide">
            局方・生薬・生物・衛生・薬理・薬剤・法規・実務 (Ver 2.0)
        </p>
    </div>
</header>

<div class="max-w-3xl w-full mx-auto px-4 mt-6 flex-grow">
    <div class="flex bg-white rounded-xl shadow-sm border border-slate-100 p-1 mb-6">
        <button id="t-quiz" class="flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200" onclick="switchTab('quiz')">
            問題演習
        </button>
        <button id="t-stats" class="flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200" onclick="switchTab('stats')">
            個人成績表
        </button>
        <button id="t-settings" class="flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200" onclick="switchTab('settings')">
            出題設定
        </button>
    </div>

    <div id="quiz-panel" class="panel hidden">
        <div class="bg-white rounded-2xl p-5 md:p-8 shadow-sm border border-slate-100">
            <!-- Progress & Meta Header -->
            <div class="flex flex-wrap items-center justify-between gap-2 border-b border-slate-100 pb-4 mb-5 text-xs md:text-sm font-bold text-slate-500">
                <div class="flex items-center gap-2">
                    <span id="question-meta" class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full">年度・番号</span>
                    <span id="mode-badge" class="bg-amber-50 text-amber-700 px-3 py-1 rounded-full hidden">弱点補強モード中</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="question-counter">1 / 90問目</span>
                    <span id="question-record" class="text-indigo-600">過去の戦績: -</span>
                </div>
            </div>

            <!-- Question Text -->
            <div id="question-text" class="text-base md:text-lg font-bold leading-relaxed text-slate-800 mb-6">
                問題が読み込まれます
            </div>

            <!-- Options Area -->
            <div id="options-container" class="space-y-3">
                <!-- Dynamically generated buttons go here -->
            </div>

            <!-- Explanation Box -->
            <div id="explanation" class="mt-6 p-5 bg-emerald-50/50 border border-emerald-100 rounded-xl hidden">
                <h4 class="text-emerald-800 font-extrabold text-sm flex items-center gap-1.5 mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    解答解説
                </h4>
                <p id="explanation-text" class="text-slate-700 text-sm md:text-base leading-relaxed pl-5"></p>
            </div>

            <!-- Footer Navigation Buttons -->
            <div class="flex gap-4 mt-8 border-t border-slate-100 pt-5">
                <button id="prev-btn" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-all duration-150 shadow-sm text-sm" onclick="prevQuestion()">
                    戻る
                </button>
                <button id="next-btn" class="flex-1 py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold transition-all duration-150 shadow-sm text-sm" onclick="nextQuestion()">
                    次の問題へ
                </button>
            </div>
        </div>
    </div>

    <div id="stats-panel" class="panel hidden">
        <!-- Progress Stat Grid -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-6">
            <h2 class="text-base font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-indigo-600 rounded-full"></span>学習進捗状況
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50/50 rounded-xl p-4 text-center border border-slate-100">
                    <div class="text-xs text-slate-400 font-bold mb-1">総解答回数</div>
                    <div id="stat-total-attempts" class="text-2xl font-black text-slate-700">0</div>
                </div>
                <div class="bg-slate-50/50 rounded-xl p-4 text-center border border-slate-100">
                    <div class="text-xs text-slate-400 font-bold mb-1">総合正答率</div>
                    <div id="stat-overall-accuracy" class="text-2xl font-black text-indigo-600">0%</div>
                </div>
            </div>
        </div>

        <!-- Weak Questions List -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-base font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-rose-500 rounded-full"></span>要復習リスト（現在間違えている問題）
            </h2>
            <div id="weak-questions-list" class="divide-y divide-slate-100 max-h-[400px] overflow-y-auto pr-1">
                <!-- Dynamically generated list items -->
            </div>
        </div>
    </div>

    <div id="settings-panel" class="panel hidden">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-6">
            <!-- 1. Year Scope Selection -->
            <div>
                <h2 class="text-base font-extrabold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-indigo-600 rounded-full"></span>① 出題範囲（年度）
                </h2>
                <select id="year-filter" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500" onchange="changeYearFilter(this.value)">
                    <option value="all">全問題ミックス（全年度）</option>
                    <!-- Dynamically populated -->
                </select>
            </div>

            <!-- 2. Play Mode Selection -->
            <div>
                <h2 class="text-base font-extrabold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-indigo-600 rounded-full"></span>② 出題モード設定
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <button id="mode-normal" class="p-4 border-2 rounded-xl text-left transition-all duration-200" onclick="changePlayMode('normal')">
                        <div class="font-black text-sm mb-1 text-slate-800">通常モード</div>
                        <p class="text-xs text-slate-400">番号順にじっくり進めます。</p>
                    </button>
                    <button id="mode-random" class="p-4 border-2 rounded-xl text-left transition-all duration-200" onclick="changePlayMode('random')">
                        <div class="font-black text-sm mb-1 text-slate-800">通常ランダム</div>
                        <p class="text-xs text-slate-400">全体からランダムに出題します。</p>
                    </button>
                    <button id="mode-weak" class="p-4 border-2 rounded-xl text-left transition-all duration-200 relative" onclick="changePlayMode('weak')">
                        <div class="font-black text-sm mb-1 text-slate-800 flex items-center gap-1.5">
                            弱点補強モード
                            <span class="bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded text-[10px]">自動除外</span>
                        </div>
                        <p class="text-xs text-slate-400">間違えた問題のみ、常にシャッフルで出題します。</p>
                    </button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="border-t border-slate-100 pt-6">
                <button class="w-full py-3.5 bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold rounded-xl transition-all duration-150 shadow-sm text-sm" onclick="clearAllData()">
                    学習記録（個人成績）をすべてリセット
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const quizData = [
        { id: "2023_q1", year: "2023", num: 1, text: "日本薬局方の沿革・構成に関する記述のうち、正しいのはどれか。", options: ["1. 日本薬局方は、文部科学大臣が薬事・食品衛生審議会の意見を聴いて定める。", "2. 日本薬局方は、原則として10年ごとに全面改正が行われる。", "3. 日本薬局方は、通則、生薬総則、製剤総則、一般試験法及び医薬品各条等から構成される。", "4. 日本薬局方に公式な英文版は存在しない。"], answer: 2, explanation: "1：厚生労働大臣が定めます。2：原則5年ごとに全面改正されます。3：正しいです。4：英文版も存在します。" },
        { id: "2023_q2", year: "2023", num: 2, text: "日本薬局方通則における温度の定義について、正しいのはどれか。", options: ["1. 標準温度は20℃とする。", "2. 常温は10〜30℃とする。", "3. 室温は1〜25℃とする。", "4. 「直ちに」とは、前の操作を終了した後の次の操作を60分以内に開始することをいう。"], answer: 0, explanation: "1：標準温度は20℃で正しい。2：常温は15〜25℃。3：室温は1〜30℃。4：「直ちに」は30分以内です。" },
        { id: "2023_q3", year: "2023", num: 3, text: "日本薬局方通則に関する記述のうち、正しいのはどれか。", options: ["1. 陰性とは、基準値を超える変化が認められることをいう。", "2. 物質名の前後に「 」（かっこ）を付けるのは、それが純品であることを意味する。", "3. 減圧とは、別に規定がない限り0.1 kPa以下の圧力をいう。", "4. サンプルの採取量において「約」とある場合は、記載された数値の±10%の範囲を指す。"], answer: 3, explanation: "1：変化がないか基準以下を指します。2：局方に規定された医薬品であることを意味します。3：減圧は2.0 kPa以下。4：±10%は正しい。" },
        { id: "2023_q4", year: "2023", num: 4, text: "通則の規定において、「約1.5gを精密に量る」という指示に対して適切な表記はどれか。", options: ["1. 1.5g", "2. 1.4985g", "3. 1.50g", "4. 1.500g"], answer: 1, explanation: "「精密に量る」とは、天秤の感度に応じて最小位のもう一つ下の桁まで考慮して量ることです。1.5gに対しては小数第4位まで測定されているものが適切です。" },
        { id: "2023_q5", year: "2023", num: 5, text: "日本薬局方における溶液の濃度表記「(1→10)」の定義として正しいのはどれか。", options: ["1. 固形薬品1gに対して溶媒10mLを加えること。", "2. 固形薬品1gに対して溶媒9mLを加えること。", "3. 固形薬品1gを溶媒に溶かして全量を10mLにすること。", "4. 固形薬品1gを溶媒10gに溶解すること。"], answer: 2, explanation: "「1→10」は、固形1g（液体1mL）を溶かして、全体の量を10mLにすることを意味します。加える溶媒の量ではない点に注意。" },
        { id: "2023_q6", year: "2023", num: 6, text: "日本薬局方の各条に記載されている項ームのうち、原則として品質の適否の判定基準とはされないものはどれか。", options: ["1. 確認試験", "2. 性状", "3. 純度試験", "4. 定量法"], answer: 1, explanation: "「性状」は色やにおいなどの目安であり、原則として適否（合格・不合格）の判定基準にはされません。" },
        { id: "2023_q7", year: "2023", num: 7, text: "紫外可視吸光度測定法において、層長1cm、試薬濃度1%（w/v）の溶液の吸光度を表す記号として正しいのはどれか。", options: ["1. A", "2. ε", "3. E(1%, 1cm)", "4. T"], answer: 2, explanation: "層長1cm、濃度1%における吸光度は「比吸光度」と呼ばれ、「E(1%, 1cm)」で表記されます。" },
        { id: "2023_q8", year: "2023", num: 8, text: "紫外可視吸光度測定法において、紫外部（200〜400 nm）の測定に用いられる光源として正しいのはどれか。", options: ["1. タングステンランプ", "2. 重水素放電管", "3. 中空陰極ランプ", "4. ナトリウムランプ"], answer: 1, explanation: "紫外部（200〜400nm）には「重水素放電管」、可視部（400〜800nm）には「タングステンランプ」が用いられます。" },
        { id: "2023_q9", year: "2023", num: 9, text: "純度試験法において、重金属試験法（第1法）の比較液を調製する際に用いられる標準液はどれか。", options: ["1. 鉄標準液", "2. 鉛標準液", "3. ヒ素標準液", "4. アンモニウム標準液"], answer: 1, explanation: "重金属試験法の比較対象には「鉛標準液」が用いられ、黒褐色の呈色度合いを比較します。" },
        { id: "2023_q10", year: "2023", num: 10, text: "ヒ素試験法において、装置の吸収液として用いられ、ヒ化水素と反応して赤色の呈色を示す試薬はどれか。", options: ["1. ジエチルジチオカルバミド酸銀ピリジン試液", "2. 硫化ナトリウム試液", "3. 塩化第二鉄試液", "4. クンバ川抽出液"], answer: 0, explanation: "発生したヒ化水素を「ジエチルジチオカルバミド酸銀ピリジン試液」に吸収させ、赤色を呈させて測定します。" },
        { id: "2023_q11", year: "2023", num: 11, text: "エンドトキシン試験法に関する記述のうち、正しいのはどれか。", options: ["1. カブトガニの血球抽出成分（ライセート試薬）がエンドトキシンによってゲル化する反応を利用する。", "2. 主にグラム陽性菌の細胞壁成分を測定する試験である。", "3. エンドトキシンは、100℃、30分間の加熱で完全に不活化される。", "4. 発熱物質試験法と完全に同じ操作・手順で行われる。"], answer: 0, explanation: "1：カブトガニ血球抽出成分（ライセート試薬）のゲル化を利用します。2：グラム陰性菌成分。3：250℃以上30分以上の加熱が必要。" },
        { id: "2023_q12", year: "2023", num: 12, text: "発熱物質試験法において、試験に用いられる動物として正しいのはどれか。", options: ["1. 体重300g以上の健康なラット", "2. 体重1.5kg以上の健康なウサギ", "3. 体重20g以上の健康なマウス", "4. 体重2.0kg以上の健康なモルモット"], answer: 1, explanation: "体温変化に敏感な「体重1.5kg以上の健康なウサギ」が用いられます。" },
        { id: "2023_q13", year: "2023", num: 13, text: "微生物学的試験法における「D値」の定義として正しいのはどれか。", options: ["1. 微生物の全細胞数が2倍になる時間", "2. 特定の滅菌条件下で微生物の生存数を1/10（90%減少）にするのに必要な時間・線量", "3. 微生物が完全に死滅する最短時間", "4. 温度が10℃上昇したときの死滅速度変化率"], answer: 1, explanation: "生存数を「1/10（90%減少）」にするために必要な時間、または照射線量を表します。" },
        { id: "2023_q14", year: "2023", num: 14, text: "液体クロマトグラフィーにおいて固定相への保持の強さを表し、ピーク保持時間からデッドボリュームを引いて算出するパラメータはどれか。", options: ["1. 分離係数", "2. 保持比（容量比）", "3. 理論段数", "4. シンメトリー係数"], answer: 1, explanation: "保持比（k'）はカラム内での物質の保持強さを表す指標で、(tR - t0) / t0 で算出されます。" },
        { id: "2023_q15", year: "2023", num: 15, text: "旋光度測定法において、別に規定がない限り測定に用いられる単色光の光源はどれか。", options: ["1. 水銀ランプ", "2. 重水素放電管", "3. ナトリウムスペクトルのD線", "4. タングステンランプ"], answer: 2, explanation: "旋光度測定の光源には「ナトリウムスペクトルのD線」を用いる規定となっています。" },
        { id: "2023_q16", year: "2023", num: 16, text: "生薬の基原に関する記述のうち、正しいのはどれか。", options: ["1. カンゾウ（甘草）の基原植物はマメ科である。", "2. マオウ（麻黄）の基原植物はナス科である。", "3. ケイヒ（桂皮）の基原植物はバラ科である。", "4. シャクヤク（芍薬）の基原植物はセリ科である。"], answer: 0, explanation: "カンゾウはマメ科植物。マオウはマオウ科、ケイヒはクスノキ科、シャクヤクはボタン科です。" },
        { id: "2023_q17", year: "2023", num: 17, text: "次の生薬のうち、薬用部位が「根茎」であるものはどれか。", options: ["1. ニンジン（人参）", "2. ショウキョウ（生姜）", "3. トウキ（当帰）", "4. ゲンチアナ"], answer: 1, explanation: "ショウキョウ（生姜）は「根茎」を薬用部位とします。その他は「根」を用います。" },
        { id: "2023_q18", year: "2023", num: 18, text: "生薬の成分のうち、主要成分としてアルカロイドを含むものはどれか。", options: ["1. マオウ（麻黄）", "2. カンゾウ（甘草）", "3. ダイオウ（大黄）", "4. センナ"], answer: 0, explanation: "マオウは交感神経刺激作用をもつアルカロイド「エフェドリン」を含みます。" },
        { id: "2023_q19", year: "2023", num: 19, text: "確認試験において、塩化第二鉄試液を加えたときに、フェノール性水酸基の存在により呈色を示す生薬はどれか。", options: ["1. ボタンピ", "2. キジツ", "3. チョウジ（丁子）", "4. ゲンノショウコ"], answer: 2, explanation: "チョウジの主要精油成分「オイゲノール」はフェノール性水酸基をもつため呈色します。" },
        { id: "2023_q20", year: "2023", num: 20, text: "生薬総則において、生薬の虫害を防ぐための保存規定として正しいのはどれか。", options: ["1. 密封容器に保存する。", "2. 気密容器に保存し、別に規定がない限り適当な防虫剤を施すか完全に乾燥させる。", "3. 遮光した密閉容器に保存する。", "4. 冷所に保存する。"], answer: 1, explanation: "虫害を防ぐため、生薬は通例「気密容器」に保存し防虫措置を施します。" },
        { id: "2023_q21", year: "2023", num: 21, text: "ヒトの細胞内において、主に「ATP（エネルギー）の産生」を担っている細胞小器官はどれか。", options: ["1. リソソーム", "2. ゴルジ体", "3. ミトコンドリア", "4. 小胞体"], answer: 2, explanation: "ミトコンドリアは酸素を利用してエネルギー（ATP）を産生する「細胞の発電所」です。" },
        { id: "2023_q22", year: "2023", num: 22, text: "血液の成分に関する記述のうち、主に組織への酸素運搬を担う細胞成分はどれか。", options: ["1. 赤血球", "2. 白血球", "3. 血小板", "4. マクロファージ"], answer: 0, explanation: "赤血球はヘモグロビンを含み、酸素を全身の組織へ運ぶ役割を持ちます。" },
        { id: "2023_q23", year: "2023", num: 23, text: "自律神経系において、交感神経が優位に働いたときに起こる身体の反応として正しいのはどれか。", options: ["1. 瞳孔の縮小", "2. 心拍数の増加", "3. 胃腸の運動促進", "4. 気管支の収縮"], answer: 1, explanation: "交感神経が興奮すると、心拍数増加、瞳孔散大、気管支拡張、消化管活動抑制が起こります。" },
        { id: "2023_q24", year: "2023", num: 24, text: "胃から分泌され、ペプシノーゲンをペプシンへと活性化させる強い酸性をもつ物質はどれか。", options: ["1. 重炭酸イオン", "2. 胃酸（塩酸）", "3. 内因子", "4. ガストリン"], answer: 1, explanation: "壁細胞から分泌される胃酸（塩酸）の強酸環境によりペプシノーゲンが活性化されます。" },
        { id: "2023_q25", year: "2023", num: 25, text: "免疫系において、抗体（免疫グロブリン）を直接産生・分泌する細胞はどれか。", options: ["1. 形質細胞", "2. 細胞障害性T細胞", "3. ヘルパーT細胞", "4. 自然キラー細胞"], answer: 0, explanation: "B細胞が抗原刺激によって分化した「形質細胞」が抗体を産生します。" },
        { id: "2023_q26", year: "2023", num: 26, text: "強酸と強塩基の中和反応における「pH飛躍」の範囲判定に適した指示薬はどれか。", options: ["1. メチルオレンジとフェノールフタレインの両方が使用できる", "2. メチルオレンジのみ", "3. フェノールフタレインのみ", "4. どちらも使用できない"], answer: 0, explanation: "強酸×強塩基はpH4〜10と大きく変化するため、両方の変色域がカバーされます。" },
        { id: "2023_q27", year: "2023", num: 27, text: "少量の酸や塩基を加えてもpHを一定に保つ作用（緩衝作用）をもつ溶液を何というか。", options: ["1. 飽和溶液", "2. 緩衝溶液", "3. コロイド溶液", "4. 理想溶液"], answer: 1, explanation: "弱酸とその塩などを混合した、pH変動に抵抗する溶液を「緩衝溶液」と呼びます。" },
        { id: "2023_q28", year: "2023", num: 28, text: "DNAの二重らせん構造において、アデニン（A）と相補的な塩基対を形成する塩基はどれか。", options: ["1. グアニン", "2. シトシン", "3. チミン", "4. ウラシル"], answer: 2, explanation: "DNAではAはチミン(T)と、Gはシトシン(C)と対を作ります（RNAではAとUが対になります）。" },
        { id: "2023_q29", year: "2023", num: 29, text: "DNAの塩基配列を写し取ってmRNA（メッセンジャーRNA）を合成するプロセスを何というか。", options: ["1. 複製", "2. 転写", "3. 翻訳", "4. 逆転写"], answer: 1, explanation: "DNAからRNAを合成するステップを「転写」と呼びます。" },
        { id: "2023_q30", year: "2023", num: 30, text: "mRNA上のコドンを認識し、対応するアミノ酸をリボソームへと運搬するRNAはどれか。", options: ["1. tRNA", "2. rRNA", "3. snRNA", "4. miRNA"], answer: 0, explanation: "tRNA（転移RNA）がアミノ酸をリボソームへ運ぶクレーンの役割を担います。" },
        { id: "2023_q31", year: "2023", num: 31, text: "RNA前駆体からイントロンが除去され、エキソンが結合されて成熟mRNAになる過程を何というか。", options: ["1. キャッピング", "2. ポリA付加", "3. スプライシング", "4. プロテオリシス"], answer: 2, explanation: "不要部分を切り貼りするこの修飾を「スプライシング」と呼びます。" },
        { id: "2023_q32", year: "2023", num: 32, text: "酵素が基質と結合して反応を触媒する際、酵素の活性が最大となる最適な温度を何というか。", options: ["1. 限界温度", "2. 最適温度（至適温度）", "3. 転移温度", "4. 飽和温度"], answer: 1, explanation: "酵素の反応速度が最も活性化する温度を「最適温度（至適温度）」と言います。" },
        { id: "2023_q33", year: "2023", num: 33, text: "酵素反応速度が最大反応速度（Vmax）のちょうど半分（1/2 Vmax）に達するときの基質濃度を表す定数はどれか。", options: ["1. Km（ミカエリス定数）", "2. kcat", "3. Ki", "4. Kd"], answer: 0, explanation: "Km（ミカエリス定数）の定義です。値が小さいほど親和性が高いことを示します。" },
        { id: "2023_q34", year: "2023", num: 34, text: "血液を濾過して尿を生成し、体液のホメオスタシス（恒常性）を維持する主たる器官はどれか。", options: ["1. 肝臓", "2. 脾臓", "3. 腎臓", "4. 胆嚢"], answer: 2, explanation: "腎臓が老廃物の排泄、電解質・水分バランスの調整を担います。" },
        { id: "2023_q35", year: "2023", num: 35, text: "体細胞分裂において、複製された染色体が細胞の赤道面に一列に並ぶ時期はどれか。", options: ["1. 前期", "2. 中期", "3. 後期", "4. 終期"], answer: 1, explanation: "染色体が中央（赤道面）に整列するのは「中期」の特徴です。" },
        { id: "2023_q36", year: "2023", num: 36, text: "細菌とウイルスの構造および特徴に関する記述のうち、正しいのはどれか。", options: ["1. ウイルスは人工の培地（寒天培地など）で自己増殖することができる。", "2. 細菌は細胞壁を持つが、ウイルスは細胞壁を持たない。", "3. ウイルスは常にDNAとRNAの両方の核酸を同時に保有している。", "4. 細菌の増殖は、すべて宿主細胞内でのみ行われる（独立して増殖できない）。"], answer: 1, explanation: "細菌は細胞壁（ペプチドグリカンなど）を持ちますが、ウイルスは細胞構造を持たないため細胞壁はありません。ウイルスは生きた宿主細胞内でのみ増殖可能です。" },
        { id: "2023_q37", year: "2023", num: 37, text: "ヒトの血清中に最も多く存在し、胎盤を通過して胎児に移行（受動免疫）することができる免疫グロブリン（抗体）のクラスはどれか。", options: ["1. IgA", "2. IgE", "3. IgG", "4. IgM"], answer: 2, explanation: "IgGは血清中に最も多く含まれる抗体であり、免疫グロブリンの中で唯一「胎盤を通過できる」という特徴を持ちます。" },
        { id: "2023_q38", year: "2023", num: 38, text: "免疫グロブリンのクラスのうち、主に唾液や母乳、腸管分泌液などの「分泌液」中に二量体として存在し、局所免疫（粘膜防御）を担うものはどれか。", options: ["1. IgA", "2. IgD", "3. IgE", "4. IgM"], answer: 0, explanation: "IgA（分泌型IgA）は、唾液、涙、母乳、気道や消化管の分泌液中に多く含まれ、粘膜面での病原体の侵入を防ぐ役割を果たします。" },
        { id: "2023_q39", year: "2023", num: 39, text: "クームス（Coombs）分類において、IgE抗体が肥満細胞（マスト細胞）に結合し、ヒスタミンなどが遊離することで起こる「即時型アレルギー」はどれか。", options: ["1. Ⅰ型アレルギー", "2. Ⅱ型アレルギー", "3. Ⅲ型アレルギー", "4. Ⅳ型アレルギー"], answer: 0, explanation: "花粉症、気管支喘息、アナフィラキシーショックなどは「Ⅰ型アレルギー（即時型）」に分類されます。" },
        { id: "2023_q40", year: "2023", num: 40, text: "アレルギーの分類において、抗体ではなく「感作T細胞（細胞性免疫）」が関与し、抗原接触から24〜48時間後に症状がピークに達する「遅延型アレルギー」はどれか。", options: ["1. Ⅰ型アレルギー", "2. Ⅱ型アレルギー", "3. Ⅲ型アレルギー", "4. Ⅳ型アレルギー"], answer: 3, explanation: "Ⅳ型アレルギーは「遅延型（細胞性免疫型）」と呼ばれ、T細胞が関与します。ツベルクリン反応や接触性皮膚炎（かぶれ）が該当します。" },
        { id: "2023_q41", year: "2023", num: 41, text: "細胞質内で行われ、1分子のグルコースが嫌気的に分解されて2分子のピルビン酸になり、ネットで2分子のATPを産生する代謝経路はどれか。", options: ["1. クエン酸回路（TCA回路）", "2. 解糖系", "3. 電子伝達系", "4. ペントースリン酸経路"], answer: 1, explanation: "グルコースを分解してエネルギーを取り出す最初のステップは、細胞質基質で行われる「解糖系」です。酸素を必要としません。" },
        { id: "2023_q42", year: "2023", num: 42, text: "ミトコンドリアのマトリクスで行われ、解糖系から生じたアセチルCoAが結合して回転し、NADHやFADH2を高効率で産生する主要なエネルギー代謝回路はどれか。", options: ["1. グリコーゲン合成経路", "2. カルビン回路", "3. クエン酸回路（TCA回路）", "4. 尿素回路"], answer: 2, explanation: "アセチルCoAがオキサロ酢酸と結合してクエン酸になることから始まるこの回路は、「クエン酸回路（TCA回路）」と呼ばれます。" },
        { id: "2023_q43", year: "2023", num: 43, text: "ミトコンドリアの内膜に存在する高分子複合体において、NADHなどの電子が移動するエネルギーを利用してプロトン（H+）の濃度勾配を形成し、莫大なATPを産生するシステムはどれか。", options: ["1. 解糖系", "2. 電子伝達系", "3. 糖新生経路", "4. 脂肪酸β酸化"], answer: 1, explanation: "ミトコンドリア内膜で行われる「電子伝達系」は、水素イオン（プロトン）の濃度勾配を利用して大量のATPを合成します。" },
        { id: "2023_q44", year: "2023", num: 44, text: "飢餓時や糖質不足時に、肝臓においてピルビン酸や乳酸、アミノ酸、グリセロールなどの「糖質以外の物質」からグルコースを新たに作り出す代謝経路はどれか。", options: ["1. 糖新生", "2. グリコーゲン分解", "3. クエン酸回路", "4. 脂肪酸合成"], answer: 0, explanation: "乳酸やアミノ酸など、糖質以外の材料からグルコースを逆合成する経路を「糖新生」と呼びます。" },
        { id: "2023_q45", year: "2023", num: 45, text: "脂質の代謝において、脂肪酸がミトコンドリア内で炭素2個ずつに次々と切断され、酸化されてアセチルCoAを生み出すプロセスを何というか。", options: ["1. α酸化", "2. β酸化", "3. ω酸化", "4. 糖新生"], answer: 1, explanation: "脂肪酸のカルボキシ基側から数えて2番目の炭素（β位）が酸化されて切断されていくため、「脂肪酸のβ酸化」と呼びます。" },
        { id: "2023_q46", year: "2023", num: 46, text: "脂溶性ビタミンのうち、視覚の正常維持（夜盲症の予防）や皮膚・粘膜の上皮細胞の分化に関与するものはどれか。", options: ["1. ビタミンA", "2. ビタミンD", "3. ビタミンE", "4. ビタミンK"], answer: 0, explanation: "ビタミンAは、網膜の光受容体であるロドプシンの構成成分であり、不足すると「夜盲症」を引き起こします。" },
        { id: "2023_q47", year: "2023", num: 47, text: "肝臓や腎臓で代謝されて活性型となり、小腸からのカルシウムの吸収を促進して骨の恒常性を維持する脂溶性ビタミンはどれか。", options: ["1. ビタミンA", "2. ビタミンD", "3. ビタミンE", "4. ビタミンK"], answer: 1, explanation: "ビタミンDは、肝臓と腎臓で水酸化されて「活性型ビタミンD」となり、小腸でのカルシウムの吸収を高めます。" },
        { id: "2023_q48", text: "水溶性ビタミンのうち、欠乏することでコラーゲン合成が障害され、毛細血管の脆弱化による出血（壊血病）を引き起こすものはどれか。", options: ["1. ビタミンB1", "2. ビタミンB12", "3. ビタミンC", "4. 葉酸"], answer: 2, explanation: "ビタミンCは、コラーゲンを合成する際の補酵素として必須です。欠乏すると「壊血病」になります。" },
        { id: "2023_q49", year: "2023", num: 49, text: "日本の水道水質基準において、水道水の安全性を担保し、かつ病原生物による汚染を防ぐために「蛇口での残留濃度」が規定されている消毒物質はどれか。", options: ["1. 遊離残留塩素", "2. オゾン", "3. 二酸化塩素", "4. クロラミン"], answer: 0, explanation: "水道法により、蛇口から出る水には「遊離残留塩素として0.1 mg/L以上」が含まれているよう、塩素消毒を行うことが義務付けられています。" },
        { id: "2023_q50", year: "2023", num: 50, text: "大気汚染物質のうち、化石燃料の燃焼などで発生し、光化学スモッグの原因となるオゾンやパーオキシアシルナイトレートなどの総称を何というか。", options: ["1. 浮遊粒子状物質（SPM）", "2. 窒素酸化物（NOx）", "3. 光化学オキシダント（Ox）", "4. 二酸化硫黄（SO2）"], answer: 2, explanation: "NOxや炭化水素が紫外線と反応して生成される強酸化性物質の総称を「光化学オキシダント」と呼びます。" },
        { id: "2023_q51", year: "2023", num: 51, text: "水質汚濁の指標において、有機物が過マンガン酸カリウムなどの酸化剤によって化学的に分解される際に消費される酸素量（主に湖沼や海域の指標）はどれか。", options: ["1. DO（溶存酸素量）", "2. BOD（生物化学的酸素要求量）", "3. COD（化学的酸素要求量）", "4. SS（浮遊物質量）"], answer: 2, explanation: "酸化剤を用いて有機物を酸化したときの酸素消費量は「COD（化学的酸素要求量）」です。主に湖沼や海域の指標に用いられます。" },
        { id: "2023_q52", year: "2023", num: 52, text: "地球環境問題の原因物質に関する記述のうち、正しいのはどれか。", options: ["1. 酸性雨の主な原因物質は、フロンや二酸化炭素である。", "2. 地球温暖化の主な原因物質は、二酸化硫黄や窒素酸化物である。", "3. オゾン層破壊の主な原因物質は、クロロフルオロカーボン（フロン）である。", "4. 光化学スモッグの主な原因物質は、メタンや一酸化二窒素である。"], answer: 2, explanation: "フロン（クロロフルオロカーボン）が紫外線で分解されて塩素原子を出し、これがオゾン層を破壊します。" },
        { id: "2023_q53", year: "2023", num: 53, text: "化学物質による急性中毒の救急処置において、一般に催吐（吐かせること）が禁忌とされる物質はどれか。", options: ["1. 強酸・強アルカリ、または灯油などの石油製品", "2. 有機リン系殺虫剤", "3. アセトアミノフェン", "4. 重金属類"], answer: 0, explanation: "強酸・強アルカリを吐かせると食道や口腔を再度腐食します。灯油などの石油製品は気管に入りやすく、化学性肺炎を起こす危険があるため禁忌です。" },
        { id: "2023_q54", year: "2023", num: 54, text: "医薬品医療機器等法（薬機法）における「医薬品」の定義において、医薬品の分類に該当しないものはどれか。", options: ["1. 日本薬局方に収められている物", "2. 人又は動物の疾病の診断、治療又は予防に使用されることが目的とされている物", "3. 人又は動物の身体の構造又は機能に影響を及ぼすことが目的とされている物", "4. 人の健康の保持増進に役立つ、いわゆる「健康食品」や「サプリメント」"], answer: 3, explanation: "健康食品やサプリメントは法律上「食品」に分類され、薬機法上の「医薬品」には該当しません。" },
        { id: "2023_q55", year: "2023", num: 55, text: "医薬品の分類のうち、「販売時に薬剤師による購入者への対面での情報提供および指導が法的に義務付けられており、インターネットでの販売が禁止されている」ものはどれか。", options: ["1. 要指導医薬品", "2. 第一類医薬品", "3. 第二類医薬品", "4. 第三類医薬品"], answer: 0, explanation: "「要指導医薬品」は、薬剤師による対面での書面を用いた指導が必須であり、ネット販売は不可となっています。" },
        { id: "2023_q56", year: "2023", num: 56, text: "麻薬及び向精神薬取締法において、覚醒剤原料や大麻とは別に管理され、処方箋による調剤や譲渡・廃棄の際に、鍵付きの堅固な金庫での保管が義務付けられている区分はどれか。", options: ["1. 向精神薬", "2. 覚醒剤", "3. 麻薬", "4. 毒薬"], answer: 2, explanation: "「麻薬」は、鍵をかけた「堅固な設備（金庫など）」に保管しなければならず、他の医薬品と区別して収納する必要があります。" },
        { id: "2023_q57", year: "2023", num: 57, text: "毒物及び劇物取締法において、厚生労働省令で定める「毒物」を貯蔵・保管する場所の表示として、法的に正しい組み合わせはどれか。", options: ["1. 白地に赤枠、黒文字で「毒物」", "2. 赤地に白文字で「毒物」", "3. 赤地に白枠、黒文字で「医薬用外毒物」", "4. 赤地に白文字で「医薬用外毒物」"], answer: 3, explanation: "毒物劇物取締法における毒物の表示は、「赤地に白文字」で「医薬用外毒物」と記載しなければなりません。" },
        { id: "2023_q58", year: "2023", num: 58, text: "薬剤師法第19条において、薬剤師は、原則として誰が交付した処方箋によらなければ、販売又は授与の目的で調剤してはならないと定められているか。", options: ["1. 医師、歯科医師又は獣医師", "2. 医師、歯科医師、獣医師又は看護師", "3. 医師、歯科医師、獣医師又は薬剤師（自身）", "4. 医師、歯科医師又は助産師"], answer: 0, explanation: "薬剤師法において、調剤は「医師、歯科医師又は獣医師」の処方箋に基づいて行う必要があります。" },
        { id: "2023_q59", year: "2023", num: 59, text: "薬剤師法第24条において、薬剤師は、処方箋中に疑わしい点を発見したとき、調剤に関してどのような行動をとらなければならないか。", options: ["1. 患者の承諾が得られれば、自己の判断で処方を変更して調剤する。", "2. その処方箋を交付した医師等に問い合わせて、疑わしい点が解消した後でなければ、調剤してはならない。", "3. 速やかに調剤を拒否し、患者を他の医療機関へ案内する。", "4. 疑わしい点をそのまま記録に残した上で、医師の処方通りに調剤する。"], answer: 1, explanation: "処方箋に疑問点がある場合は、処方医に確認（疑義照会）して解決するまでは「調剤してはならない」と法律で定められています。" },
        { id: "2023_q60", year: "2023", num: 60, text: "処方箋の有効期間に関する記述のうち、処方箋に「特に有効期間の記載がない場合」の原則的な有効期間はどれか。", options: ["1. 交付の日から起算して2日間（当日含む）", "2. 交付の日から起算して4日間（当日含む）", "3. 交付の日から起算して7日間（当日含む）", "4. 交付の日から起算して14日間（当日含む）"], answer: 1, explanation: "特に記載がない場合、処方箋の有効期間は「交付の日を含めて4日間」です。" },
        { id: "2023_q61", year: "2023", num: 61, text: "日本の社会保障制度のうち、病気、負傷、出産、老齢、障害などのリスクに対して、国や個人が保険料を出し合い、サービスや給付を行う仕組みはどれか。", options: ["1. 社会保険", "2. 公衆衛生", "3. 社会福祉", "4. 公的扶助（生活保護）"], answer: 0, explanation: "日本の社会保障の中心的役割を果たすのが「社会保険」です。医療保険、年金保険、雇用保険、労災保険、介護保険の5つがあります。" },
        { id: "2023_q62", year: "2023", num: 62, text: "日本の医療保険制度の特徴に関する記述のうち、正しいのはどれか。", options: ["1. 国民が自由に加入する保険を選べる「自由保険制度」である。", "2. 日本国内に住所を持つすべての国民が公的医療保険に加入する「国民皆保険制度」である。", "3. 医療費の窓口自己負担割合は、年齢や所得に関わらず一律5割である。", "4. 診療報酬は、各医療機関が自由に価格を設定できる市場競争制である。"], answer: 1, explanation: "日本は1961年に「国民皆保険制度」を確立し、原則すべての国民が何らかの公的医療保険に加入しています。" },
        { id: "2023_q63", year: "2023", num: 63, text: "医療保険において、1ヶ月に支払った医療費の窓口負担額が、所得に応じて定められた一定の上限額を超えた場合、その超えた金額が払い戻される制度はどれか。", options: ["1. 介護保険給付制度", "2. 療養費支給制度", "3. 高額療養費制度", "4. 医療費控除"], answer: 2, explanation: "「高額療養費制度」に関する記述です。患者の経済的負担が過度にならないように守るための福祉制度です。" },
        { id: "2023_q64", year: "2023", num: 64, text: "病院と診療所の法的定義において、医療法上、病床（入院ベッド）が何床以上ある医療施設を「病院」と定義しているか。", options: ["1. 20床以上", "2. 50床以上", "3. 100床以上", "4. 200床以上"], answer: 0, explanation: "医療法において、病床数が「20床以上が病院」、「19床以下、または病床を持たないもの」が診療所と定義されています。" },
        { id: "2023_q65", year: "2023", num: 65, text: "医薬品の安全対策において、製造販売後に発生した重篤な副作用などの症例情報を厚生労働大臣へ報告することが、薬機法で義務付けられている職種はどれか。", options: ["1. 病院の事務職や管理栄養士", "2. 医薬品の製造工場の作業員", "3. 医師、歯科医師、薬剤師などの医薬関係者", "4. 医薬品を購入した患者本人"], answer: 2, explanation: "薬機法に基づき、医師や歯科医師、薬剤師などの医薬関係者は、重篤な副作用の発生を知ったとき、厚生労働大臣へ報告する義務があります。" },
        { id: "2023_q66", year: "2023", num: 66, text: "神経伝達物質とその受容体に関する記述のうち、アセチルコリンによって刺激され、骨格筋の収縮に関与するものはどれか。", options: ["1. ムスカリン受容体（M1受容体）", "2. ニコチン受容体（NM受容体）", "3. アドレナリンα1受容体", "4. ドパミンD2受容体"], answer: 1, explanation: "骨格筋の神経筋接合部に存在し、骨格筋収縮を担うのは「ニコチン受容体（NM受容体）」です。イオンチャネル内蔵型受容体です。" },
        { id: "2023_q67", year: "2023", num: 67, text: "交感神経系の受容体のうち、主に心筋に存在し、刺激されることで心拍数増加や心収縮力増強を引き起こすものはどれか。", options: ["1. アドレナリンα1受容体", "2. アドレナリンβ1受容体", "3. アドレナリンβ2受容体", "4. ムスカリンM2受容体"], answer: 1, explanation: "心臓に主に分布するのは「アドレナリンβ1受容体」です。これを刺激すると心機能が亢進します。" },
        { id: "2023_q68", year: "2023", num: 68, text: "高血圧症の治療薬である「アムロジピン」の薬理作用として、正しいのはどれか。", options: ["1. 血管平滑筋のL型Ca2+チャネルを遮断し、血管を拡張させる。", "2. アンジオテンシンⅡ受容体を遮断し、血管を拡張させる。", "3. β1受容体を遮断し、心拍数を減少させる。", "4. ループ利尿薬として、尿量を増加させる。"], answer: 0, explanation: "アムロジピンはカルシウム拮抗薬に分類されます。L型Ca2+チャネルをブロックすることで、血管を広げて血圧を下げます。" },
        { id: "2023_q69", year: "2023", num: 69, text: "脂質異常症の治療薬である「アトルバスタチン」が特異的に阻害する、コレステロール生合成経路の律速酵素はどれか。", options: ["1. シクロオキシゲナーゼ（COX）", "2. HMG-CoA還元酵素", "3. アンジオテンシン変換酵素（ACE）", "4. モノアミン酸化酵素（MAO）"], answer: 1, explanation: "スタチン系医薬品（アトルバスタチンなど）は、コレステロール合成の律速酵素である「HMG-CoA還元酵素」を強力に阻害します。" },
        { id: "2023_q70", year: "2023", num: 70, text: "非ステロイド性抗炎症薬（NSAIDs）が阻害する、プロスタグランジン合成の鍵となる酵素はどれか。", options: ["1. ホスホリパーゼA2", "2. シクロオキシゲナーゼ（COX）", "3. リポキシゲナーゼ", "4. トロンボキサン合成酵素"], answer: 1, explanation: "NSAIDsは「シクロオキシゲナーゼ（COX）」を阻害することで、痛みや発熱、炎症の元になるプロスタグランジン（PG）の産生を抑えます。" },
        { id: "2023_q71", year: "2023", num: 71, text: "医薬品が体内に吸収された後、全身循環に達する前に、肝臓や小腸粘膜などを通過する際に代謝・分解されてしまう現象を何というか。", options: ["1. 初回通過効果（ファーストパス効果）", "2. 腸肝循環", "3. バイオアベイラビリティ", "4. 腎排泄"], answer: 0, explanation: "経口投与された薬が最初に肝臓などを通過する際、一部が代謝・分解される現象を「初回通過効果」と呼びます。" },
        { id: "2023_q72", year: "2023", num: 72, text: "投与された医薬品の全量のうち、どれだけの割合が分解されずに全身循環に到達したかを示す指標を何というか。", options: ["1. クリアランス（CL）", "2. 生物学的利用能（バイオアベイラビリティ）", "3. 分布容積（Vd）", "4. 半減期（t1/2）"], answer: 1, explanation: "「バイオアベイラビリティ」は、薬が分解されずにどれだけ全身循環に到達したかを示す割合です。" },
        { id: "2023_q73", year: "2023", num: 73, text: "薬物が血中から組織へどれだけ移行し、広く行き渡っているかを表す指標はどれか。", options: ["1. 全身クリアランス", "2. 消失半減期", "3. 分布容積", "4. 血中濃度曲線下面積（AUC）"], answer: 2, explanation: "「分布容積（Vd）」は、体内にある薬の総量を血中濃度で割った仮想的な容積指標です。" },
        { id: "2023_q74", year: "2023", num: 74, text: "血液中の薬物が代謝や排泄によって元の濃度の半分（50%）に減少するまでにかかる時間を何というか。", options: ["1. 消失半減期（t1/2）", "2. 平均滞留時間（MRT）", "3. 最高血中濃度到達時間（Tmax）", "4. 飽和時間"], answer: 0, explanation: "「消失半減期（t1/2）」は、体内から薬が消失して血中濃度が半分になるまでの時間を表します。" },
        { id: "2023_q75", year: "2023", num: 75, text: "医薬品の主な代謝反応のうち、チトクロームP450（CYP）などが関与する、酸化・還元・加水分解などの反応を何というか。", options: ["1. 第Ⅰ相反応", "2. 第Ⅱ相反応", "3. 抱合反応", "4. グルクロン酸抱合"], answer: 0, explanation: "CYPが関与する酸化・還元・加水分解などの反応を「第Ⅰ相反応」と呼びます。親水性を少し高めるステップです。" },
        { id: "2023_q76", year: "2023", num: 76, text: "日本薬局方における「錠剤」の定義や特徴に関する記述のうち、正しいのはどれか。", options: ["1. 錠剤はすべて、口腔内で速やかに溶解又は崩壊させて服用しなければならない。", "2. 医薬品を一定の形状に成形した固形の製剤であり、最も広く利用されている経口投与の剤形である。", "3. 錠剤にコーティングを施すことは、日本薬局方により禁止されている。", "4. 錠剤はすべて、胃の中では絶対に溶けずに腸に届いてから溶けるように作られている。"], answer: 1, explanation: "錠剤は固形の経口製剤の代表格です。特殊な加工を施したもの以外は胃などで崩壊します。" },
        { id: "2023_q77", year: "2023", num: 77, text: "製剤において、薬物を胃液では溶解させず、腸液に到達してから速やかに放出・吸収させる目的で施される特殊なコーティング錠を何というか。", options: ["1. 口腔内崩壊錠", "2. 腸溶錠（腸溶性製剤）", "3. 徐放錠（徐放性製剤）", "4. 発泡錠"], answer: 1, explanation: "胃酸で分解する薬や胃壁を刺激する薬は、表面に酸で溶けない膜を張った「腸溶錠」に仕上げます。" },
        { id: "2023_q78", year: "2023", num: 78, text: "製剤において、薬物の放出スピードを意図的に遅くし、体内の血中濃度を長時間一定に保つことで効果を持続させる錠剤はどれか。", options: ["1. 咀嚼錠", "2. 舌下錠", "3. 徐放錠（徐放性製剤）", "4. 速放錠"], answer: 2, explanation: "成分が「徐々に放出される」ため「徐放錠」と呼びます。効果を長くマイルドに持続させます。" },
        { id: "2023_q79", year: "2023", num: 79, text: "狭心症の発作時に用いられるニトログリセリンのように、口の粘膜から薬を吸収させ、初回通過効果を回避して速やかに全身に効かせる剤形はどれか。", options: ["1. 舌下錠", "2. トローチ剤", "3. 口腔内崩壊錠", "4. 経口カプセル剤"], answer: 0, explanation: "「舌下錠」は、口の粘膜から直接吸収させることで、初回通過効果を回避し、急速に効果を発揮させます。" },
        { id: "2023_q80", year: "2023", num: 80, text: "錠剤を製造する際、主薬の量が極めて少ない場合に、ボリュームを増やして扱いやすい大きさに調節する目的で配合される乳糖やデンプンなどの添加剤の総称はどれか。", options: ["1. 賦形剤", "2. 崩壊剤", "3. 滑沢剤", "4. 結合剤"], answer: 0, explanation: "ボリュームを増やす（カサ増し用）ための添加剤を「賦形剤」と言います。" },
        { id: "2023_q81", year: "2023", num: 81, text: "調剤業務において、処方箋に記載された医薬品について、規格や剤形、重複投与、相互作用などを調剤前に確認する一連の監査作業を何というか。", options: ["1. 処方監査", "2. 調剤監査", "3. 疑義照会", "4. 服薬指導"], answer: 0, explanation: "調剤を始める前に、処方箋の内容そのものに間違いやリスクがないかをチェックすることを「処方監査」と言います。" },
        { id: "2023_q82", year: "2023", num: 82, text: "複数の医薬品を同じ容器やラインで混合した際に、化学反応や物理的な原因によって、白濁、沈殿、変色、力価の低下などが生じる不都合な現象を何というか。", options: ["1. 相互作用", "2. 配合変化", "3. 溶解度上昇", "4. 加水分解"], answer: 1, explanation: "混ぜることで物理的・化学的に見た目や成分が変わってしまうトラブルを「配合変化」と呼びます。" },
        { id: "2023_q83", year: "2023", num: 83, text: "処方箋に「1回2錠、1日3回、毎食後、14日分」と記載されていた場合、この患者に合計で交付する錠剤の総数は何錠か。", options: ["1. 42錠", "2. 56錠", "3. 84錠", "4. 112錠"], answer: 2, explanation: "1回2錠 × 1日3回 = 1日6錠。これが14日分あるので、6 × 14 = 84錠 となります。" },
        { id: "2023_q84", year: "2023", num: 84, text: "ある粉薬の処方において、「1日量として 1.5 g を、1日3回に分けて毎食後服用、7日分」と指示された。1回あたりに包む粉薬の重量は何gか。", options: ["1. 0.2 g", "2. 0.5 g", "3. 1.0 g", "4. 1.5 g"], answer: 1, explanation: "1日量が1.5 gで、それを1日3回に分けるため、1回量は 1.5 g ÷ 3 = 0.5 g となります。" },
        { id: "2023_q85", year: "2023", num: 85, text: "薬物動態学や薬理学において、医薬品の効果が強く現れすぎたり、毒性が発現したりするリスクが非常に高くなる血液中の濃度の境界線を何というか。", options: ["1. 最小有効濃度（MEC）", "2. 最高血中濃度（Cmax）", "3. 最小中毒濃度（MTC）", "4. 定常状態血中濃度"], answer: 2, explanation: "これを超えると副作用や毒性が現れて危険なラインを「最小中毒濃度（MTC）」または「中毒域」と呼びます。" },
        { id: "2023_q86", year: "2023", num: 86, text: "有効域と中毒域が極めて狭く、安全管理が難しい薬の血中濃度を測定し、患者ごとに最適な投与量を解析・設計する業務を何というか。", options: ["1. TDM（薬物血中濃度モニタリング）", "2. DI（医薬品情報管理）", "3. 服薬コンプライアンスチェック", "4. 調剤過誤防止対策"], answer: 0, explanation: "「TDM（Therapeutic Drug Monitoring：薬物血中濃度モニタリング）」に関する記述です。" },
        { id: "2023_q87", year: "2023", num: 87, text: "医薬品の適正使用において、患者が指示された通りに、正確に薬を服用できている度合い（納得して治療に参加する意味も含む）を表す用語はどれか。", options: ["1. アドヒアランス", "2. インフォームドコンセント", "3. バリアフリー", "4. アカウンタビリティ"], answer: 0, explanation: "患者自身が病気を理解し、納得して治療に参加して薬を飲むという主体的・積極的な意味を込めて「アドヒアランス」と呼ばれます。" },
        { id: "2023_q88", year: "2023", num: 88, text: "医薬品の臨床試験の段階において、少数の健康成人を対象とし、主に医薬品の安全性や体内での動態を調べる最初のフェーズはどれか。", options: ["1. 第Ⅰ相試験", "2. 第Ⅱ相試験", "3. 第Ⅲ相試験", "4. 第Ⅳ相試験"], answer: 0, explanation: "治験の最初のステップである「第Ⅰ相試験」は、少数の健康な人を対象に安全性をテストします。" },
        { id: "2023_q89", year: "2023", num: 89, text: "先発医薬品の特許が切れた後に発売される、先発医薬品と有効成分、用法・用量が同じであり、同等の効果を持ちながら低価格で購入できる医薬品を何というか。", options: ["1. ジェネリック医薬品（後発医薬品）", "2. オルファンドラッグ", "3. スイッチOTC医薬品", "4. バイオ医薬品"], answer: 0, explanation: "「ジェネリック医薬品（後発医薬品）」の定義です。医療費削減に貢献します。" },
        { id: "2023_q90", year: "2023", num: 90, text: "医療事故を防ぐため、結果として患者に被害は及ばなかったものの、一歩間違えれば重大な事故に繋がりかねなかった事例の報告書を何というか。", options: ["1. インシデントレポート（ヒヤリハット報告書）", "2. アクシデントレポート", "3. 副作用報告書", "4. 処方箋監査簿"], answer: 0, explanation: "事故を未然に防ぐための重要な取り組みとなるのが「インシデントレポート（ヒヤリハット報告）」です。" }
    ];

    let playMode = 'normal'; // 'normal' (順次), 'random' (通常ランダム), 'weak' (弱点補強)
    let yearFilter = 'all';  // 'all' or specific year string like '2023'
    let activeQuestions = [];
    let currentIdx = 0;
    let hasAnswered = false;

    function getStorage() {
        try {
            const data = localStorage.getItem('yakugaku_quiz_records_v13');
            const parsed = data ? JSON.parse(data) : {};
            
            // 互換性チェック: 古いレコードに「lastIncorrect」が無い場合は補完
            for (let id in parsed) {
                if (parsed[id].lastIncorrect === undefined) {
                    parsed[id].lastIncorrect = (parsed[id].correct < parsed[id].attempts);
                }
            }
            return parsed;
        } catch (e) {
            return {};
        }
    }

    function saveRecord(qId, isCorrect) {
        let records = getStorage();
        if (!records[qId]) {
            records[qId] = { attempts: 0, correct: 0, lastIncorrect: false };
        }
        records[qId].attempts += 1;
        
        if (isCorrect) {
            records[qId].correct += 1;
            records[qId].lastIncorrect = false; // 正解したので弱点からクリア！
        } else {
            records[qId].lastIncorrect = true;  // 間違えたので弱点としてマーク！
        }

        try {
            localStorage.setItem('yakugaku_quiz_records_v13', JSON.stringify(records));
        } catch (e) {}
        updateStatsPanel();
    }

    function switchTab(tabName) {
        document.getElementById('quiz-panel').classList.add('hidden');
        document.getElementById('stats-panel').classList.add('hidden');
        document.getElementById('settings-panel').classList.add('hidden');
        
        document.getElementById('t-quiz').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";
        document.getElementById('t-stats').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";
        document.getElementById('t-settings').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";

        document.getElementById(tabName + '-panel').classList.remove('hidden');
        document.getElementById('t-' + tabName).className = "flex-1 py-3 text-sm font-bold rounded-lg text-indigo-600 bg-white shadow-sm border border-slate-100 transition-all duration-200";
        
        if (tabName === 'stats') {
            updateStatsPanel();
        }
    }

    function initQuizFlow() {
        const records = getStorage();
        
        // 1. 出題範囲 (年度) で絞り込む
        let filtered = quizData;
        if (yearFilter !== 'all') {
            filtered = quizData.filter(q => q.year === yearFilter);
        }

        // 2. 出題モードによる分類
        if (playMode === 'weak') {
            // 弱点補強モード：直近が不正解のものだけ抽出
            activeQuestions = filtered.filter(q => {
                const r = records[q.id];
                return r && r.lastIncorrect;
            });
            // 常に完全ランダム（シャッフル）
            activeQuestions.sort(() => Math.random() - 0.5);
            
            document.getElementById('mode-badge').classList.remove('hidden');
        } else if (playMode === 'random') {
            // 通常ランダム
            activeQuestions = [...filtered];
            activeQuestions.sort(() => Math.random() - 0.5);
            document.getElementById('mode-badge').classList.add('hidden');
        } else {
            // 通常順次
            activeQuestions = [...filtered];
            activeQuestions.sort((a, b) => {
                if (a.year !== b.year) return b.year.localeCompare(a.year); // 最新年度順
                return a.num - b.num; // 問題番号順
            });
            document.getElementById('mode-badge').classList.add('hidden');
        }

        currentIdx = 0;
        loadQuestion();
    }

    function loadQuestion() {
        hasAnswered = false;
        document.getElementById('explanation').classList.add('hidden');
        
        // 対象問題がない場合の表示
        if (activeQuestions.length === 0) {
            document.getElementById('question-meta').innerText = "対象なし";
            document.getElementById('question-counter').innerText = "0 / 0問";
            document.getElementById('question-record').innerText = "戦績: -";
            
            if (playMode === 'weak') {
                document.getElementById('question-text').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-emerald-600 text-lg font-black mb-2">🎉 素晴らしい！弱点問題はありません</p>
                        <p class="text-slate-400 text-xs font-normal">通常モードで演習を行い、間違えた問題が出るとここに自動で蓄積されます。</p>
                        <button class="mt-5 px-6 py-2.5 bg-slate-800 text-white rounded-xl text-xs font-bold" onclick="switchTab('settings')">出題設定を変更する</button>
                    </div>`;
            } else {
                document.getElementById('question-text').innerText = "該当する問題が存在しません。出題範囲を変更してください。";
            }
            document.getElementById('options-container').innerHTML = "";
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            return;
        }

        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        document.getElementById('next-btn').disabled = false;

        const q = activeQuestions[currentIdx];
        
        // メタデータ & カウンター
        document.getElementById('question-meta').innerText = `${q.year}年 問${q.num}`;
        
        if (playMode === 'weak') {
            document.getElementById('question-counter').innerText = `残り弱点: ${activeQuestions.length - currentIdx}問`;
        } else {
            document.getElementById('question-counter').innerText = `${currentIdx + 1} / ${activeQuestions.length}問目`;
        }
        
        // 過去の戦績
        const records = getStorage();
        if (records[q.id]) {
            const r = records[q.id];
            const rate = r.attempts > 0 ? Math.round((r.correct / r.attempts) * 100) : 0;
            document.getElementById('question-record').innerText = `過去の戦績: ${r.correct}勝 / ${r.attempts}回 (${rate}%)`;
        } else {
            document.getElementById('question-record').innerText = "過去の戦績: 未解答";
        }

        // 本文
        document.getElementById('question-text').innerText = q.text;

        // 選択肢
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:border-indigo-200 hover:bg-indigo-50/20 active:scale-[0.99] font-semibold text-slate-700 text-sm transition-all duration-150";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedIdx) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        const q = activeQuestions[currentIdx];
        const isCorrect = (selectedIdx === q.answer);
        
        // 記録を保存
        saveRecord(q.id, isCorrect);

        const buttons = document.getElementById('options-container').getElementsByTagName('button');
        
        for (let idx = 0; idx < buttons.length; idx++) {
            buttons[idx].disabled = true;
            if (idx === q.answer) {
                // 正解のボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-800 font-bold text-sm shadow-sm";
            } else if (idx === selectedIdx) {
                // 自分が選択して間違えたボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-800 font-bold text-sm shadow-sm";
            } else {
                // その他のボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border border-slate-100 bg-slate-50 text-slate-400 text-sm opacity-60";
            }
        }

        // 解説の展開
        document.getElementById('explanation-text').innerText = q.explanation;
        document.getElementById('explanation').classList.remove('hidden');
    }

    function nextQuestion() {
        if (activeQuestions.length === 0) return;
        
        if (playMode === 'weak' && hasAnswered) {
            // 弱点補強モードで「正解」した場合、現在の問題をその場でアクティブリストから除外して詰め直す
            const q = activeQuestions[currentIdx];
            const records = getStorage();
            if (records[q.id] && !records[q.id].lastIncorrect) {
                // 正解した問題なのでリストから削除
                activeQuestions.splice(currentIdx, 1);
                // 削除したため、インデックスはそのまま進めずに次のロードへ
                if (currentIdx >= activeQuestions.length) {
                    currentIdx = 0;
                }
                loadQuestion();
                return;
            }
        }

        if (currentIdx < activeQuestions.length - 1) {
            currentIdx++;
        } else {
            currentIdx = 0; // ループ
        }
        loadQuestion();
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    }

    function changePlayMode(mode) {
        playMode = mode;
        
        document.getElementById('mode-normal').className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-slate-200 hover:border-indigo-200";
        document.getElementById('mode-random').className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-slate-200 hover:border-indigo-200";
        document.getElementById('mode-weak').className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-slate-200 hover:border-indigo-200";
        
        document.getElementById('mode-' + mode).className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-indigo-600 bg-indigo-50/10 ring-1 ring-indigo-600";
        
        initQuizFlow();
    }

    function changeYearFilter(year) {
        yearFilter = year;
        initQuizFlow();
    }

    // 動的にデータベースから年度（重複なし）を取得してセレクトボックスを生成する
    function populateYearFilter() {
        const select = document.getElementById('year-filter');
        const years = [...new Set(quizData.map(q => q.year))].sort((a, b) => b - a); // 降順
        
        years.forEach(yr => {
            const opt = document.createElement('option');
            opt.value = yr;
            opt.innerText = yr + "年度（必須問題）";
            select.appendChild(opt);
        });
    }

    function updateStatsPanel() {
        const records = getStorage();
        let totalAttempts = 0;
        let totalCorrect = 0;
        
        const list = document.getElementById('weak-questions-list');
        list.innerHTML = "";
        let hasWeak = false;

        quizData.forEach(q => {
            if (records[q.id]) {
                const r = records[q.id];
                totalAttempts += r.attempts;
                totalCorrect += r.correct;
                
                // 現在「直近不正解」マークがついているものを弱点として表示
                if (r.lastIncorrect) {
                    hasWeak = true;
                    const item = document.createElement('div');
                    item.className = "py-4 flex items-start justify-between gap-4 text-xs md:text-sm";
                    item.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded text-[10px]">${q.year}年 問${q.num}</span>
                                <span class="text-slate-400 font-bold">${r.correct}勝 / ${r.attempts}敗</span>
                            </div>
                            <p class="text-slate-600 font-semibold line-clamp-2">${q.text}</p>
                        </div>
                        <button class="flex-shrink-0 bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-lg transition-all text-[11px]" onclick="startSpecificQuestion('${q.id}')">
                            解く
                        </button>
                    `;
                    list.appendChild(item);
                }
            }
        });

        // 弱点から直接遷移して1問特訓する機能
        window.startSpecificQuestion = function(qId) {
            const q = quizData.find(item => item.id === qId);
            if (q) {
                playMode = 'normal'; // 一旦通常にして該当の1問のみの仮想リストを作る
                activeQuestions = [q];
                currentIdx = 0;
                switchTab('quiz');
                loadQuestion();
            }
        }

        // 各種バッジの件数更新など
        document.getElementById('stat-total-attempts').innerText = totalAttempts;
        const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
        document.getElementById('stat-overall-accuracy').innerText = accuracy + "%";

        if (!hasWeak) {
            list.innerHTML = `
                <div class="text-center py-8">
                    <p class="text-slate-400 text-sm font-semibold">現在、間違えている問題（弱点）はありません！</p>
                </div>`;
        }
    }

    function clearAllData() {
        if (confirm("全ての学習データ、これまでの解答記録、弱点リストを完全にリセットします。よろしいですか？")) {
            try {
                localStorage.removeItem('yakugaku_quiz_records_v13');
            } catch (e) {}
            updateStatsPanel();
            changePlayMode('normal');
            initQuizFlow();
            switchTab('quiz');
        }
    }

    window.onload = function() {
        populateYearFilter();
        changePlayMode('normal'); // 通常モードで開始
        switchTab('quiz');        // 最初に問題演習タブを開く
    }
</script>
</body>
</html>
