<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        /* Custom scrollbar for list containers */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-12">

<!-- Top Navigation Bar -->
<header class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
            <h1 class="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400">
                総合演習Ⅰ 過去問マスター
            </h1>
            <p class="text-xs text-slate-400 font-medium mt-1">日本薬局方・生薬学・生物・薬理・衛生等</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="global-year" class="bg-slate-800 text-teal-300 font-bold text-sm px-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400" onchange="filterQuestionsByYear(this.value)">
                <option value="2025" selected>2025年度 (問1〜問90)</option>
                <option value="2023">2023年度 (選択問題抜粋)</option>
                <option value="2022">2022年度 (選択問題抜粋)</option>
                <option value="2021">2021年度 (選択問題抜粋)</option>
                <option value="all">全年度ミックス</option>
            </select>
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-center">
                <span class="text-[10px] block text-slate-400 font-bold">正答率</span>
                <span id="header-accuracy" class="text-sm font-black text-teal-400">0%</span>
            </div>
        </div>
    </div>
</header>

<main class="max-w-5xl w-full mx-auto px-4 mt-6 flex-grow grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Left column: Settings & Progress -->
    <div class="space-y-6">
        <!-- Modes & Settings -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-teal-500 rounded-full"></span>
                出題モード
            </h3>
            <div class="grid grid-cols-1 gap-2">
                <button id="btn-mode-normal" class="flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition" onclick="setMode('normal')">
                    <div>
                        <div class="text-sm font-bold text-slate-800">順次出題</div>
                        <div class="text-xs text-slate-400 mt-0.5">番号順にじっくり挑戦</div>
                    </div>
                    <span class="w-2.5 h-2.5 rounded-full bg-teal-500"></span>
                </button>
                <button id="btn-mode-random" class="flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition" onclick="setMode('random')">
                    <div>
                        <div class="text-sm font-bold text-slate-800">シャッフル</div>
                        <div class="text-xs text-slate-400 mt-0.5">ランダムな順番で力試し</div>
                    </div>
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-200"></span>
                </button>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-100">
                <button class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition" onclick="resetStats()">
                    学習進捗データを初期化
                </button>
            </div>
        </div>

        <!-- Mini Stats Box -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
                進捗ステータス
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 rounded-xl p-3 text-center">
                    <span class="text-[10px] text-slate-400 font-bold block mb-1">正解数</span>
                    <span id="stat-correct" class="text-xl font-black text-emerald-600">0</span>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 text-center">
                    <span class="text-[10px] text-slate-400 font-bold block mb-1">誤答数</span>
                    <span id="stat-wrong" class="text-xl font-black text-rose-500">0</span>
                </div>
            </div>
            <!-- Progress Bar -->
            <div>
                <div class="flex justify-between text-xs font-bold text-slate-500 mb-1.5">
                    <span>進捗率</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2">
                    <div id="progress-bar" class="bg-teal-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Question Navigation Grid -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-amber-500 rounded-full"></span>
                問題一覧
            </h3>
            <div id="grid-nav" class="grid grid-cols-5 sm:grid-cols-9 lg:grid-cols-5 gap-1.5 max-h-[220px] overflow-y-auto pr-1">
                <!-- Buttons dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Right Column: Interactive Quiz Area -->
    <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 relative">
            <!-- Top Status Indicator -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-6">
                <div class="flex items-center gap-2">
                    <span id="badge-year" class="bg-slate-100 text-slate-700 font-extrabold text-xs px-3 py-1.5 rounded-lg">2025年度</span>
                    <span id="badge-num" class="bg-teal-50 text-teal-700 font-extrabold text-xs px-3 py-1.5 rounded-lg">問 1</span>
                </div>
                <button id="btn-star" class="text-slate-300 hover:text-amber-400 transition" onclick="toggleBookmark()">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                </button>
            </div>

            <!-- Problem Statement -->
            <div class="mb-6">
                <p id="problem-text" class="text-base sm:text-lg font-bold leading-relaxed text-slate-800">
                    問題文がここに読み込まれます。
                </p>
                
                <!-- Dynamic Image Loader with error fallbacks -->
                <div id="image-wrap" class="mt-4 hidden">
                    <div class="bg-slate-50 rounded-2xl border border-slate-200 p-4 flex flex-col items-center justify-center max-w-full overflow-hidden">
                        <img id="problem-img" src="" alt="問題の図" class="max-h-[300px] object-contain rounded-lg shadow-sm" onerror="handleImageError()">
                        <div id="image-error-text" class="text-xs text-slate-400 mt-2 italic font-bold">図を読み込み中...</div>
                    </div>
                </div>
            </div>

            <!-- Interactive Options -->
            <div id="options-wrap" class="space-y-3">
                <!-- Generated choice buttons -->
            </div>

            <!-- Instant Correction Panel -->
            <div id="correction-box" class="mt-6 p-4 rounded-2xl border hidden">
                <div class="flex items-center gap-2 mb-1.5">
                    <span id="correction-icon" class="text-xl"></span>
                    <span id="correction-status" class="font-black text-sm uppercase tracking-wider"></span>
                </div>
                <p id="correction-desc" class="text-xs sm:text-sm font-medium leading-relaxed"></p>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex items-center justify-between gap-4 mt-8 pt-5 border-t border-slate-100">
                <button class="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition text-sm flex items-center gap-1.5" onclick="goToPrev()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    前へ
                </button>
                <button id="btn-reveal" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition text-sm shadow-sm" onclick="revealAnswer()">
                    正解・解説を見る
                </button>
                <button class="px-5 py-3 bg-teal-500 hover:bg-teal-600 text-white font-bold rounded-xl transition text-sm flex items-center gap-1.5" onclick="goToNext()">
                    次へ
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <!-- High-quality Bookmarks / Revision helper -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-amber-500 rounded-full"></span>
                復習用ブックマーク・要注意問題リスト
            </h3>
            <p class="text-[11px] text-slate-400 mb-4">右上の星印★を押すとここに登録され、いつでも振り返ることができます。</p>
            <div id="bookmark-list" class="divide-y divide-slate-100 max-h-[200px] overflow-y-auto">
                <div class="text-center py-6 text-xs text-slate-400 font-bold italic">現在、お気に入り問題はありません。</div>
            </div>
        </div>
    </div>
</main>

<script>
    // Robust local question storage with full parameters
    const masterQuestions = [
        // ==================== 2025年度 ====================
        { id: "2025-1", year: "2025", num: 1, text: "日本薬局方の医薬品は、その医薬品名の前後にどのような括弧を付けて示すか。", options: ["「 」", "( )", "[ ]", "{ }"], answer: 0, explanation: "日本薬局方通則15により、公式医薬品であることを明示する場合、医薬品名や物質名の前後に「 」（かぎかっこ）を付ける規定があります。" },
        { id: "2025-2", year: "2025", num: 2, text: "日本薬局方通則における「常温」の温度定義はどれか。", options: ["20℃", "25℃", "15〜25℃", "1〜30℃", "20〜30℃"], answer: 2, explanation: "局方通則における主な温度定義は：標準温度は20℃、常温は15〜25℃、室温は1〜30℃、冷所は1〜15℃（以前の4℃以下から改正）です。" },
        { id: "2025-3", year: "2025", num: 3, text: "日本薬局方通則において、「減圧」は、別に規定するもののほか、どのような圧力を指すか。", options: ["2.0 kPa 以上", "2.0 kPa", "2.0 kPa 以下", "2.0 Pa 以上"], answer: 2, explanation: "局方通則16より、特別な規定がない限り、減圧とは「2.0 kPa以下」の圧力をいいます。" },
        { id: "2025-4", year: "2025", num: 4, text: "医薬品の試験の操作において、「直ちに」とあるのは、通例、前の操作の終了からどれだけの時間内に次の操作を開始することを意味するか。", options: ["30分", "10分", "5分", "1分", "30秒"], answer: 4, explanation: "局方通則29において、操作手順で「直ちに」とあるのは、前の操作を完了させた後、次の操作を「30秒以内」に開始することを指します。" },
        { id: "2025-5", year: "2025", num: 5, text: "定量に供する試料の採取量に「約」を付けたものは、記載された量の±何%の範囲をいうか。", options: ["2%", "5%", "10%", "15%", "20%"], answer: 2, explanation: "局方通則28において、サンプリング採取量の前に「約」を付記した場合は、表記されている数値の±10%の精度範囲を認めます。" },
        { id: "2025-6", year: "2025", num: 6, text: "医薬品各条の定量法で得られる成分含量について、単にある%以上を示し、その上限を示さない場合は、何%を上限とするか。", options: ["110.0%", "105.0%", "101.0%", "100.5%", "100.1%"], answer: 2, explanation: "局方通則33の取り決めにより、成分含量の上限が特別に示されておらず「〇〇%以上」とだけ定義されている場合は、「101.0%」を自明な上限値として処理します。" },
        { id: "2025-7", year: "2025", num: 7, text: "定められた方法で対象微生物が検出されないことを意味する用語はどれか。", options: ["無菌", "滅菌", "消毒", "無菌操作"], answer: 0, explanation: "「無菌（Sterility）」とは、所定の培養テスト等で対象微生物（増殖能のある生菌）が全く存在しない（検出されない）ことが客観的に証明された状態を意味します。" },
        { id: "2025-8", year: "2025", num: 8, text: "局方における「約0.5gを精密に量る」という指示に対して、量り取る操作として適切な表記はどれか。", options: ["0.1539 g", "0.7322 g", "0.4765 g", "0.473 g", "0.5 g"], answer: 2, explanation: "「約0.5g」は±10%（0.45g〜0.55g）の範囲であり、さらに「精密に量る」ため、天秤の最小目盛りに適応した少数第4位まで計量・記録した「0.4765 g」が最適です。" },
        { id: "2025-9", year: "2025", num: 9, text: "質量百万分率を表す記号（単位）はどれか。", options: ["%", "ppm", "vol ppm", "ppb", "w/v%"], answer: 1, explanation: "質量の百万分率を表す国際的な単位記号は「ppm（parts per million）」です。体積比は「vol ppm」になります。" },
        { id: "2025-10", year: "2025", num: 10, text: "溶液の濃度が「(1→10)」で示された場合、定義として正しいものはどれか。", options: ["固形の薬品 1g を 10 mL の溶媒に溶かすこと", "固形の薬品 1 mg を 10 mL の溶媒に溶かすこと", "固形の薬品 1 mg を溶媒に溶かして全量を 10 mL とすること", "液状の薬品 1 mL を 10 mL の溶媒に溶かすこと", "液状の薬品 1 mL を溶媒に溶かして全量を 10 mL とすること"], answer: 4, explanation: "局方通26の定義：「(1→10)」とは、液体薬物1 mLまたは個体薬物1 gを所定の溶媒に溶かし、最終的な全体の体積（調製後総量）を「10 mL」に仕上げる比率のことです。" },
        { id: "2025-11", year: "2025", num: 11, text: "日本薬局方の通則において、「日常の取扱い又は通常の保存状態において、液状又は固形の異物が侵入することを防ぎ、並びに内容医薬品の損失、風解、潮解又は蒸発を防ぐことができる容器」と定義されているのはどれか。", options: ["気密容器", "密閉容器", "密封容器", "遮光容器"], answer: 0, explanation: "液・固体の外来物質侵入だけでなく、風解や水分蒸発を防ぐ中程度の密閉性を持つ容器は「気密容器」と呼びます。（気体の侵入すら防ぐ最強のものは「密封容器」）" },
        { id: "2025-12", year: "2025", num: 12, text: "発熱物質試験法において、試験に用いられるウサギの体重基準として正しいのはどれか。", options: ["1.0 kg 以上", "1.5 kg 以上", "2.0 kg 以上", "2.5 kg 以上"], answer: 1, explanation: "発熱物質試験法では、感度保証のために「体重1.5 kg以上」の良好に管理された健康なウサギを利用することが厳密に義務付けられています。" },
        { id: "2025-13", year: "2025", num: 13, text: "パイロジェン（エンドトキシン）は、一般に何℃で何分以上の加熱処理により完全に不活化されるか。", options: ["250℃、10分以上", "250℃、15分以上", "250℃、20分以上", "250℃、30分以上", "250℃、60分以上"], answer: 3, explanation: "グラム陰性菌に由来するエンドトキシンは強固な耐熱性を持つため、一般のオートクレーブ（121℃）では分解できません。完全に破壊するには「250℃、30分以上」の過酷な乾熱処理が必要です。" },
        { id: "2025-14", year: "2025", num: 14, text: "D値の定義について、共試微生物の何%を死滅させ、生存数を1/10に低下させるのに要する時間、または照射線量をいうか。", options: ["85%", "90%", "95%", "99%"], answer: 1, explanation: "D値（Decay Value）は、対象の微生物集団を1/10（生存数を10%、すなわち「90%を死滅」）にするための加熱時間または放射線照射量に相当します。" },
        { id: "2025-15", year: "2025", num: 15, text: "硫酸塩試験において、本品0.40gを溶かして検液50mLとした。比較液に0.005mol/L硫酸0.40mLを用いたとき、本品における硫酸塩（SO₄²⁻として）の限度はどれか。ただし、SO₄の式量を96とする。", options: ["0.48%以下", "0.048%以下", "0.024%以下", "0.48ppm以下", "0.048ppm以下"], answer: 1, explanation: "0.005 mol/L H₂SO₄ 0.40 mL中のSO₄²⁻量は 2.0 × 10⁻⁶ molです。その重さは 2.0 × 10⁻⁶ mol × 96 g/mol = 0.192 mg。検体0.40 g (= 400 mg) に対する存在割合は (0.192 mg / 400 mg) × 100 = 0.048% となり、2番が正解です。" },
        { id: "2025-16", year: "2025", num: 16, text: "重金属試験法（第1法）において、検液と呈色（黒褐色）を比較する「比較液」の調製に用いられる金属標準液はどれか。", options: ["銅標準液", "銀標準液", "鉛標準液", "亜鉛標準液", "水銀標準液"], answer: 2, explanation: "重金属試験法は、生じた硫化物の色（黒褐色）を同一条件下で「鉛標準液」より誘導した比較用溶液と比較し、含有量を規制します。" },
        { id: "2025-17", year: "2025", num: 17, text: "有機窒素をアンモニアに変えて蒸留・回収する、窒素定量法（セミミクロキルダール法）の蒸留装置を使用する試験法はどれか。", options: ["アルコール数測定法", "融点測定法", "蒸留試験法", "窒素定量法"], answer: 3, explanation: "アタッチメントやキルダールフラスコを巧みに構成した蒸留キットは、窒素量を測定するための「窒素定量法（セミミクロキルダール法）」で使用される器具です。" },
        { id: "2025-18", year: "2025", num: 18, text: "ヒ素試験法において、呈色比較の対象となる限度基準は、何の物質としての質量分率（ppm）で表されるか。", options: ["AsO₄", "ASO", "AsH₃", "As₂O₃", "As³⁺"], answer: 3, explanation: "ヒ素試験法では、得られる呈色変化の比較指標を「三酸化二ヒ素（As₂O₃）」としての含有濃度（ppm）として規定しています。" },
        { id: "2025-19", year: "2025", num: 19, text: "鉱油試験法は、注射剤および何の剤形に用いる「非水性溶剤中の鉱油（混入不純物）」を検出するための試験法か。", options: ["軟膏剤", "散剤", "坐剤", "チンキ剤", "点眼剤"], answer: 4, explanation: "鉱油試験法は、注射剤および「点眼剤」に使われる非水性溶媒（油脂等）に有害な機械・鉱物性油が混入していないかを確認する純度試験です。" },
        { id: "2025-20", year: "2025", num: 20, text: "アルコール数測定法において、アルコール数とは「15℃において試料いくら（何mL）当たり」から得られるエタノール層の量（mL）を指すか。", options: ["1L", "100 mL", "10 mL", "1 mL", "0.1 mL"], answer: 2, explanation: "アルコール数は、「15℃条件において試料10 mL」から分離して得られる純粋なエタノール体積（mL）を数値化したものです。" },
        { id: "2025-21", year: "2025", num: 21, text: "酸素フラスコ燃焼法において、試験の対象（この方法で燃焼・分解させて検出できるもの）とならない元素はどれか。", options: ["塩素", "フッ素", "イオウ", "セレン", "ナトリウム"], answer: 4, explanation: "酸素フラスコ燃焼法は有機分子を純酸素下で強燃焼させ、ハロゲン類（F, Cl, Br, I）やS、Seなどの酸性気体誘発成分を液相に捕集して検出します。不揮発性のナトリウムは対象になりません。" },
        { id: "2025-22", year: "2025", num: 22, text: "紫外可視吸光度測定法における紫外部（200〜400 nm）の測定に用いられる光源として、最も適切なものはどれか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 2, explanation: "200〜400 nmの短波長である紫外部の測定用光源には「重水素放電管」が適切です。（400 nm超の可視領域はタングステンランプを用います）" },
        { id: "2025-23", year: "2025", num: 23, text: "原子吸光光度法において、特定元素の基底状態原子を励起するために用いられる光源（中空陰極ランプ等）以外のものとして何が使用されるか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 1, explanation: "原子吸光では特定元素のシャープな吸収を得るために「中空陰極ランプ」やガス励起式の「放電ランプ（無電極放電ランプ）」を主要光源として用います。" },
        { id: "2025-24", year: "2025", num: 24, text: "蛍光光度法において、試料分子を励起して強力な蛍光を得るために一般的に用いられる光源はどれか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 4, explanation: "励起のための強力な連続光源が必要な分光蛍光法には、紫外から可視領域を幅広くカバーする超高輝度な「キセノンランプ」が最適です。" },
        { id: "2025-25", year: "2025", num: 25, text: "屈折率測定法において、別に規定がない限り測定に用いられる単色光はどれか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 0, explanation: "屈折率計で基準として利用される単色光は、「ナトリウムスペクトルのD線（波長 589.3 nm）」です。" },
        { id: "2025-26", year: "2025", num: 26, text: "旋光度測定法において、光学活性物質の偏光面回転角度（旋光度）を測定するために用いられる単色光はどれか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 0, explanation: "屈折率測定法と同じく、特定の偏光条件を一定に保つための標準光源として「ナトリウムD線」を使用します。" },
        { id: "2025-27", year: "2025", num: 27, text: "クロマトグラフィーのパラメータにおいて、クロマトグラム上の2つのピーク相互の保持時間の関係（比）を示す値はどれか。", options: ["分離係数 (α)", "シンメトリー係数 (S)", "保持容量 (Vr)", "理論段数 (N)", "理論段高さ (H)"], answer: 0, explanation: "分離係数（α）は、2成分がどれだけ離れているかを「ピークの保持比の比」として示した指標です。" },
        { id: "2025-28", year: "2025", num: 28, text: "紫外可視吸光度測定法における「ランベルト・ベールの法則」において、吸光度（A）と直接比例関係にあるのはどれか。", options: ["透過度", "透過率", "試料の濃度", "比吸光度の対数", "モル吸光係数の対数"], answer: 2, explanation: "A = ε・c・l において、吸光度Aは「試料溶液のモル濃度（c）」およびセル光路長（l）に完全に直線比例します。" },
        { id: "2025-29", year: "2025", num: 29, text: "次の測定法のうち、最も波長が長い（エネルギーが低い）電磁波を用いるのはどれか。", options: ["赤外吸収スペクトル法", "核磁気共鳴スペクトル測定法", "X線回折測定法", "紫外可視吸光度測定法", "蛍光光度法"], answer: 1, explanation: "核磁気共鳴（NMR）で使用されるラジオ波は、他の紫外・可視・赤外光・X線に比べて極めて波長が長く、エネルギーが一番低い電磁波です。" },
        { id: "2025-30", year: "2025", num: 30, text: "分子量 410.51 である医薬品の波長 242 nm におけるモル吸光係数 ε が 1.62 × 10⁴ であるとき、比吸光度 E(1%, 1cm) の値はどれか。", options: ["537", "395", "53.7", "39.5", "3.95"], answer: 1, explanation: "E(1%, 1cm) = (ε × 10) / MWの関係式を用います。E = (16200 × 10) / 410.51 = 162000 / 410.51 = 394.63。最も近いのは「395」です。" },
        
        // --- 2025 画像付き問題セクション ---
        { id: "2025-65", year: "2025", num: 65, text: "真核細胞における遺伝子発現プロセスを示した模式図がある。不要な配列であるイントロンの認識・除去を行い、成熟mRNAを作るのに不可欠なこの過程「ア」は何か。", image: "2025 Q65.png", options: ["転写", "逆転写", "スプライシング", "翻訳", "レプリケーション"], answer: 2, explanation: "スプライシングにより、ゲノム配列から転写されたRNA一次プレ前駆体よりイントロンを除去し、エキソンを接続して翻訳用の成熟mRNAを作ります。" },
        { id: "2025-66", year: "2025", num: 66, text: "細胞内シグナル伝達物質の一つである「cAMP」を5'-AMPに分解して、シグナル活性を消去・減衰させる図中の酵素「A」はどれか。", image: "2025 Q66.png", options: ["アデニル酸シクラーゼ", "ホスホジエステラーゼ (PDE)", "プロテインキナーゼA (PKA)", "ホスホリパーゼC (PLC)", "カルモジュリン"], answer: 1, explanation: "ホスホジエステラーゼ（PDE）はセカンドメッセンジャーであるcAMPまたはcGMPを分解し、細胞内情報伝達を制御するための重要なオフスイッチ役です。" },
        { id: "2025-67", year: "2025", num: 67, text: "右図はマクロファージによる「食作用（ファゴサイトーシス）」の模式図である。図中の番号のうち、リソソームとファゴソームが合体して形成され、内部で化学的消化が展開される「ファゴリソソーム」を指すのはどれか。", image: "2025 Q67.png", options: ["①", "②", "③", "④", "⑤"], answer: 3, explanation: "異物（①）を巻き込んで出来た食胞ファゴソーム（③）に加水分解酵素を持つリソソーム（②）が融合して完成した活性消化区画は「ファゴリソソーム（④）」と呼ばれます。" },
        { id: "2025-72", year: "2025", num: 72, text: "右の図はDNAの特異的相補塩基対（アデニンとチミン）の構造を示したものである。アデニン（A）とチミン（T）の間で結ばれている「水素結合」の数は何本か。", image: "2025 Q72.png", options: ["1本", "2本", "3本", "4本"], answer: 1, explanation: "DNA二重らせんの塩基対形成において、アデニン・チミン（A-T）の結合数は「2本」、グアニン・シトシン（G-C）の水素結合は「3本」です。" },
        { id: "2025-77", year: "2025", num: 77, text: "右図は、人間上半身骨格の模式図である。図の指示線のうち、「鎖骨（さこつ）」を明示しているのは何番か。", image: "2025 Q77.png", options: ["①", "②", "③", "④", "⑤"], answer: 0, explanation: "首のすぐ下で横方向に綺麗に伸びる「①」が「鎖骨」です。②は胸骨、③は肋骨、④は上腕骨です。" },
        { id: "2025-82", year: "2025", num: 82, text: "右の図は代表的なプリン塩基構造式である。このうち、プリン環6位にアミノ基を持つ「アデニン」はどちらか。", image: "2025 Q82.png", options: ["① (アデニン)", "② (グアニン)"], answer: 0, explanation: "①はアデニン（6-アミノプリン）です。②は2位にアミノ基と6位にカルボニル酸素を持つグアニンです。" },
        { id: "2025-88", year: "2025", num: 88, text: "右図は、小腸絨毛における栄養物質の吸収メカニズムを示したものである。再合成されたキロミクロンが、血中に入る前に経由する図中の太いリンパ管「ア」の名称はどれか。", image: "2025 Q88.png", options: ["毛細血管", "門脈", "微絨毛", "乳糜管 (にゅうびかん)", "集合管"], answer: 3, explanation: "疎水性の高く分子が巨大なキロミクロンは毛細血管に入れず、絨毛中央にある隙間の大きなリンパ管「乳糜管（にゅうびかん）」に入って、胸管から大静脈へ送られます。" },

        // ==================== 2023年度抜粋 ====================
        { id: "2023-1", year: "2023", num: 1, text: "自律神経系において、交感神経が優位に働いたときに起こる身体の反応として正しいのはどれか。", options: ["瞳孔の縮小", "心拍数の増加", "胃腸の運動促進", "気管支の収縮"], answer: 1, explanation: "交感神経優位時は、闘争に適した状態にするため心拍数の増加、気管支の拡張、瞳孔散大（瞳孔の拡大）が生じ、非緊急用の胃腸活動は抑制されます。" },
        { id: "2023-2", year: "2023", num: 2, text: "生薬カンゾウ（甘草）の基原植物の分類科として正しいのはどれか。", options: ["マメ科", "ナス科", "クスノキ科", "ボタン科"], answer: 0, explanation: "甘草（カンゾウ）の基原植物はGlycyrrhiza属であり、「マメ科」に分類されます。" },
        { id: "2023-3", year: "2023", num: 3, text: "ヒトの血清中に最も多く存在し、胎盤を通過して新生児に移行（受動免疫）できる抗体のクラスはどれか。", options: ["IgA", "IgE", "IgG", "IgM"], answer: 2, explanation: "血中抗体の8割を占める「IgG」は、抗体クラスの中で唯一能動輸送により「胎盤を通過できる」極めて重要な特徴を持ちます。" },

        // ==================== 2022年度抜粋 ====================
        { id: "2022-1", year: "2022", num: 77, text: "三胚葉の発生過程において、大腸の内壁上皮や消化腺（肝臓・膵臓など）の起源となる胚葉はどれか。", options: ["内胚葉", "外胚葉", "中胚葉"], answer: 0, explanation: "「内胚葉」は主に呼吸器や、大腸を含む消化管内壁の粘膜上皮、そこから分岐発展する肝臓や膵臓などに分化します。" },
        { id: "2022-2", year: "2022", num: 80, text: "真核生物であり、細胞壁の主成分としてキチン、細胞膜にエルゴステロールを有し、ミトコンドリアを持つのはどれか。", options: ["マイコプラズマ", "ウイルス", "真菌", "細菌"], answer: 2, explanation: "「真菌」はカビや酵母、キノコの仲間で、キチン質細胞壁やエルゴステロールを特徴とする高等な「真核生物」に分類されます。" },

        // ==================== 2021年度抜粋 ====================
        { id: "2021-1", year: "2021", num: 79, text: "主たる発症機序がⅡ型アレルギー（細胞障害型アレルギー）に分類される疾患はどれか。", options: ["スギ花粉症", "アトピー性皮膚炎", "薬剤性溶血性貧血", "接触性皮膚炎", "糸球体腎炎"], answer: 2, explanation: "自己の細胞に結合した薬物等への抗体反応により、補体・食細胞が自細胞を破壊する「薬剤性溶血性貧血」は代表的なⅡ型アレルギーです。(花粉症・アトピーはⅠ型、かぶれはⅣ型)" }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let mode = 'normal'; // 'normal' or 'random'
    let selectedYear = '2025';
    let bookmarks = [];

    // Initialize Application
    window.onload = function() {
        // Load settings & bookmarks from local storage
        if(localStorage.getItem('pharm_bookmarks')) {
            bookmarks = JSON.parse(localStorage.getItem('pharm_bookmarks'));
        }
        
        filterQuestionsByYear(selectedYear);
        updateStatsUI();
        renderBookmarkList();
    };

    function filterQuestionsByYear(year) {
        selectedYear = year;
        if (year === 'all') {
            currentQuestions = [...masterQuestions];
        } else {
            currentQuestions = masterQuestions.filter(q => q.year === year);
        }
        
        // Sort in logical manner
        currentQuestions.sort((a, b) => {
            if (a.year !== b.year) return parseInt(b.year) - parseInt(a.year); // Newer year first
            return a.num - b.num;
        });

        if (mode === 'random') {
            shuffleArray(currentQuestions);
        }

        currentIdx = 0;
        loadQuestion(currentIdx);
        renderNavigationGrid();
        updateProgressUI();
    }

    function setMode(newMode) {
        mode = newMode;
        // Update selection UI buttons
        document.getElementById('btn-mode-normal').className = newMode === 'normal' 
            ? "flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition"
            : "flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition";
            
        document.getElementById('btn-mode-random').className = newMode === 'random'
            ? "flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition"
            : "flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition";

        // Refresh filter
        filterQuestionsByYear(selectedYear);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Load active question data into HTML rendering fields
    function loadQuestion(idx) {
        if (currentQuestions.length === 0) return;
        const q = currentQuestions[idx];
        
        document.getElementById('badge-year').innerText = q.year + "年度";
        document.getElementById('badge-num').innerText = "問 " + q.num;
        document.getElementById('problem-text').innerText = q.text;

        // Reset bookmark star state
        const isBookmarked = bookmarks.includes(q.id);
        document.getElementById('btn-star').className = isBookmarked 
            ? "text-amber-400 hover:text-amber-500 transition" 
            : "text-slate-300 hover:text-amber-400 transition";

        // Configure Image Display
        const imgWrap = document.getElementById('image-wrap');
        const imgEl = document.getElementById('problem-img');
        const errorText = document.getElementById('image-error-text');

        if (q.image) {
            imgWrap.classList.remove('hidden');
            // 安全のためにURL（半角スペース等）をエンコードしてsrcにセットします
            imgEl.src = encodeURI(q.image);
            imgEl.classList.add('hidden'); // hidden until loaded
            errorText.classList.remove('hidden');
            errorText.innerText = "画像をロード中...";
        } else {
            imgWrap.classList.add('hidden');
            imgEl.src = "";
        }

        // Generate Option Choices
        const optionsWrap = document.getElementById('options-wrap');
        optionsWrap.innerHTML = "";
        
        q.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:border-slate-300 hover:bg-slate-50 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            btn.onclick = () => submitAnswer(oIdx);
            btn.innerHTML = `
                <span class="bg-slate-100 text-slate-700 w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs">${oIdx + 1}</span>
                <span class="text-slate-800 leading-relaxed">${opt}</span>
            `;
            optionsWrap.appendChild(btn);
        });

        // Hide Correction panel and reset reveal button text
        document.getElementById('correction-box').classList.add('hidden');
        document.getElementById('btn-reveal').innerText = "正解・解説を見る";

        // Highlight active navigation button
        updateNavigationHighlight(idx);
        updateProgressUI();
    }

    // Handle missing/unsupported image loading gracefully
    function handleImageError() {
        const errorText = document.getElementById('image-error-text');
        const activeQ = currentQuestions[currentIdx];
        if (activeQ && activeQ.image) {
            errorText.innerHTML = `
                <div class="text-center p-2">
                    <p class="text-slate-500 font-bold text-sm">[ ${activeQ.image} ]</p>
                    <p class="text-[11px] text-slate-400 mt-1">※プレビュー環境のため、図表は上記の該当PDF資料（問${activeQ.num}）を併せてご参照ください。</p>
                </div>
            `;
        }
    }

    // Image onLoad success trigger
    document.getElementById('problem-img').onload = function() {
        document.getElementById('problem-img').classList.remove('hidden');
        document.getElementById('image-error-text').classList.add('hidden');
    };

    function submitAnswer(chosenIdx) {
        const q = currentQuestions[currentIdx];
        const isCorrect = (chosenIdx === q.answer);
        
        // Log answer history
        saveAnswerRecord(q.id, isCorrect);
        
        revealAnswer(isCorrect, chosenIdx);
        updateStatsUI();
    }

    function revealAnswer(forcedCorrectState = null, chosenIdx = null) {
        const q = currentQuestions[currentIdx];
        const correctionBox = document.getElementById('correction-box');
        const cIcon = document.getElementById('correction-icon');
        const cStatus = document.getElementById('correction-status');
        const cDesc = document.getElementById('correction-desc');

        correctionBox.classList.remove('hidden');

        let isCorrect = forcedCorrectState;
        if (isCorrect === null) {
            // Natural check from manual clicking "Reveal" button
            isCorrect = true; // Default view as correct representation
        }

        if (chosenIdx !== null) {
            if (isCorrect) {
                correctionBox.className = "mt-6 p-5 rounded-2xl bg-emerald-50 border border-emerald-200 text-emerald-900";
                cIcon.innerText = "✓";
                cStatus.innerText = "正解";
                cDesc.innerHTML = `<span class="font-bold">あなたの選んだ選択肢: ${chosenIdx + 1}</span><br><br>${q.explanation}`;
            } else {
                correctionBox.className = "mt-6 p-5 rounded-2xl bg-rose-50 border border-rose-200 text-rose-900";
                cIcon.innerText = "✗";
                cStatus.innerText = "不正解";
                cDesc.innerHTML = `<span class="font-bold">正解は： 選択肢 ${q.answer + 1}</span><br><span class="text-xs text-rose-600 block mt-1">あなたの選んだ選択肢: ${chosenIdx + 1}</span><br>${q.explanation}`;
            }
        } else {
            // General "Reveal" click
            correctionBox.className = "mt-6 p-5 rounded-2xl bg-slate-100 border border-slate-200 text-slate-800";
            cIcon.innerText = "💡";
            cStatus.innerText = "正解提示";
            cDesc.innerHTML = `<span class="font-bold block mb-2 text-indigo-700">正解: 選択肢 ${q.answer + 1}</span>${q.explanation}`;
        }

        // Apply highlights on choice buttons
        const optionsWrap = document.getElementById('options-wrap');
        Array.from(optionsWrap.children).forEach((btn, idx) => {
            if (idx === q.answer) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50/30 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            } else if (chosenIdx !== null && idx === chosenIdx) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-50/30 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            } else {
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 opacity-60 font-bold text-sm sm:text-base flex items-start gap-3 transition";
            }
        });

        document.getElementById('btn-reveal').innerText = "解説表示中";
    }

    function goToNext() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            loadQuestion(currentIdx);
        }
    }

    function goToPrev() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion(currentIdx);
        }
    }

    // Dynamic Navigation Grid Generator
    function renderNavigationGrid() {
        const grid = document.getElementById('grid-nav');
        grid.innerHTML = "";

        currentQuestions.forEach((q, idx) => {
            const btn = document.createElement('button');
            btn.id = "nav-btn-" + idx;
            btn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none";
            btn.innerText = q.num;
            
            // Check past performance of this question to color-code
            const records = getAnswerHistory();
            if (records[q.id] === true) {
                btn.className += " border-emerald-200 bg-emerald-50 text-emerald-700";
            } else if (records[q.id] === false) {
                btn.className += " border-rose-200 bg-rose-50 text-rose-700";
            } else {
                btn.className += " border-slate-200 bg-white text-slate-600 hover:bg-slate-50";
            }

            btn.onclick = () => {
                currentIdx = idx;
                loadQuestion(idx);
            };
            grid.appendChild(btn);
        });
    }

    function updateNavigationHighlight(activeIdx) {
        currentQuestions.forEach((_, idx) => {
            const btn = document.getElementById("nav-btn-" + idx);
            if (btn) {
                if (idx === activeIdx) {
                    btn.classList.add('ring-2', 'ring-indigo-500', 'scale-105', 'z-10');
                } else {
                    btn.classList.remove('ring-2', 'ring-indigo-500', 'scale-105', 'z-10');
                }
            }
        });
    }

    function updateProgressUI() {
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        const pct = ((currentIdx + 1) / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = pct + "%";
    }

    // Local Storage - Answer History persistence
    function getAnswerHistory() {
        return JSON.parse(localStorage.getItem('pharm_history') || '{}');
    }

    function saveAnswerRecord(questionId, isCorrect) {
        const history = getAnswerHistory();
        history[questionId] = isCorrect;
        localStorage.setItem('pharm_history', JSON.stringify(history));
        
        // Refresh individual nav button color without total rebuild
        const activeNavBtn = document.getElementById("nav-btn-" + currentIdx);
        if (activeNavBtn) {
            if (isCorrect) {
                activeNavBtn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none border-emerald-200 bg-emerald-50 text-emerald-700 ring-2 ring-indigo-500";
            } else {
                activeNavBtn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none border-rose-200 bg-rose-50 text-rose-700 ring-2 ring-indigo-500";
            }
        }
    }

    function updateStatsUI() {
        const history = getAnswerHistory();
        let correctCount = 0;
        let wrongCount = 0;

        Object.values(history).forEach(val => {
            if (val === true) correctCount++;
            if (val === false) wrongCount++;
        });

        document.getElementById('stat-correct').innerText = correctCount;
        document.getElementById('stat-wrong').innerText = wrongCount;

        const totalAnswered = correctCount + wrongCount;
        const accuracyPct = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
        
        document.getElementById('header-accuracy').innerText = accuracyPct + "%";
    }

    function resetStats() {
        if (confirm("これまでの解答履歴を完全に削除してよろしいですか？")) {
            localStorage.removeItem('pharm_history');
            updateStatsUI();
            renderNavigationGrid();
            loadQuestion(currentIdx);
        }
    }

    // Bookmark Features
    function toggleBookmark() {
        const activeQ = currentQuestions[currentIdx];
        const bIdx = bookmarks.indexOf(activeQ.id);

        if (bIdx > -1) {
            bookmarks.splice(bIdx, 1);
        } else {
            bookmarks.push(activeQ.id);
        }

        localStorage.setItem('pharm_bookmarks', JSON.stringify(bookmarks));
        loadQuestion(currentIdx); // Toggle star graphic
        renderBookmarkList();
    }

    function renderBookmarkList() {
        const wrap = document.getElementById('bookmark-list');
        wrap.innerHTML = "";

        if (bookmarks.length === 0) {
            wrap.innerHTML = '<div class="text-center py-6 text-xs text-slate-400 font-bold italic">現在、お気に入り問題はありません。</div>';
            return;
        }

        bookmarks.forEach(bId => {
            const originQ = masterQuestions.find(q => q.id === bId);
            if (!originQ) return;

            const div = document.createElement('div');
            div.className = "py-2 px-3 hover:bg-slate-50 transition flex items-center justify-between text-xs sm:text-sm font-bold text-slate-700 cursor-pointer mb-1 border rounded-lg border-slate-100";
            div.innerHTML = `
                <div class="flex-grow flex items-center gap-2" onclick="loadSpecificQuestionByID('${originQ.id}')">
                    <span class="bg-indigo-50 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded">${originQ.year}年 問${originQ.num}</span>
                    <span class="truncate max-w-[200px] sm:max-w-md font-medium text-slate-600">${originQ.text}</span>
                </div>
                <button class="text-rose-400 hover:text-rose-600 px-1" onclick="removeBookmarkDirectly('${originQ.id}')">✕</button>
            `;
            wrap.appendChild(div);
        });
    }

    function loadSpecificQuestionByID(qId) {
        // Toggle filter view to contain the target year to prevent out-of-index bugs
        const targetQ = masterQuestions.find(q => q.id === qId);
        if (targetQ) {
            document.getElementById('global-year').value = targetQ.year;
            filterQuestionsByYear(targetQ.year);
            const listIdx = currentQuestions.findIndex(q => q.id === qId);
            if (listIdx > -1) {
                currentIdx = listIdx;
                loadQuestion(currentIdx);
            }
        }
    }

    function removeBookmarkDirectly(qId) {
        bookmarks = bookmarks.filter(id => id !== qId);
        localStorage.setItem('pharm_bookmarks', JSON.stringify(bookmarks));
        renderBookmarkList();
        // sync main button graphics if active
        if (currentQuestions[currentIdx] && currentQuestions[currentIdx].id === qId) {
            loadQuestion(currentIdx);
        }
    }
</script>

</body>
</html>
