<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-12">

<header class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div>
            <h1 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400">
                総合演習Ⅰ 過去問マスター
            </h1>
        </div>
        <div class="flex items-center gap-3">
            <select id="global-year" class="bg-slate-800 text-teal-300 font-bold text-sm px-3 py-2 rounded-lg" onchange="filterQuestionsByYear(this.value)">
                <option value="2025" selected>2025年度</option>
                <option value="2023">2023年度</option>
                <option value="2022">2022年度</option>
                <option value="2021">2021年度</option>
                <option value="all">全年度ミックス</option>
            </select>
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg text-center">
                <span id="header-accuracy" class="text-sm font-black text-teal-400">0%</span>
            </div>
        </div>
    </div>
</header>

<main class="max-w-5xl w-full mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
    <div class="space-y-6">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black mb-3">出題モード</h3>
            <button id="btn-mode-normal" class="w-full text-left p-3 rounded-xl border-2 border-teal-500 bg-teal-50" onclick="setMode('normal')">順次出題</button>
            <button id="btn-mode-random" class="w-full text-left p-3 rounded-xl border mt-2" onclick="setMode('random')">シャッフル</button>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black mb-3">問題ナビゲーション</h3>
            <div id="grid-nav" class="grid grid-cols-5 gap-1.5 max-h-[250px] overflow-y-auto"></div>
        </div>
    </div>

    <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between border-b pb-4 mb-4">
                <span id="badge-year" class="bg-slate-100 px-3 py-1 rounded text-xs font-bold">2025年度</span>
                <span id="badge-num" class="bg-teal-50 text-teal-700 px-3 py-1 rounded text-xs font-bold">問 1</span>
            </div>
            <p id="problem-text" class="text-base sm:text-lg font-bold mb-4">問題を読み込み中...</p>
            
            <div id="image-wrap" class="mb-4 hidden">
                <img id="problem-img" src="" alt="問題 of 図" class="max-h-[300px] mx-auto rounded-lg shadow" onerror="handleImageError()">
                <p id="image-error-text" class="text-xs text-center text-rose-500 mt-2 hidden"></p>
            </div>

            <div id="options-wrap" class="space-y-2"></div>
            <div id="correction-box" class="mt-4 p-4 rounded-xl hidden"></div>

            <div class="flex justify-between mt-6 pt-4 border-t">
                <button class="px-4 py-2 bg-slate-100 rounded-lg" onclick="goToPrev()">前へ</button>
                <button id="btn-reveal" class="px-4 py-2 bg-indigo-600 text-white rounded-lg" onclick="revealAnswer()">解説を見る</button>
                <button class="px-4 py-2 bg-teal-500 text-white rounded-lg" onclick="goToNext()">次へ</button>
            </div>
        </div>
    </div>
</main>

<script>
    let masterQuestions = [];
    let currentQuestions = [];
    let currentIdx = 0;
    let mode = 'normal';
    let selectedYear = '2025';

    // JSONファイルからデータを一括で安全に読み込む
    async function loadQuestionsFromJSON() {
        try {
            const response = await fetch('questions.json');
            masterQuestions = await response.json();
            filterQuestionsByYear(selectedYear);
        } catch (error) {
            document.getElementById('problem-text').innerText = "問題データ(questions.json)の読み込みに失敗しました。GitHubにファイルがあるか確認してください。";
        }
    }

    window.onload = function() {
        loadQuestionsFromJSON();
    };

    function filterQuestionsByYear(year) {
        selectedYear = year;
        currentQuestions = year === 'all' ? [...masterQuestions] : masterQuestions.filter(q => q.year === year);
        currentQuestions.sort((a, b) => a.num - b.num);
        if (mode === 'random') shuffleArray(currentQuestions);
        currentIdx = 0;
        loadQuestion(currentIdx);
        renderNavigationGrid();
    }

    function loadQuestion(idx) {
        if (currentQuestions.length === 0) return;
        const q = currentQuestions[idx];
        document.getElementById('badge-year').innerText = q.year + "年度";
        document.getElementById('badge-num').innerText = "問 " + q.num;
        document.getElementById('problem-text').innerText = q.text;

        const imgWrap = document.getElementById('image-wrap');
        const imgEl = document.getElementById('problem-img');
        const errorText = document.getElementById('image-error-text');

        if (q.image) {
            imgWrap.classList.remove('hidden');
            imgEl.src = encodeURI(q.image);
            imgEl.classList.remove('hidden');
            errorText.classList.add('hidden');
        } else {
            imgWrap.classList.add('hidden');
        }

        const optionsWrap = document.getElementById('options-wrap');
        optionsWrap.innerHTML = "";
        q.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-3 border rounded-xl hover:bg-slate-50 font-medium transition";
            btn.onclick = () => submitAnswer(oIdx);
            btn.innerText = `${oIdx + 1}. ${opt}`;
            optionsWrap.appendChild(btn);
        });

        document.getElementById('correction-box').classList.add('hidden');
        document.getElementById('btn-reveal').innerText = "正解・解説を見る";
    }

    function handleImageError() {
        const errorText = document.getElementById('image-error-text');
        const activeQ = currentQuestions && currentQuestions[currentIdx];
        if (!activeQ) return; // データ未ロード時のエラーを防ぐガード文を追加

        errorText.classList.remove('hidden');
        errorText.innerHTML = `画像「${activeQ.image || ''}」が見つかりません。HTMLと同じ場所にアップロードされているか、名前が正しいか確認してください。`;
        document.getElementById('problem-img').classList.add('hidden');
    }

    function submitAnswer(chosenIdx) {
        const q = currentQuestions[currentIdx];
        const box = document.getElementById('correction-box');
        box.classList.remove('hidden');
        if (chosenIdx === q.answer) {
            box.className = "mt-4 p-4 rounded-xl bg-emerald-50 text-emerald-900 border border-emerald-200";
            box.innerHTML = `<b>✓ 正解！</b><br><br>${q.explanation}`;
        } else {
            box.className = "mt-4 p-4 rounded-xl bg-rose-50 text-rose-900 border border-rose-200";
            box.innerHTML = `<b>✗ 不正解... (正解は選択肢 ${q.answer + 1})</b><br><br>${q.explanation}`;
        }
    }

    function revealAnswer() {
        const q = currentQuestions[currentIdx];
        const box = document.getElementById('correction-box');
        box.className = "mt-4 p-4 rounded-xl bg-slate-100 text-slate-800 border";
        box.innerHTML = `<b>正解: 選択肢 ${q.answer + 1}</b><br><br>${q.explanation}`;
        box.classList.remove('hidden');
    }

    function renderNavigationGrid() {
        const grid = document.getElementById('grid-nav');
        grid.innerHTML = "";
        currentQuestions.forEach((q, idx) => {
            const btn = document.createElement('button');
            btn.className = "p-2 border rounded text-xs bg-white text-center font-bold";
            btn.innerText = q.num;
            btn.onclick = () => { currentIdx = idx; loadQuestion(idx); };
            grid.appendChild(btn);
        });
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    function setMode(m) { mode = m; filterQuestionsByYear(selectedYear); }
    function goToNext() { if (currentIdx < currentQuestions.length - 1) { currentIdx++; loadQuestion(currentIdx); } }
    function goToPrev() { if (currentIdx > 0) { currentIdx--; loadQuestion(currentIdx); } }
</script>
</body>
</html>
