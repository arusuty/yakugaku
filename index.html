<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-black mb-6">総合演習Ⅰ 過去問マスター</h1>
        <div id="content" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <p id="problem-text" class="text-lg font-bold mb-6">読み込み中...</p>
            <div id="options-wrap" class="space-y-3"></div>
        </div>
    </div>

<script>
    // 1. ここに questions.json の中身を直接貼り付けました
    const masterQuestions = [
        // ★ここに questions.json の [ ] の中身をすべて貼り付けてください ★
    ];

    let currentQuestions = masterQuestions;
    let currentIdx = 0;

    function loadQuestion(idx) {
        const q = currentQuestions[idx];
        document.getElementById('problem-text').innerText = `問${q.num}: ${q.text}`;
        const wrap = document.getElementById('options-wrap');
        wrap.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 font-bold";
            btn.innerText = (i+1) + ": " + opt;
            wrap.appendChild(btn);
        });
    }

    // 初期起動
    if (masterQuestions.length > 0) {
        loadQuestion(0);
    } else {
        document.getElementById('problem-text').innerText = "データが空です。questions.jsonの中身を貼り付けてください。";
    }
</script>
</body>
</html>
