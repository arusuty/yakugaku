        { id: "2021_q55", year: "2021", num: 55, text: "生薬の確認試験において、前問の呈色反応（マグネシウム-塩酸反応による赤〜赤紫色）の実施が規定されている、ヘスペリジンを含むミカン科の生薬はどれか。", options: ["1. コウボク", "2. ショウキョウ", "3. タイソウ", "4. チンピ", "5. レンギョウ"], answer: 3, explanation: "ミカン科の「チンピ（陳皮）」はフラボノイドの一種であるヘスペリジンを含有するため、その確認試験としてマグネシウム-塩酸反応が用いられます。" },
        { id: "2021_q56", year: "2021", num: 56, text: "ニンヒドリン試薬を加えて加熱した際、特徴的な赤紫色（または黄色）の呈色を示す生薬成分クラスはどれか。", options: ["1. サポニン", "2. 還元糖", "3. タンニン", "4. アミノ酸", "5. トリテルペン"], answer: 3, explanation: "ニンヒドリンは、アミノ基を有する「アミノ酸」やタンパク質、ペプチドと反応して紫色系の呈色を示します。" },
        { id: "2021_q57", year: "2021", num: 57, text: "日本薬局方における確認試験項目として、「液体クロマトグラフィー（HPLC）」を用いた比較測定が規定されている、ベルベリン等のアルカロイドを含むキンポウゲ科の生薬はどれか。", options: ["1. オウレン", "2. コウカ", "3. シゴカ", "4. チョウトウコウ", "5. ボタンピ"], answer: 0, explanation: "キンポウゲ科の「オウレン（黄連）」は、ベルベリンなどのアルカロイドを含み、局方の確認試験では液体クロマトグラフィーが規定されています。" },
        { id: "2021_q58", year: "2021", num: 58, text: "確認試験において、トリテルペンやステロイド骨格の検出に用いられる「リーベルマン・バッハガード反応（Liebermann-Burchard反応）」が規定されている、ウコギ科の生薬はどれか。", options: ["1. アマチャ", "2. コウカ", "3. サンヤク", "4. ニンジン", "5. ホミカ"], answer: 3, explanation: "「ニンジン（人参）」はトリテルペンサポニン（ジンセノシド）を含有するため、無水酢酸と濃硫酸を用いるリーベルマン反応が確認試験に規定されています。" },
        { id: "2021_q59", year: "2021", num: 59, text: "生薬レンニク（蓮肉）の確認試験において、1-ナフトールと硫酸を加えた際に呈色（モリッシュ反応：Molisch反応）を示す成分クラスはどれか。", options: ["1. 糖類", "2. 脂質", "3. 蛋白質", "4. アルカロイド", "5. サポニン"], answer: 0, explanation: "1-ナフトールと硫酸を用いるモリッシュ反応は「糖類（炭水化物）」の代表的な検出反応です。レンニクに含まれるデンプン等の糖類を検出します。" },
        { id: "2021_q60", year: "2021", num: 60, text: "薄層クロマトグラフィー（TLC）による確認試験を行う生薬と、比較に用いる規定の「標準品」の組み合わせとして正しいのはどれか。", options: ["1. アロエ / アロエエモジン", "2. オウバク / ベルベリン", "3. コウボク / マグノクラリン", "4. ボタンピ / ペオニフロリン", "5. ダイオウ / センノシドA"], answer: 1, explanation: "ミカン科の「オウバク（黄柏）」は、ベルベリンなどのアルカロイドを含む生薬であり、確認試験では「ベルベリン塩化物（ベルベリン）標準品」が対照に用いられます（アロエはバーバロイン、ボタンピはペオノール）。" },
        { id: "2021_q61", year: "2021", num: 61, text: "ヒトの脂質代謝において、パルミチン酸（炭素数16の飽和脂肪酸）が「β酸化」を受けてエネルギー（アセチルCoA）を産生する、細胞内の主要な小器官はどこか。", options: ["1. 核", "2. ゴルジ体", "3. 細胞質", "4. 小胞体", "5. ミトコンドリア"], answer: 4, explanation: "脂肪酸のβ酸化を担う酵素群群は、主として「ミトコンドリア」のマトリクス内に存在し、ここで脂肪酸が効率よくエネルギーへと変換されます。" },
        { id: "2021_q62", year: "2021", num: 62, text: "次の多価不飽和脂肪酸のうち、n-3（オメガ3）系多価不飽和脂肪酸に分類されるものはどれか。", options: ["1. アラキドン酸", "2. オレイン酸", "3. リノール酸", "4. α-リノレン酸", "5. γ-リノレン酸"], answer: 3, explanation: "メチル末端から3番目の炭素に最初の二重結合をもつ「α-リノレン酸（n-3）」やEPA、DHAがn-3系に分類されます。リノール酸、γ-リノレン酸、アラキドン酸はn-6系です。" },
        { id: "2021_q63", year: "2021", num: 63, text: "ヒトの染色体において、複製の限界を決める末端の保護構造であり、特徴的な反復塩基配列を有する、図の矢印（両端）に示される構造の名称はどれか。", options: ["1. 動原体", "2. セントロメア", "3. 紡錘糸", "4. 核小体", "5. テロメア"], answer: 4, explanation: "染色体の両末端に存在する、DNA保護のための特殊な構造領域を「テロメア」と呼びます。細胞分裂に伴い短縮し、老化や細胞寿命に関与します。" },
        { id: "2021_q64", year: "2021", num: 64, text: "リボソームでのタンパク質翻訳過程において、mRNA上のコドンに対応した「特定のアミノ酸」と結合し、それをリボソームへと運搬するRNAはどれか。", options: ["1. mRNA", "2. miRNA", "3. rRNA", "4. tRNA", "5. siRNA"], answer: 3, explanation: "アミノ酸をリボソームへ運ぶクレーンの役割を担うのは「tRNA（転移RNA / トランスファーRNA）」です。" },
        { id: "2021_q65", year: "2021", num: 65, text: "腎臓において、原尿の濾過を行う重要な濾過装置（腎小体）を、血管の塊である「糸球体」とともに構成している、糸球体を包む嚢状の構造はどれか。", options: ["1. ボーマン嚢", "2. 集合管", "3. 近位尿細管", "4. ヘンレのループ", "5. 遠位尿細管"], answer: 0, explanation: "糸球体と、それを包む「ボーマン嚢」を合わせた構造体を「腎小体（毛細血管の塊＋尿の受け皿）」と呼び、ここで血漿の濾過が行われます。" },
        { id: "2021_q66", year: "2021", num: 66, text: "血管内皮細胞などにおいて、一酸化窒素合成酵素（NOS）の直接の基質（材料）となり、強力な血管拡張作用をもつ一酸化窒素（NO）を生成するアミノ酸はどれか。", options: ["1. L-トリプトファン", "2. L-グルタミン酸", "3. L-アルギニン", "4. L-リシン", "5. L-アスパラギン"], answer: 2, explanation: "「L-アルギニン」は一酸化窒素合成酵素（NOS）の基質であり、酸化されることでL-シトルリンと一酸化窒素（NO）を生成し、血管拡張に関与します。" },
        { id: "2021_q67", year: "2021", num: 67, text: "ヒトの母乳や唾液、腸管分泌液などの分泌液中に、J鎖を介した「二量体（ダイマー）」として存在し、乳児や粘膜の感染防御（局所免疫）を担う免疫グロブリンはどれか。", options: ["1. IgG", "2. IgA", "3. IgM", "4. IgD", "5. IgE"], answer: 1, explanation: "「IgA」は、分泌液中で主に二量体として存在し、病原体の侵入を防ぐ粘膜免疫の主役です。母乳（特に初乳）を通じて乳児へ移行し、感染から守ります。" },
        { id: "2021_q68", year: "2021", num: 68, text: "生物化学的な分析手法のうち、抗原と抗体による特異的な「抗原抗体反応（免疫反応）」をまったく利用しない、DNA検出手法はどれか。", options: ["1. ラジオイムノアッセイ (RIA)", "2. 酵素免疫測定法 (ELISA)", "3. ポリメラーゼ連鎖反応 (PCR) 法", "4. ウエスタンブロット法", "5. 赤血球凝集反応"], answer: 2, explanation: "「PCR法」は、DNAの相補的な結合と耐熱性DNAポリメラーゼによる酵素増幅反応であり、抗原抗体反応は用いません。その他は抗原抗体反応を利用した免疫測定・判定法です。" },
        { id: "2021_q69", year: "2021", num: 69, text: "ウイルスのゲノム分類において、ゲノムの構成成分（核酸の種類）として「DNA（デオキシリボ核酸）」を保有するものはどれか。", options: ["1. インフルエンザウイルス", "2. ポリオウイルス", "3. C型肝炎ウイルス", "4. ヒト免疫不全ウイルス(HIV)", "5. ヒトパピローマウイルス (HPV)"], answer: 4, explanation: "「ヒトパピローマウイルス（HPV）」は環状二本鎖の「DNAウイルス」です。他の選択肢（インフルエンザ、ポリオ、C型肝炎、HIV）はすべてゲノム核酸がRNAの「RNAウイルス」です。" },
        { id: "2021_q70", year: "2021", num: 70, text: "胃粘膜に生息するヘリコバクター・ピロリが、尿素をアンモニアへと分解して強酸性の胃内環境を中和し、自己の生存領域を確保するために用いる最も特徴的な酵素はどれか。", options: ["1. アルギナーゼ", "2. グルタミナーゼ", "3. クレアチンキナーゼ", "4. デアミナーゼ", "5. ウレアーゼ"], answer: 4, explanation: "ピロリ菌は「ウレアーゼ」を多量に発現しており、胃液中の尿素をアンモニアとCO2に分解して周囲の酸を中和（塩基性化）します。" },
        { id: "2021_q71", year: "2021", num: 71, text: "次の多糖類のうち、D-マンノース分子がβ-1,4-結合により重合した、こんにゃくや酵母細胞壁の主要多糖として知られる「マンナン」の正しい重合構造式はどれか。", options: ["1. 構造式1", "2. 構造式2", "3. 構造式3", "4. 構造式4", "5. 構造式5"], answer: 4, explanation: "マンノースのピラノース環が直鎖状に結合した「構造式5」がD-マンナンの正しい構造式です。マンノースは2位のOH基が上を向いています。" },
        { id: "2021_q72", year: "2021", num: 72, text: "翻訳された直後のタンパク質の成熟プロセス（翻訳後修飾）において、糖の還元末端がアミノ酸の側鎖ヒドロキシ基に共有結合する「O-結合型糖鎖修飾（グリコシル化）」を受けるアミノ酸残基はどれか。", options: ["1. L-アラニン", "2. L-グルタミン酸", "3. L-システイン", "4. L-トリプトファン", "5. L-トレオニン"], answer: 4, explanation: "O-結合型糖鎖修飾は、セリン（Ser）または「L-トレオニン（Thr）」の側鎖にあるヒドロキシ基（-OH）に対して糖鎖が結合します。L-アスパラギンのアミド窒素に結合するものは「N-結合型」です。" },
        { id: "2021_q73", year: "2021", num: 73, text: "DNA（デオキシリボ核酸）の構造、特徴に関する記述のうち、正しいのはどれか。", options: ["1. 構成する塩基は、アデニン、グアニン、シトシン及びウラシルである。", "2. アデニンと水素結合による相補的な対を形成する相手方の塩基はチミンである。", "3. ヌクレオチドを構成する五炭糖（ペントース）としてD-リボースを含む。", "4. 真核細胞がもつ、ヒトの染色体DNAは末端のない巨大な環状構造をとる。", "5. 生理的（水溶液中）条件下において、DNAは主に左巻きのらせん構造（Z型）をとる。"], answer: 1, explanation: "2：DNAではアデニン(A)とチミン(T)、グアニン(G)とシトシン(C)が対を形成するため正しいです。1：ウラシルはRNA。3：構成糖はデオキシリボース。4：真核生物ゲノムは線状DNA。5：主に右巻き（B型）です。" },
        { id: "2021_q74", year: "2021", num: 74, text: "ヒトの皮膚の角質層、爪、毛髪（髪の毛）などの主要な組織構成材料であり、ジスルフィド結合（S-S結合）を豊富に含む硬質の線維性タンパク質はどれか。", options: ["1. アクチン", "2. ケラチン", "3. コラーゲン", "4. チューブリン", "5. ヒストン"], answer: 1, explanation: "毛や爪、角質層の主成分は「ケラチン」と呼ばれる線維性タンパク質です。システイン残基に富み、強固なS-S架橋によって構造が保たれます。" },
        { id: "2021_q75", year: "2021", num: 75, text: "三胚葉の発生過程において、消化管（胃、小腸、大腸など）の内壁上皮や、そこから派生する肺・気道の上皮、肝臓、膵臓などの内臓上皮組織の起源となる胚葉はどれか。", options: ["1. 骨", "2. 心臓", "3. 表皮", "4. 大腸", "5. 脊髄"], answer: 3, explanation: "「大腸」などの消化管の内壁や、消化器・呼吸器関連の主要上皮組織は「内胚葉」を起源とします。骨や心臓は中胚葉、皮膚の表皮や脊髄は外胚葉から発生します。" },
        { id: "2021_q76", year: "2021", num: 76, text: "ヒトの消化器系の全体図において、胃の幽門部に直接繋がり、胆管や膵管が合流するファーター乳頭が位置する「十二指腸」を示す番号はどれか。(1=胃、2=十二指腸、3=小腸、4=大腸、5=直腸)", options: ["1. 1 (胃)", "2. 2 (十二指腸：C字型の屈曲部)", "3. 3 (小腸)", "4. 4 (大腸)", "5. 5 (直腸)"], answer: 1, explanation: "胃から続くC字型の小腸起始部である「十二指腸（図中の2）」を示します。胆汁や膵液を導入して本格的な化学消化をスタートします。" },
        { id: "2021_q77", year: "2021", num: 77, text: "ホルモンとその生理作用、分泌の関係に関する組み合わせのうち、生理的に「誤っている」ものはどれか。", options: ["1. ガストリン ･･･ 胃壁からの胃酸（塩酸）分泌の促進", "2. セクレチン ･･･ 重炭酸イオン（HCO3-）を豊富に含むアルカリ性膵液の分泌促進", "3. カルシトニン ･･･ 骨の破壊を抑制し、血液中のCa2+濃度を増加させる作用", "4. インスリン ･･･ 骨格筋や脂肪組織への糖の取り込みを高め、血中グルコースを減少させる作用", "5. アルドステロン ･･･ 腎臓の遠位尿細管・集合管において、Na+およびCl-の再吸収を促進する作用"], answer: 2, explanation: "3が誤り（正解）です。甲状腺から分泌される「カルシトニン」は、骨吸収を抑制して血液中のCa2+濃度を「低下」させる働きをします（血中Ca2+濃度を増加させるのは副甲状腺ホルモンのパラトルモンです）。" },
        { id: "2021_q78", year: "2021", num: 78, text: "主に活性化されたT細胞などから分泌され、細胞障害性T細胞（キラーT細胞）の増殖・活性化を直接誘発し、生体の抗ウイルス・抗腫瘍活性を強力に高めるサイトカインはどれか。", options: ["1. インターフェロン (IFN-α)", "2. インターロイキン2 (IL-2)", "3. エリスロポエチン (EPO)", "4. 腫瘍壊死因子 (TNF-α)", "5. 顆粒球コロニー刺激因子 (G-CSF)"], answer: 1, explanation: "「インターロイキン2 (IL-2)」は、T細胞（キラーT細胞、ヘルパーT細胞）やNK細胞の増殖・活性化を強力に誘導する中心的なサイトカインです。" },
        { id: "2021_q79", year: "2021", num: 79, text: "アレルギー反応のクームス分類（Ⅰ〜Ⅳ型）において、標的細胞に結合した自己抗体に対して補体やマクロファージが作用し、細胞が直接傷害される「Ⅱ型（組織障害型・細胞障害型）アレルギー」に分類される臨床疾患はどれか。", options: ["1. スギ花粉症", "2. アトピー性皮膚炎", "3. 薬剤性溶血性貧血", "4. 接触性皮膚炎", "5. 糸球体腎炎"], answer: 2, explanation: "「薬剤性溶血性貧血」や自己免疫性溶血性貧血、不適合輸血などは「Ⅱ型アレルギー」に分類されます。赤血球などの細胞表面に抗体が結合して破壊が起こります。花粉症・アトピーはⅠ型、接触性皮膚炎はⅣ型、糸球体腎炎はⅢ型です。" },
        { id: "2021_q80", year: "2021", num: 80, text: "肺炎などを引き起こす病原微生物「マイコプラズマ」に関する構造および生化学的特徴に関する記述のうち、正しいのはどれか。", options: ["1. 核膜を有する真核生物である。", "2. 一般細菌よりもかなり大型の構造をもつ。", "3. ペプチドグリカンからなる硬い細胞壁をもつ。", "4. 人工の培地（寒天培地など）では増殖（自己複製）させることができない。", "5. ヒトや動物に対する病原性は知られていない。"], answer: 0, explanation: "1（原核生物である。選択肢画像で「1. 原核生物である」に対応）が正しいです。マイコプラズマは「細胞壁をもたない原核生物」であり、一般の細菌より非常に小さく、ウイルスとは違って栄養を含む「人工培地で自己増殖可能」です。病原性として肺炎マイコプラズマが有名です。" },
        { id: "2021_q81", year: "2021", num: 81, text: "ヒトの胃とその周辺の接続を示した模式図において、食道から胃が始まる接合部である「噴門（ふんもん）」と対をなし、十二指腸へと繋がる胃の出口のゲートである「幽門（ゆうもん）」を示す番号はどれか。(1=食道側・噴門、2=胃底、3=胃体、4=十二指腸側・幽門、5=十二指腸)", options: ["1. 1 (噴門)", "2. 2 (胃底)", "3. 3 (胃体)", "4. 4 (幽門)", "5. 5 (十二指腸)"], answer: 3, explanation: "胃の末端に位置し、十二指腸への移行部の括約筋ゲートを「幽門（図中の4）」と呼びます。ここが緩んだり締まったりすることで、消化された内容物が十二指腸へ少しずつ送られます。" },
        { id: "2021_q82", year: "2021", num: 82, text: "ヒトの副腎（腎臓の上部）において、外側の「副腎皮質（皮質）」の中間層である「束状層（そくじょうそう）」から刺激に応じて主に分泌される糖質コルチコイドはどれか。", options: ["1. コルチゾール", "2. アルドステロン", "3. テストステロン", "4. ノルアドレナリン", "5. アドレナリン"], answer: 0, explanation: "副腎皮質の「束状層」からは、抗炎症や血糖上昇作用をもつ糖質コルチコイドの「コルチゾール」が分泌されます（球状層からはアルドステロン、網状層からはアンドロゲン、髄質からはアドレナリン）。" },
        { id: "2021_q83", text: "上皮細胞において、細胞の構造を維持する線維状の細胞骨格のうち、細胞の中心付近（中心体）から放射状に細胞全体へと張り巡らされ、細胞内の物質輸送ルートとなる「微小管（マイクロチューブル）」を正しく描写した図はどれか。(※図中の灰色の丸は細胞核)", options: ["1. 図1 (微絨毛の内部：アクチン)", "2. 図2 (デスモソーム：中間径フィラメント / ケラチン)", "3. 図3 (中心体から放射状：微小管ネットワーク)", "4. 図4 (細胞接着：インテグリン)", "5. 図5 (ギャップ結合など)"], answer: 2, explanation: "微小管は中心体（核の近傍）を起点として、細胞質全体に放射状に広がるダイナミックなネットワーク「図3」を形成します（微絨毛の軸はアクチン、デスモソーム架橋はケラチン中間径フィラメントです）。" },
        { id: "2021_q84", year: "2021", num: 84, text: "ミカエリス・メンテン型の酵素反応において、基質濃度[S]と反応速度の関係を表す「通常の双曲線（S字型ではない）」が正確に描写され、[S] = Kmのときに反応初速度が1/2 Vmaxに達することを示した正しいグラフ形状はどれか。", options: ["1. グラフ1 (正解：通常の双曲線。[S]=Kmの時に速度が1/2 Vmaxに達する)", "2. グラフ2 (変形シグモイド)", "3. グラフ3 (指数関数増加型)", "4. グラフ4 (アロステリック酵素：S字シグモイド)", "5. グラフ5 (逆双曲線)"], answer: 0, explanation: "ミカエリス・メンテン式に従う標準的な単量体酵素は、単純な「双曲線（グラフ1）」を描き、反応速度が最大（Vmax）のちょうど半分に達するときの基質濃度[S]がKmとなります。" },
        { id: "2021_q85", year: "2021", num: 85, text: "カビや酵母などの「真菌（Fungi）」類の細胞構造および生物学的特徴に関する記述のうち、正しいのはどれか。", options: ["1. 細胞核や小器官をもたない原核生物である。", "2. 胞子とは別に、細菌（ウエルシュ菌等）のように熱に非常に強い「芽胞」を直接形成する。", "3. 細胞壁の主成分は、植物と同じセルロース（多糖）である。", "4. 動物細胞と同様に、細胞膜成分としてコレステロールを豊富に自己合成・蓄積する。", "5. 真核生物特有の「80S リボソーム（細胞質）」を有する。"], answer: 4, explanation: "5：真菌は真核生物であるため、原核生物（70Sリボソーム）とは異なり「80Sリボソーム」を保有するため正しいです。1：真核生物です。2：芽胞は細菌のもの。3：壁成分はキチンやグルカン。4：膜成分はエルゴステロールです。" },
        { id: "2021_q86", year: "2021", num: 86, text: "胃底腺に存在する「主細胞」から直接不活性な前駆体として分泌され、胃酸の酸性環境下で活性化されて強力な消化酵素（プロテアーゼ）となる物質はどれか。", options: ["1. ペプシノーゲン", "2. 内因子", "3. 胃酸", "4. ガストリン", "5. 胃粘液"], answer: 0, explanation: "胃底腺の「主細胞」からは、タンパク質分解酵素の前駆体である「ペプシノーゲン」が分泌されます（酸を分泌するのは壁細胞、ペプシノーゲンが酸で切断されて活性型ペプシンになります）。" },
        { id: "2021_q87", year: "2021", num: 87, text: "必須アミノ酸である「L-トリプトファン」を出発材料（前駆体）とし、脳内の神経伝達物質や松果体のメラトニンの前駆体として非常に重要な役割を担うインドールアミン系物質はどれか。", options: ["1. セロトニン", "2. ドパミン", "3. アドレナリン", "4. ノルアドレナリン", "5. チロシン"], answer: 0, explanation: "「L-トリプトファン」は、水酸化および脱炭酸されるプロセスを経て、脳内の重要な神経伝達物質（かつ気分に関与する）「セロトニン（5-HT）」へと変換されます。" },
        { id: "2021_q88", year: "2021", num: 88, text: "必須アミノ酸である「フェニルアラニン」が、水酸化酵素（フェニルアラニン水酸化酵素）の働きによって直接水酸化されて生合成されるアミノ酸（チロシンの化学構造式）はどれか。", options: ["1. 構造式1", "2. 構造式2", "3. 構造式3 (フェニルアラニンの芳香環にOH基が1つついたチロシンの構造式)", "4. 構造式4", "5. 構造式5"], answer: 2, explanation: "「構造式3」がフェニルアラニンのパラ位が水酸化されたアミノ酸である「L-チロシン」の正しい化学構造式です。これが不足するとフェニルケトン尿症に直結します。" },
        { id: "2021_q89", year: "2021", num: 89, text: "真核細胞において、核の中に存在する各種ヒストンタンパク質や転写制御因子（核内タンパク質）が「実際に合成（アミノ酸の重合・翻訳）される場所」はどこか。", options: ["1. 核小体", "2. ミトコンドリア", "3. リボソーム", "4. リソソーム", "5. ゴルジ体"], answer: 2, explanation: "核内で働くタンパク質であっても、すべてのタンパク質は核の外部の「リボソーム（細胞質）」で合成（翻訳）された後、核移行シグナル（NLS）を介して核膜孔から核内へと選択的にインポートされます。" },
        { id: "2021_q90", year: "2021", num: 90, text: "分子生物学の実験室において、抽出したmRNA（一本鎖）を鋳型として、その塩基配列に相補的な二本鎖DNA（cDNA）を人工的に合成する際に必須となる酵素はどれか。", options: ["1. DNA リガーゼ", "2. 逆転写酵素", "3. DNA ポリメラーゼ", "4. プライマーゼ", "5. トポイソメラーゼ"], answer: 1, explanation: "RNAを鋳型として相補的なDNA（cDNA）を逆方向に合成するユニークな酵素は「逆転写酵素（リバース・トランスクリプターゼ）」です。RT-PCRなどに多用されます。" }
    ];

    let playMode = 'normal'; // 'normal', 'random', 'weak', 'short_random'
    let yearFilter = '2023';  // デフォルト年度
    let activeQuestions = [];
    let currentIdx = 0;
    let hasAnswered = false;

    // ローカルストレージキーの定義
    const STORAGE_KEY = 'yakugaku_quiz_records_v15';

    function getStorage() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            const parsed = data ? JSON.parse(data) : {};
            
            // 互換性補完
            for (let id in parsed) {
                if (parsed[id].lastIncorrect === undefined) {
                    parsed[id].lastIncorrect = (parsed[id].correct < parsed[id].attempts);
                }
            }
            return parsed;
        } catch (e) {
            return {};
        }
    }

    function saveRecord(qId, isCorrect) {
        let records = getStorage();
        if (!records[qId]) {
            records[qId] = { attempts: 0, correct: 0, lastIncorrect: false };
        }
        records[qId].attempts += 1;
        
        if (isCorrect) {
            records[qId].correct += 1;
            records[qId].lastIncorrect = false; // 弱点から解除
        } else {
            records[qId].lastIncorrect = true;  // 弱点に登録
        }

        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        } catch (e) {}
        updateStatsPanel();
    }

    function switchTab(tabName) {
        document.getElementById('quiz-panel').classList.add('hidden');
        document.getElementById('stats-panel').classList.add('hidden');
        document.getElementById('settings-panel').classList.add('hidden');
        
        document.getElementById('t-quiz').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";
        document.getElementById('t-stats').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";
        document.getElementById('t-settings').className = "flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition-all duration-200";

        document.getElementById(tabName + '-panel').classList.remove('hidden');
        document.getElementById('t-' + tabName).className = "flex-1 py-3 text-sm font-bold rounded-lg text-indigo-600 bg-white shadow-sm border border-slate-100 transition-all duration-200";
        
        if (tabName === 'stats') {
            updateStatsPanel();
        }
    }

    function initQuizFlow() {
        const records = getStorage();
        const yearSelect = document.getElementById('year-filter');
        const yearNote = document.getElementById('year-filter-note');

        // モードに応じた年度選択の有効・無効化制御
        if (playMode === 'weak' || playMode === 'short_random') {
            yearSelect.disabled = true;
            yearNote.innerText = "※このモードは自動的に全年度（270問）から出題されます。";
            yearNote.className = "text-xs text-indigo-600 font-bold mt-2";
        } else {
            yearSelect.disabled = false;
            yearNote.innerText = "※選択した年度の90問が出題されます。";
            yearNote.className = "text-xs text-slate-500 font-normal mt-2";
        }

        // 1. 基本問題の抽出 (弱点と15問クイックは全年度270問プール、それ以外は年度フィルター適用)
        let filtered = quizData;
        if (playMode !== 'weak' && playMode !== 'short_random') {
            filtered = quizData.filter(q => q.year === yearFilter);
        }

        // 2. モードによるシャッフル・抽出ロジック
        if (playMode === 'weak') {
            activeQuestions = filtered.filter(q => {
                const r = records[q.id];
                return r && r.lastIncorrect;
            });
            // 弱点補強はごちゃまぜランダム
            activeQuestions.sort(() => Math.random() - 0.5);
            document.getElementById('mode-badge').classList.remove('hidden');
            document.getElementById('mode-badge').innerText = "弱点補強モード";
        } else if (playMode === 'short_random') {
            // 全270問から15問ランダム抽出
            activeQuestions = [...filtered].sort(() => Math.random() - 0.5).slice(0, 15);
            document.getElementById('mode-badge').classList.remove('hidden');
            document.getElementById('mode-badge').innerText = "15問クイック";
        } else if (playMode === 'random') {
            // 選択された年度の90問をランダムシャッフル
            activeQuestions = [...filtered].sort(() => Math.random() - 0.5);
            document.getElementById('mode-badge').classList.add('hidden');
        } else {
            // 通常・番号順（選択された年度の90問）
            activeQuestions = [...filtered].sort((a, b) => a.num - b.num);
            document.getElementById('mode-badge').classList.add('hidden');
        }

        currentIdx = 0;
        loadQuestion();
    }

    function loadQuestion() {
        hasAnswered = false;
        document.getElementById('explanation').classList.add('hidden');
        
        if (activeQuestions.length === 0) {
            document.getElementById('question-meta').innerText = "対象なし";
            document.getElementById('question-counter').innerText = "0 / 0問";
            document.getElementById('question-record').innerText = "戦績: -";
            
            if (playMode === 'weak') {
                document.getElementById('question-text').innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-emerald-600 text-lg font-black mb-2">🎉 素晴らしい！弱点問題はありません</p>
                        <p class="text-slate-400 text-xs font-normal leading-relaxed">
                            通常モードや15問クイックで間違えた問題が出ると、ここに自動で蓄積されます。
                        </p>
                        <button class="mt-5 px-6 py-2.5 bg-slate-800 text-white rounded-xl text-xs font-bold" onclick="switchTab('settings')">
                            出題設定を変更する
                        </button>
                    </div>`;
            } else {
                document.getElementById('question-text').innerText = "該当する問題が存在しません。設定を確認してください。";
            }
            document.getElementById('options-container').innerHTML = "";
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            return;
        }

        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        document.getElementById('next-btn').disabled = false;

        const q = activeQuestions[currentIdx];
        
        // メタデータ & カウンター
        document.getElementById('question-meta').innerText = `${q.year}年 問${q.num}`;
        
        if (playMode === 'weak') {
            document.getElementById('question-counter').innerText = `残り弱点: ${activeQuestions.length - currentIdx}問`;
        } else {
            document.getElementById('question-counter').innerText = `${currentIdx + 1} / ${activeQuestions.length}問目`;
        }
        
        // 過去の戦績
        const records = getStorage();
        if (records[q.id]) {
            const r = records[q.id];
            const rate = r.attempts > 0 ? Math.round((r.correct / r.attempts) * 100) : 0;
            document.getElementById('question-record').innerText = `過去の戦績: ${r.correct}勝 / ${r.attempts}回 (${rate}%)`;
        } else {
            document.getElementById('question-record').innerText = "過去の戦績: 未解答";
        }

        // 本文
        document.getElementById('question-text').innerText = q.text;

        // 選択肢
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:border-indigo-200 hover:bg-indigo-50/20 active:scale-[0.99] font-semibold text-slate-700 text-sm transition-all duration-150";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedIdx) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        const q = activeQuestions[currentIdx];
        const isCorrect = (selectedIdx === q.answer);
        
        // 記録を保存
        saveRecord(q.id, isCorrect);

        const buttons = document.getElementById('options-container').getElementsByTagName('button');
        
        for (let idx = 0; idx < buttons.length; idx++) {
            buttons[idx].disabled = true;
            if (idx === q.answer) {
                // 正解のボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-800 font-bold text-sm shadow-sm";
            } else if (idx === selectedIdx) {
                // 自分が選択して間違えたボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-800 font-bold text-sm shadow-sm";
            } else {
                // その他のボタン
                buttons[idx].className = "w-full text-left p-4 rounded-xl border border-slate-100 bg-slate-50 text-slate-400 text-sm opacity-60";
            }
        }

        // 解説の展開
        document.getElementById('explanation-text').innerText = q.explanation;
        document.getElementById('explanation').classList.remove('hidden');
    }

    function nextQuestion() {
        if (activeQuestions.length === 0) return;
        
        if (playMode === 'weak' && hasAnswered) {
            // 弱点補強モードにおいて正解した場合は、その場で問題プールから除去して詰め直す
            const q = activeQuestions[currentIdx];
            const records = getStorage();
            if (records[q.id] && !records[q.id].lastIncorrect) {
                activeQuestions.splice(currentIdx, 1);
                if (currentIdx >= activeQuestions.length) {
                    currentIdx = 0;
                }
                loadQuestion();
                return;
            }
        }

        if (currentIdx < activeQuestions.length - 1) {
            currentIdx++;
        } else {
            currentIdx = 0; // 最初に戻るループ
        }
        loadQuestion();
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    }

    function changePlayMode(mode) {
        playMode = mode;
        
        // ボタンのアクティブ表現をリセット
        ['normal', 'random', 'short', 'weak'].forEach(id => {
            const el = document.getElementById('mode-' + id);
            if(el) {
                el.className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-slate-200 hover:border-indigo-200";
            }
        });
        
        // 選択されたボタンを強調
        const activeId = mode === 'short_random' ? 'mode-short' : ('mode-' + mode);
        const activeEl = document.getElementById(activeId);
        if (activeEl) {
            activeEl.className = "p-4 border-2 rounded-xl text-left transition-all duration-200 border-indigo-600 bg-indigo-50/10 ring-1 ring-indigo-600";
        }
        
        initQuizFlow();
    }

    function changeYearFilter(year) {
        yearFilter = year;
        initQuizFlow();
    }

    function updateStatsPanel() {
        const records = getStorage();
        let totalAttempts = 0;
        let totalCorrect = 0;
        
        const list = document.getElementById('weak-questions-list');
        list.innerHTML = "";
        let hasWeak = false;

        quizData.forEach(q => {
            if (records[q.id]) {
                const r = records[q.id];
                totalAttempts += r.attempts;
                totalCorrect += r.correct;
                
                // 直近で不正解のものを抽出
                if (r.lastIncorrect) {
                    hasWeak = true;
                    const item = document.createElement('div');
                    item.className = "py-4 flex items-start justify-between gap-4 text-xs md:text-sm";
                    item.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded text-[10px]">${q.year}年 問${q.num}</span>
                                <span class="text-slate-400 font-bold">${r.correct}勝 / ${r.attempts}回解答</span>
                            </div>
                            <p class="text-slate-600 font-semibold line-clamp-2">${q.text}</p>
                        </div>
                        <button class="flex-shrink-0 bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-lg transition-all text-[11px]" onclick="startSpecificQuestion('${q.id}')">
                            解く
                        </button>
                    `;
                    list.appendChild(item);
                }
            }
        });

        // 弱点リストから個別特訓に飛ぶ仕組み
        window.startSpecificQuestion = function(qId) {
            const q = quizData.find(item => item.id === qId);
            if (q) {
                playMode = 'normal';
                activeQuestions = [q];
                currentIdx = 0;
                switchTab('quiz');
                loadQuestion();
            }
        };

        document.getElementById('stat-total-attempts').innerText = totalAttempts;
        const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
        document.getElementById('stat-overall-accuracy').innerText = accuracy + "%";

        if (!hasWeak) {
            list.innerHTML = `
                <div class="text-center py-8">
                    <p class="text-slate-400 text-sm font-semibold">現在、間違えている問題（弱点）はありません！</p>
                </div>`;
        }
    }

    function clearAllData() {
        if (confirm("全ての解答データ、弱点リストを完全にリセットします。本当によろしいですか？")) {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {}
            updateStatsPanel();
            changePlayMode('normal');
            initQuizFlow();
            switchTab('quiz');
        }
    }

    window.onload = function() {
        changePlayMode('normal'); // 初期モード
        switchTab('quiz');        // デフォルト表示タブ
    }
</script>
</body>
</html>
