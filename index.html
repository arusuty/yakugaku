<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬学 総合演習Ⅰ 過去問マスター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        /* Custom scrollbar for list containers */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-12">

<!-- Top Navigation Bar -->
<header class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="text-center sm:text-left">
            <h1 class="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400">
                総合演習Ⅰ 過去問マスター
            </h1>
            <p class="text-xs text-slate-400 font-medium mt-1">日本薬局方・生薬学・生物・薬理・衛生等</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="global-year" class="bg-slate-800 text-teal-300 font-bold text-sm px-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400" onchange="filterQuestionsByYear(this.value)">
                <option value="2025" selected>2025年度 (問1〜問90 完全収録)</option>
                <option value="2023">2023年度 (重要問題 20問)</option>
                <option value="2022">2022年度 (重要問題 20問)</option>
                <option value="2021">2021年度 (重要問題 20問)</option>
                <option value="all">全年度ミックス</option>
            </select>
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-center">
                <span class="text-[10px] block text-slate-400 font-bold">正答率</span>
                <span id="header-accuracy" class="text-sm font-black text-teal-400">0%</span>
            </div>
        </div>
    </div>
</header>

<main class="max-w-5xl w-full mx-auto px-4 mt-6 flex-grow grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Left column: Settings & Progress -->
    <div class="space-y-6">
        <!-- Modes & Settings -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-teal-500 rounded-full"></span>
                出題モード
            </h3>
            <div class="grid grid-cols-1 gap-2">
                <button id="btn-mode-normal" class="flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition" onclick="setMode('normal')">
                    <div>
                        <div class="text-sm font-bold text-slate-800">順次出題</div>
                        <div class="text-xs text-slate-400 mt-0.5">番号順にじっくり挑戦</div>
                    </div>
                    <span class="w-2.5 h-2.5 rounded-full bg-teal-500"></span>
                </button>
                <button id="btn-mode-random" class="flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition" onclick="setMode('random')">
                    <div>
                        <div class="text-sm font-bold text-slate-800">シャッフル</div>
                        <div class="text-xs text-slate-400 mt-0.5">ランダムな順番で力試し</div>
                    </div>
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-200"></span>
                </button>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-100">
                <button class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition" onclick="resetStats()">
                    学習進捗データを初期化
                </button>
            </div>
        </div>

        <!-- Mini Stats Box -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
                進捗ステータス
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 rounded-xl p-3 text-center">
                    <span class="text-[10px] text-slate-400 font-bold block mb-1">正解数</span>
                    <span id="stat-correct" class="text-xl font-black text-emerald-600">0</span>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 text-center">
                    <span class="text-[10px] text-slate-400 font-bold block mb-1">誤答数</span>
                    <span id="stat-wrong" class="text-xl font-black text-rose-500">0</span>
                </div>
            </div>
            <!-- Progress Bar -->
            <div>
                <div class="flex justify-between text-xs font-bold text-slate-500 mb-1.5">
                    <span>進捗率</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2">
                    <div id="progress-bar" class="bg-teal-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Question Navigation Grid -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-amber-500 rounded-full"></span>
                問題一覧
            </h3>
            <div id="grid-nav" class="grid grid-cols-5 sm:grid-cols-9 lg:grid-cols-5 gap-1.5 max-h-[220px] overflow-y-auto pr-1">
                <!-- Buttons dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Right Column: Interactive Quiz Area -->
    <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100 relative">
            <!-- Top Status Indicator -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-6">
                <div class="flex items-center gap-2">
                    <span id="badge-year" class="bg-slate-100 text-slate-700 font-extrabold text-xs px-3 py-1.5 rounded-lg">2025年度</span>
                    <span id="badge-num" class="bg-teal-50 text-teal-700 font-extrabold text-xs px-3 py-1.5 rounded-lg">問 1</span>
                </div>
                <button id="btn-star" class="text-slate-300 hover:text-amber-400 transition" onclick="toggleBookmark()">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                </button>
            </div>

            <!-- Problem Statement -->
            <div class="mb-6">
                <p id="problem-text" class="text-base sm:text-lg font-bold leading-relaxed text-slate-800">
                    問題文がここに読み込まれます。
                </p>
                
                <!-- Dynamic Image Loader with error fallbacks -->
                <div id="image-wrap" class="mt-4 hidden">
                    <div class="bg-slate-50 rounded-2xl border border-slate-200 p-4 flex flex-col items-center justify-center max-w-full overflow-hidden">
                        <img id="problem-img" src="" alt="問題の図" class="max-h-[300px] object-contain rounded-lg shadow-sm" onerror="handleImageError()">
                        <div id="image-error-text" class="text-xs text-slate-400 mt-2 italic font-bold">図を読み込み中...</div>
                    </div>
                </div>
            </div>

            <!-- Interactive Options -->
            <div id="options-wrap" class="space-y-3">
                <!-- Generated choice buttons -->
            </div>

            <!-- Instant Correction Panel -->
            <div id="correction-box" class="mt-6 p-4 rounded-2xl border hidden">
                <div class="flex items-center gap-2 mb-1.5">
                    <span id="correction-icon" class="text-xl"></span>
                    <span id="correction-status" class="font-black text-sm uppercase tracking-wider"></span>
                </div>
                <p id="correction-desc" class="text-xs sm:text-sm font-medium leading-relaxed"></p>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex items-center justify-between gap-4 mt-8 pt-5 border-t border-slate-100">
                <button class="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition text-sm flex items-center gap-1.5" onclick="goToPrev()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    前へ
                </button>
                <button id="btn-reveal" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition text-sm shadow-sm" onclick="revealAnswer()">
                    正解・解説を見る
                </button>
                <button class="px-5 py-3 bg-teal-500 hover:bg-teal-600 text-white font-bold rounded-xl transition text-sm flex items-center gap-1.5" onclick="goToNext()">
                    次へ
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <!-- High-quality Bookmarks / Revision helper -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-sm font-black text-slate-800 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-amber-500 rounded-full"></span>
                復習用ブックマーク・要注意問題リスト
            </h3>
            <p class="text-[11px] text-slate-400 mb-4">右上の星印★を押すとここに登録され、いつでも振り返ることができます。</p>
            <div id="bookmark-list" class="divide-y divide-slate-100 max-h-[200px] overflow-y-auto">
                <div class="text-center py-6 text-xs text-slate-400 font-bold italic">現在、お気に入り問題はありません。</div>
            </div>
        </div>
    </div>
</main>

<script>
    // Robust local question storage with full parameters
    const masterQuestions = [
        // ==================== 2025年度 完全収録 (問1〜問90) ====================
        { id: "2025-1", year: "2025", num: 1, text: "日本薬局方の医薬品は、その医薬品名の前後にどのような括弧を付けて示すか。", options: ["「 」", "( )", "[ ]", "{ }"], answer: 0, explanation: "日本薬局方通則15により、公式医薬品であることを明示する場合、医薬品名や物質名の前後に「 」（かぎかっこ）を付ける規定があります。" },
        { id: "2025-2", year: "2025", num: 2, text: "日本薬局方通則における「常温」の温度定義はどれか。", options: ["20℃", "25℃", "15〜25℃", "1〜30℃", "20〜30℃"], answer: 2, explanation: "局方通則における温度定義は：標準温度は20℃、常温は15〜25℃、室温は1〜30℃、冷所は1〜15℃です。" },
        { id: "2025-3", year: "2025", num: 3, text: "日本薬局方通則において、「減圧」は、別に規定するもののほか、どのような圧力を指すか。", options: ["2.0 kPa 以上", "2.0 kPa", "2.0 kPa 以下", "2.0 Pa 以上"], answer: 2, explanation: "局方通則16より、特別な規定がない限り、減圧とは「2.0 kPa以下」の圧力をいいます。" },
        { id: "2025-4", year: "2025", num: 4, text: "医薬品の試験の操作において、「直ちに」とあるのは、通例、前の操作の終了からどれだけの時間内に次の操作を開始することを意味するか。", options: ["30分", "10分", "5分", "1分", "30秒"], answer: 4, explanation: "局方通則29において、操作手順で「直ちに」とあるのは、前の操作を完了させた後、次の操作を「30秒以内」に開始することを指します。" },
        { id: "2025-5", year: "2025", num: 5, text: "定量に供する試料の採取量に「約」を付けたものは、記載された量の±何%の範囲をいうか。", options: ["2%", "5%", "10%", "15%", "20%"], answer: 2, explanation: "局方通則28において、サンプリング採取量の前に「約」を付記した場合は、表記されている数値の±10%の精度範囲を認めます。" },
        { id: "2025-6", year: "2025", num: 6, text: "医薬品各条の定量法で得られる成分含量について、単にある%以上を示し、その上限を示さない場合は、何%を上限とするか。", options: ["110.0%", "105.0%", "101.0%", "100.5%", "100.1%"], answer: 2, explanation: "局方通則33の取り決めにより、成分含量の上限が特別に示されておらず「〇〇%以上」とだけ定義されている場合は、「101.0%」を自明な上限値として処理します。" },
        { id: "2025-7", year: "2025", num: 7, text: "定められた方法で対象微生物が検出されないことを意味する用語はどれか。", options: ["無菌", "滅菌", "消毒", "無菌操作"], answer: 0, explanation: "「無菌（Sterility）」とは、所定の培養テスト等で対象微生物（増殖能のある生菌）が全く存在しない（検出されない）ことが客観的に証明された状態を意味します。" },
        { id: "2025-8", year: "2025", num: 8, text: "物質中のすべての微生物を殺滅又は除去することを意味する用語はどれか。", options: ["無菌", "滅菌", "消毒", "無菌操作"], answer: 1, explanation: "「滅菌（Sterilization）」とは、被滅菌物中のすべての生きた微生物を殺滅または除去するプロセスです。" },
        { id: "2025-9", year: "2025", num: 9, text: "無菌の医薬品を調製するためのすべての操作を指す用語はどれか。", options: ["無菌操作法", "滅菌法", "消毒法", "殺菌操作法"], answer: 0, explanation: "「無菌操作法」とは、滅菌を施した原材料・器具等を用いて、無菌状態を維持しながら調製・製剤化する全プロセス・操作技術を指します。" },
        { id: "2025-10", year: "2025", num: 10, text: "局方通則において、「約0.5gを精密に量る」という指示に対して適切な操作はどれか。", options: ["0.45 gまで量る", "0.450 gまで量る", "0.4500 gまで量る", "0.50 gまで量る", "0.500 gまで量る"], answer: 2, explanation: "「約0.5g」は±10%（0.45g〜0.55g）の範囲。また「精密に量る」とは天秤の感度に応じた最小桁（通常小数点第4位）まで計量し記録することを意味します。" },
        { id: "2025-11", year: "2025", num: 11, text: "局方試験法において、揮発性不純物の質量百分率、百万分率はそれぞれどのような記号で表記するか。", options: ["%、ppm", "%、ppb", "vol%、vol ppm", "wt%、wt ppm"], answer: 0, explanation: "質量百分率は「%」、百万分率は「ppm」で表記します。体積百分率・百万分率はそれぞれ「vol%」「vol ppm」です。" },
        { id: "2025-12", year: "2025", num: 12, text: "溶液の濃度を (1→10) で示したものは、固形の薬品いくらを溶媒に溶かして全体を10 mLとすることを表すか。", options: ["1 g", "10 g", "1 mg", "10 mg"], answer: 0, explanation: "(1→10)は「液状の薬品1 mLまたは固形の薬品1 gを溶媒に溶かして全量を10 mLにする割合」を示します。" },
        { id: "2025-13", year: "2025", num: 13, text: "日常の取扱い又は通常の保存状態において、液状又は固形の異物が侵入することを防ぎ、並びに内容医薬品の損失、風解、潮解又は蒸発を防ぐことができる容器はどれか。", options: ["密閉容器", "気密容器", "密封容器", "遮光容器"], answer: 1, explanation: "風解、潮解、蒸発などの「揮発・吸湿による損失」を防ぎ、固形・液状異物の侵入を防ぐ強度の容器は「気密容器」です。" },
        { id: "2025-14", year: "2025", num: 14, text: "通常の取扱い、運搬又は保存状態において、気体の侵入を防ぐ容器はどれか。", options: ["密閉容器", "気密容器", "密封容器", "遮光容器"], answer: 2, explanation: "気体の侵入（ガス透過）を完全に防ぐ、最も密閉性の高い容器を「密封容器」と定義します。" },
        { id: "2025-15", year: "2025", num: 15, text: "局方通則において「標準温度」は何度を定義とするか。", options: ["15℃", "20℃", "25℃", "30℃"], answer: 1, explanation: "局方通則16より、標準温度は「20℃」です。" },
        { id: "2025-16", year: "2025", num: 16, text: "局方通則において「室温」はどの温度範囲を定義とするか。", options: ["1〜15℃", "1〜30℃", "15〜25℃", "20〜30℃"], answer: 1, explanation: "局方通則16より、室温は「1〜30℃」です。" },
        { id: "2025-17", year: "2025", num: 17, text: "局方通則において「冷所」はどの温度範囲を定義とするか。", options: ["1〜15℃", "1〜30℃", "15〜25℃", "20〜30℃"], answer: 0, explanation: "局方通則16より、冷所は「1〜15℃」です。" },
        { id: "2025-18", year: "2025", num: 18, text: "発熱物質試験法において、試験に用いられるウサギの体重基準はいくらか。", options: ["1.0 kg以上", "1.5 kg以上", "2.0 kg以上", "2.5 kg以上"], answer: 1, explanation: "発熱物質試験法では、感度安定性の観点から「体重1.5 kg以上」の健康なウサギを使用する規定となっています。" },
        { id: "2025-19", year: "2025", num: 19, text: "エンドトキシンは、一般にどのような乾熱条件で完全に不活化されるか。", options: ["150℃、30分以上", "180℃、30分以上", "210℃、30分以上", "250℃、30分以上"], answer: 3, explanation: "エンドトキシンは耐熱性が極めて高いため、高圧蒸気滅菌（121℃）では分解できません。「250℃、30分以上」の乾熱滅菌により完全に不活化されます。" },
        { id: "2025-20", year: "2025", num: 20, text: "微生物滅菌におけるD値の定義について、共試微生物の何%を死滅させ、生存数を1/10に低下させるのに要する時間をいうか。", options: ["80%", "85%", "90%", "95%", "99%"], answer: 2, explanation: "D値（Decay Value）は、微生物の生存数を1/10に低下させる（＝90%を死滅させる）のに要する時間または照射線量です。" },
        { id: "2025-21", year: "2025", num: 21, text: "硫酸塩試験において、本品0.40gを溶かして検液50mLとした。比較液に0.005mol/L硫酸0.40mLを用いたとき、本品における硫酸塩（SO₄²⁻として）の限度は何%以下か。(SO₄の式量は96とする)", options: ["0.48%以下", "0.24%以下", "0.12%以下", "0.048%以下", "0.024%以下"], answer: 3, explanation: "比較液中のSO₄²⁻量は 0.005 mol/L * 0.40 mL = 2.0 × 10⁻⁶ mol。質量は 2.0 × 10⁻⁶ * 96 g/mol = 0.192 mg。本品400mgに対する割合は (0.192 / 400) * 100 = 0.048% 以下です。" },
        { id: "2025-22", year: "2025", num: 22, text: "重金属試験法（第1法）において、検液の呈色を比較する「比較液」の調製に用いられる金属標準液はどれか。", options: ["亜鉛標準液", "銅標準液", "鉛標準液", "鉄標準液", "銀標準液"], answer: 2, explanation: "重金属試験法では、検液に現れる硫化物の黒褐色沈殿の度合いを、一定量の「鉛標準液」から調製した比較液と並べて比較・適合判定します。" },
        { id: "2025-23", year: "2025", num: 23, text: "有機窒素を分解してアンモニアを回収するための「セミミクロキルダール蒸留装置」を使用する試験法はどれか。", options: ["アルコール数測定法", "融点測定法", "蒸留試験法", "窒素定量法"], answer: 3, explanation: "セミミクロキルダール法による分解・蒸留プロセスを用いるのは「窒素定量法」です。" },
        { id: "2025-24", year: "2025", num: 24, text: "ヒ素試験法において、呈色比較の対象となる限度基準は、何の物質としてのppmで表されるか。", options: ["As", "As₂O₃", "AsH₃", "AsO₄³⁻"], answer: 1, explanation: "ヒ素試験法における基準限度値は、金属ヒ素そのものではなく「三酸化二ヒ素（As₂O₃）」の質量分率（ppm）で表されます。" },
        { id: "2025-25", year: "2025", num: 25, text: "鉱油試験法は、注射剤および何の剤形に用いる「非水性溶剤中の鉱油（不純物）」を検出するための試験法か。", options: ["軟膏剤", "散剤", "坐剤", "チンキ剤", "点眼剤"], answer: 4, explanation: "鉱油試験法は、注射剤および「点眼剤」に使われる植物油などの非水性溶剤に、潤滑油等の鉱油が混入していないかを調べるための試験法です。" },
        { id: "2025-26", year: "2025", num: 26, text: "アルコール数測定法において、アルコール数とは「15℃において試料10 mL当たり」から得られるエタノール層の量（mL）を指すが、この測定規定温度は何℃か。", options: ["15℃", "20℃", "25℃", "30℃"], answer: 0, explanation: "アルコール数は「15℃において」測定したエタノールの容量（mL）を基準とします。試料基準量は10 mLです。" },
        { id: "2025-27", year: "2025", num: 27, text: "酸素フラスコ燃焼法において、試験の対象（この方法で燃焼・分解させて検出できる元素）とならないものはどれか。", options: ["塩素", "フッ素", "イオウ", "セレン", "ナトリウム"], answer: 4, explanation: "酸素フラスコ燃焼法は有機薬物を燃焼させてハロゲン（F, Cl, Br, I）、イオウ（S）、セレン（Se）を無機イオン化して測定する手法です。金属のナトリウムは対象外です。" },
        { id: "2025-28", year: "2025", num: 28, text: "紫外可視吸光度測定法における「紫外部（200〜400 nm）」の測定に用いられる光源はどれか。", options: ["ナトリウムスペクトルのD線", "放電ランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 2, explanation: "紫外領域（200〜400 nm）の測定には「重水素放電管」、可視領域（400〜800 nm）には「タングステンランプ」を光源として用います。" },
        { id: "2025-29", year: "2025", num: 29, text: "原子吸光光度法において、特定元素の基底状態原子を励起・共鳴させるために用いられる代表的な光源はどれか。", options: ["中空陰極ランプ", "タングステンランプ", "キセノンランプ", "重水素放電管"], answer: 0, explanation: "原子吸光光度法では、測定対象の元素に固有のシャープな共鳴輝線を得るために、その元素を電極に用いた「中空陰極ランプ」が広く使用されます。" },
        { id: "2025-30", year: "2025", num: 30, text: "蛍光光度法において、試料分子を励起して強力な蛍光を得るために一般的に用いられる高輝度光源はどれか。", options: ["ナトリウムランプ", "重水素放電管", "タングステンランプ", "キセノンランプ"], answer: 3, explanation: "連続的な波長を持ち、なおかつ強力な励起エネルギーを出力できる「キセノンランプ」が蛍光光度法で標準的に用いられます。" },
        { id: "2025-31", year: "2025", num: 31, text: "屈折率測定法において、別に規定がない限り、測定に用いられる基準 of 単色光はどれか。", options: ["ナトリウムD線", "重水素輝線", "水銀緑色輝線", "ヘリウムD線"], answer: 0, explanation: "屈折率計の測定には、ナトリウムスペクトルの黄色単色光である「ナトリウムD線（波長 589.3 nm）」を用います。" },
        { id: "2025-32", year: "2025", num: 32, text: "旋光度測定法において、偏光面の回転角度を測定する際に基準として用いられる単色光はどれか。", options: ["ナトリウムD線", "重水素輝線", "水銀輝線", "キセノン輝線"], answer: 0, explanation: "旋光度測定法の測定波長（比旋光度の定義）も、屈折率測定と同様に「ナトリウムD線」を基本としています。" },
        { id: "2025-33", year: "2025", num: 33, text: "クロマトグラフィー of パラメータにおいて、クロマトグラム上の2つのピーク相互の保持時間の関係（比）を示す値はどれか。", options: ["分離係数 (α)", "分離度 (Rs)", "理論段数 (N)", "シンメトリー係数 (S)"], answer: 0, explanation: "2つのピークの保持時間の比をとるパラメータは「分離係数（α）」です。（ピーク間の完全な分離度合いを示すのは「分離度 Rs」）" },
        { id: "2025-34", year: "2025", num: 34, text: "紫外可視吸光度測定法における「ランベルト・ベールの法則」において、吸光度（A）と直接比例関係にあるのはどれか。", options: ["透過率", "溶液の厚さ（光路長ではない）", "試料の濃度", "比吸光度の対数", "モル吸光係数の対数"], answer: 2, explanation: "A = ε・c・l の式より、吸光度は溶液の「濃度（c）」およびセル長に直接比例します。" },
        { id: "2025-35", year: "2025", num: 35, text: "次の測定法のうち、最も波長が長い（最も電磁波エネルギーが低い）電磁波を用いるのはどれか。", options: ["赤外吸収スペクトル法", "核磁気共鳴スペクトル測定法", "X線回折測定法", "紫外可視吸光度測定法", "蛍光光度法"], answer: 1, explanation: "核磁気共鳴（NMR）で使用する電磁波は「ラジオ波（高周波）」であり、電磁スペクトルの中で最も波長が長く、最小のエネルギーを持ちます。X線が最も短波長です。" },
        { id: "2025-36", year: "2025", num: 36, text: "分子量 410.51 である医薬品の波長 242 nm におけるモル吸光係数 ε が 1.62 × 10⁴ であるとき、比吸光度 E(1%, 1cm) の値に最も近いのはどれか。", options: ["395", "263", "198", "132", "39.5"], answer: 0, explanation: "E(1%, 1cm) = (ε * 10) / 分子量 の公式を適用します。E = (16200 * 10) / 410.51 = 162000 / 410.51 = 394.63。最も近いのは「395」です。" },
        { id: "2025-37", year: "2025", num: 37, text: "アスピリンの定量法における、0.5mol/L NaOH液を加えて穏やかに煮沸する操作で起きる化学反応はどれか。", options: ["酸化反応", "還元反応", "加水分解反応", "抱合反応", "異性化反応"], answer: 2, explanation: "アルカリ下で煮沸することで、アスピリンのエステル結合が切断され、サリチル酸ナトリウムと酢酸ナトリウムに分解される「加水分解（エステルのけん化）」が起こります。" },
        { id: "2025-38", year: "2025", num: 38, text: "アスピリン（分子量 180.16）の逆滴定において、0.5 mol/L 水酸化ナトリウム液 1 mL に対するアスピリン（C₉H₈O₄）のミリグラム換算値はどれか。", options: ["22.52 mg", "45.04 mg", "90.08 mg", "180.16 mg", "360.32 mg"], answer: 1, explanation: "アスピリン1分子は、エステルの加水分解とカルボキシ基の中和のために、計2分子のNaOHを消費します（1:2反応）。0.5 mol/L NaOH 1 mL (= 0.5 mmol) に対しアスピリンは0.25 mmol反応するため、0.25 mmol * 180.16 = 45.04 mg となります。" },
        { id: "2025-39", year: "2025", num: 39, text: "アスピリン本品 1.500gを精密に量り、逆滴定にて 0.25 mol/L 硫酸（f=1.000）を 17.10 mL消費し、空試験で 50.30 mL消費した。本品中のアスピリン含量（%）はいくらか。", options: ["96.30%", "97.50%", "98.90%", "99.70%", "100.30%"], answer: 3, explanation: "硫酸消費量の差（空試験 - 本試験）は 50.30 - 17.10 = 33.20 mL。H₂SO₄（0.25mol/L）は2価の酸なので、1価のNaOH（0.5mol/L）と同等の中和力を持ちます。33.20 mL * 45.04 mg/mL = 1495.3 mg (1.4953 g)。含量は (1.4953 / 1.500) * 100 = 99.68% ≈ 99.70% です。" },
        { id: "2025-40", year: "2025", num: 40, text: "アスコルビン酸（分子量 176.13）のヨウ素滴定定量において、0.05 mol/L ヨウ素液 1 mL に対応するアスコルビン酸（C₆H₈O₆）の質量はどれか。", options: ["35.23 mg", "17.61 mg", "8.81 mg", "4.40 mg", "2.20 mg"], answer: 2, explanation: "アスコルビン酸1分子は、ヨウ素（I₂）1分子によって2電子酸化されてデヒドロアスコルビン酸に変化します（1:1反応）。0.05 mol/L ヨウ素液 1 mL (= 0.05 mmol) はアスコルビン酸 0.05 mmolと反応するため、0.05 mmol * 176.13 = 8.8065 mg ≈ 8.81 mg となります。" },
        { id: "2025-41", year: "2025", num: 41, text: "アスコルビン酸（ビタミンC）のヨウ素滴定定量は、アスコルビン酸が持つどのような化学的性質に基づいているか。", options: ["還元性", "酸化性", "弱酸性", "強塩基性"], answer: 0, explanation: "アスコルビン酸はエンジオール構造を持ち、非常に酸化されやすい（他物質を還元する）強力な「還元性」を持っています。このため、酸化剤であるヨウ素で直接滴定（定量）できます。" },
        { id: "2025-42", year: "2025", num: 42, text: "アスコルビン酸のヨウ素滴定において、酸化されたアスコルビン酸が最終的に生じる構造（生成物）はどれか。", options: ["グルコン酸", "アスコルビン酸硫酸エステル", "デヒドロアスコルビン酸", "L-トレオン酸"], answer: 2, explanation: "還元型のアスコルビン酸がヨウ素により酸化されると、水素原子を2つ奪われて「デヒドロアスコルビン酸」へと変化します。" },
        { id: "2025-43", year: "2025", num: 43, text: "局方確認試験において、乳酸塩に硫酸酸性下で過マンガン酸カリウム試液を加えて加熱するときに発生する、特徴的な刺激臭のする揮発成分はどれか。", options: ["ホルムアルデヒド", "アセトアルデヒド", "アクロレイン", "酢酸", "二酸化硫黄"], answer: 1, explanation: "乳酸塩を硫酸酸性下で過マンガン酸カリウム（酸化剤）とともに加熱すると、酸化的切断・脱炭酸が起き、「アセトアルデヒド」を発生し、その特有の刺激臭で確認します。" },
        { id: "2025-44", year: "2025", num: 44, text: "局方確認試験において、グリセロリン酸カルシウム等に等量の硫酸水素カリウムの粉末を混ぜて加熱するときに発生する、刺激臭（涙を刺激する臭い）のする成分はどれか。", options: ["ホルムアルデヒド", "アセトアルデヒド", "アクロレイン", "酢酸", "二酸化炭素"], answer: 2, explanation: "グリセリン骨格に強力な脱水剤（硫酸水素カリウム）を加えて強熱すると、脱水が起こり、不飽和アルデヒドである「アクロレイン」が発生します。" },
        { id: "2025-45", year: "2025", num: 45, text: "局方確認試験において、サリチル酸塩を過量のソーダ石灰と十分に混ぜて乾燥試験管で強熱するときに発生する、特有の石炭酸臭のする物質はどれか。", options: ["フェノール", "サリチル酸メチル", "ベンゼン", "アセトアルデヒド", "アンモニア"], answer: 0, explanation: "サリチル酸塩をソーダ石灰（強塩基・脱炭酸触媒）と混合して強熱すると、カルボキシ基が脱炭酸し、特有 of 臭気を持つ「フェノール（石炭酸）」が発生します。" },
        { id: "2025-46", year: "2025", num: 46, text: "炎色反応試験において、本品に硫酸およびメタノールを混和して点火温めるとき、特徴的な「緑色の炎」をあげて燃える塩はどれか。", options: ["ナトリウム塩", "カリウム塩", "ホウ酸塩", "銅塩", "鉄塩"], answer: 2, explanation: "ホウ酸（またはホウ酸塩）に硫酸とメタノールを加えると、揮発性の「ホウ酸トリメチル」エステルが生成します。これに点火するとホウ素特有の鮮やかな緑色の炎色を示して燃焼します。" },
        { id: "2025-47", year: "2025", num: 47, text: "水溶液に硝酸銀試液を加えると白色沈殿を生じ、希硝酸を加えても沈殿が溶けないが、アンモニア試液を加えると速やかに溶解する特徴を示す、局方収載の塩酸化合物はどれか。", options: ["ピリドキシン塩酸塩", "硫酸アトロピン", "リン酸コデイン", "炭酸水素ナトリウム"], answer: 0, explanation: "これは塩化物イオン（Cl⁻）の確認試験です。「ピリドキシン塩酸塩（ビタミンB₆）」は塩酸塩であるため、液中で塩化物イオンを放出し、白色の塩化銀沈殿を生成します。これはアンモニア水に溶けます。" },
        { id: "2025-48", year: "2025", num: 48, text: "水溶液に硫酸銅(II)試液を加えるとき、特徴的な「赤褐色の沈殿」を生じ、希塩酸を追加しても沈殿が溶解しない無機化合物はどれか。", options: ["フェロシアン化カリウム", "フェリシアン化カリウム", "チオシアン酸カリウム", "硝酸カリウム"], answer: 0, explanation: "フェロシアン化カリウムなどのフェロシアン化物（ヘキサシアニド鉄(II)酸塩）イオンは、銅イオンと結合すると、希塩酸に不溶な「赤褐色」のフェロシアン化銅沈殿を形成します。" },
        { id: "2025-49", year: "2025", num: 49, text: "硫酸酸性水溶液において、過マンガン酸カリウムに過量のシュウ酸試液を加えて加温するときに観察される顕著な色変化はどれか。", options: ["赤紫色から無色に脱色される", "赤紫色から鮮やかな黄色に変化する", "白色の結晶性沈殿が生成する", "黄緑色の塩素ガスが発生する"], answer: 0, explanation: "赤紫色の過マンガン酸イオン（Mn⁷⁺）は、硫酸酸性下でシュウ酸（還元剤）によって還元され、ほぼ無色のマンガン(II)イオン（Mn²⁺）になるため、速やかに「脱色（赤紫色から無色）」します。" },
        { id: "2025-50", year: "2025", num: 50, text: "中性または弱酸性溶液において、1,10-フェナントロリンのエタノール溶液を滴加するときに、安定な錯体を形成して「濃赤色」に呈色する無機金属イオンはどれか。", options: ["鉄(II)イオン", "鉄(III)イオン", "銅(II)イオン", "亜鉛(II)イオン"], answer: 0, explanation: "鉄(II)イオン（Fe²⁺）は、1,10-フェナントロリン3分子と速やかに配位結合を形成し、非常に安定な濃赤色のキレート錯体イオン「フェロイン」を形成します。" },
        { id: "2025-51", year: "2025", num: 51, text: "一般試験法に関する記述の正誤を判定せよ。 「蛍光の極大波長は、通常、励起光の極大波長よりも短波長側にある」", options: ["正しい", "誤っている"], answer: 1, explanation: "誤りです。励起された分子は振動緩和などによって一部のエネルギーを熱として失った後に発光（蛍光）を放出するため、蛍光エネルギーは必ず励起エネルギーより低くなり、波長は「長波長側」にずれます（ストークスシフト）。" },
        { id: "2025-52", year: "2025", num: 52, text: "一般試験法に関する記述の正誤を判定せよ。 「蛍光は、励起三重項から基底一重項へとスピン多重度が変化する遷移の際に放射される発光である」", options: ["正しい", "誤っている"], answer: 1, explanation: "誤りです。一重項（基底）から一重項（励起）に励起された後、同一スピン多重度のまま（励起一重項→基底一重項）遷移する際の発光が「蛍光」です。励起三重項から基底一重項（異なる多重度）へスピン反転を伴う遷移光は「りん光」と呼ばれます。" },
        { id: "2025-53", year: "2025", num: 53, text: "一般試験法に関する記述の正誤を判定せよ。 「蛍光光度計では、光源から照射された励起光の迷光を防ぐため、受光部（検出器）が励起光路に対して直角（90度）に配置されている」", options: ["正しい", "誤っている"], answer: 0, explanation: "正しい。直進する非常に強力な励起光が直接検出器に入ってバックグラウンドノイズになるのを防ぐため、蛍光光度計ではセルに対して直角方向の光を測定する構造になっています。" },
        { id: "2025-54", year: "2025", num: 54, text: "分配クロマトグラフィーに関する記述の正誤を判定せよ。 「ろ紙クロマトグラフィーでは、ろ紙のセルロース繊維に強固に保持されている水（水相）を固定相とする分配クロマトグラフィーの一種である」", options: ["正しい", "誤っている"], answer: 0, explanation: "正しい。ろ紙クロマトグラフィーでは、繊維質が吸着した親水性の「水」が固定相として働き、その上を有機溶媒（移動相）が移動して分配が行われます。" },
        { id: "2025-55", year: "2025", num: 55, text: "クロマトグラフィーに関する記述の正誤を判定せよ。 「シリカゲルの表面をオクタデシル基（ODS化）で修飾した固定相を用いる逆相分配クロマトグラフィーでは、一般に極性の高い（親水性の高い）成分が先に溶出する」", options: ["正しい", "誤っている"], answer: 0, explanation: "正しい。逆相（ODS）カラムでは、固定相が疎水性（非極性）、移動相が極性（水やメタノール）です。よって、水になじみやすい「極性の高い物質」は固定相に留まらず、移動相とともに速やかにカラムから溶出します。" },
        { id: "2025-56", year: "2025", num: 56, text: "クロマトグラフィーに関する記述 of 正誤を判定せよ。 「イオン交換クロマトグラフィーで分離したα-アミノ酸を検出するため、カラムに注入する前の試料にニンヒドリンをあらかじめ反応させておくプレカラム誘導体化法を標準的に適用する」", options: ["正しい", "誤っている"], answer: 1, explanation: "誤りです。局方のアミノ酸分析法では、アミノ酸をカラムで分離した「後」にニンヒドリン試液をオンラインで連続的に混合し加温呈色させる「ポストカラム誘導体化法」が適用されます。" },
        { id: "2025-57", year: "2025", num: 57, text: "クロマトグラム定量パラメータに関する記述の正誤を判定せよ。 「ピーク面積測定法のうち『半値幅法』は、ピーク高さ（h）の中点（1/2 h）におけるピークの横幅に、ピーク高さを乗じて算出する」", options: ["正しい", "誤っている"], answer: 0, explanation: "正しい。対称的なガウス型のピークであれば、「ピーク高さの半分の位置における幅 * ピーク高さ」を計算することで、ピーク面積を高い近似値で容易に算出できます。" },
        { id: "2025-58", year: "2025", num: 58, text: "クロマトパラメータに関する記述の正誤を判定せよ。 「同一カラム・同一分析条件下において、二つの目的物質ピークの保持時間が完全に一致している場合、この物質相互の分離度（Rs）は1となる」", options: ["正しい", "誤っている"], answer: 1, explanation: "誤りです。保持時間が同じである（まったくピークが分離していない）場合、2成分のピーク中心位置の差が0になるため、分離度（Rs）は「0」となります。完全に分離された状態はRs≧1.5以上です。" },
        { id: "2025-59", year: "2025", num: 59, text: "生薬の化学的確認試験において、噴霧試薬である「ドラーゲンドルフ試液」により選択的に呈色・検出される植物成分クラスはどれか。", options: ["アルカロイド", "トリテルペンサポニン", "還元糖", "タンニン", "フラボノイド"], answer: 0, explanation: "ドラーゲンドルフ試液（四ヨウ化ビスマス酸カリウム）は、窒素原子（塩基性）を持つ「アルカロイド」と反応し、難溶性の橙赤色〜赤褐色の錯塩を形成します。" },
        { id: "2025-60", year: "2025", num: 60, text: "日本薬局方収載生薬の薄層クロマトグラフィー（TLC）確認試験において、スポット位置を比較対照するために規定されている「標準品」の組み合わせとして正しいものはどれか。", options: ["アロエ / ウワバイン", "オウゴン / ベルベリン", "コウボク / マグノロール", "シャクヤク / ペオノール", "センブリ / カフェイン"], answer: 2, explanation: "マグノロール（Magnolol）はモクレン科生薬であるコウボク（厚朴）の主要なネオリグナン系成分であり、確認試験のTLC対照標準品として規定されています。" },
        { id: "2025-61", year: "2025", num: 61, text: "局方確認試験において、薄層クロマトグラフィー（TLC）を展開した後、薄層板にドラーゲンドルフ試液を噴霧してアルカロイド（アトロピンやスコポラミン等）の橙赤色スポットを検出・同定する生薬はどれか。", options: ["アロエ", "オウレン", "キョウニン", "ニンジン", "ロートコン"], answer: 4, explanation: "ナス科生薬「ロートコン（ロート根）」は、ヒヨスチアミン（アトロピン）やスコポラミンなどの強力なトロパンアルカロイドを含むため、確認試験にドラーゲンドルフ試液を用います。" },
        { id: "2025-62", year: "2025", num: 62, text: "生薬の試験法において、水溶液にして試験管で激しく振り混ぜた際、持続性の細かく微細な泡（蜂の巣状）を多く形成する特徴をもつ配糖体成分クラスはどれか。", options: ["アルカロイド", "サポニン", "脂肪酸", "タンニン", "リグナン"], answer: 1, explanation: "「サポニン」は、分子内に親水性の糖（親水基）と疎水性のテルペノイド/ステロイド（疎水基）をあわせ持つ天然の界面活性物質であるため、強い起泡性（持続性の微細な泡）を示します。" },
        { id: "2025-63", year: "2025", num: 63, text: "局方試験法において、持続性の泡を呈することをもって確認とする「起泡試験」が規定されている、去痰薬として著名なキキョウ科（または遠志科）生薬はどれか。", options: ["カンゾウ", "サンシシ", "ショウキョウ", "セネガ", "ベラドンナコン"], answer: 3, explanation: "ヒメハギ科の「セネガ」は、去痰作用をもつトリテルペンサポニン（セネギン）を極めて多く含むため、確認試験として水溶液を激しく振る起泡試験が規定されています。" },
        { id: "2025-64", year: "2025", num: 64, text: "生薬の識別呈色反応において、メタノール抽出液にリボン状の「金属マグネシウム」と「濃塩酸」を加えて加温するとき、赤色〜赤紫色に鮮やかに呈色する成分クラスはどれか。", options: ["アルカロイド", "イリドイド", "サポニン", "フラボノイド", "リグナン"], answer: 3, explanation: "金属マグネシウムと濃塩酸を組み合わせた「塩酸-マグネシウム反応」は、酸性下での還元反応によりアントシアニジン様構造を作り出し、赤色〜赤紫色を呈する「フラボノイド（配糖体）」の代表的確認試験です。" },
        { id: "2025-65", year: "2025", num: 65, text: "生薬の確認試験において、マグネシウム-塩酸反応による赤紫色呈色が適用されているミカン科生薬はどれか。", options: ["ゲンノショウコ", "サンヤク", "ジュウヤク", "ダイオウ", "トウヒ"], answer: 4, explanation: "ミカン科サワーオレンジの果皮である「トウヒ（橙皮）」は、フラボノイド（ナリンギン等）を含むため、確認試験にマグネシウム-塩酸反応が規定されています。" },

        // --- 2025 画像付き問題セクション (問66〜問68) ---
        { id: "2025-66", year: "2025", num: 66, text: "真核細胞における遺伝子発現プロセスを示した模式図がある。不要な配列であるイントロンの認識・除去を行い、成熟mRNAを作るのに不可欠なこの過程「ア」は何か。", image: "2025 Q65.png", options: ["転写", "逆転写", "スプライシング", "翻訳", "レプリケーション"], answer: 2, explanation: "スプライシング（Splicing）は、転写された直後のヘテロ核RNA（mRNA前駆体）からタンパク質コードに不要なイントロン部分を切り離し、エキソン（翻訳領域）を正確に連結して成熟したmRNAを生成する過程です。" },
        { id: "2025-67", year: "2025", num: 67, text: "細胞内シグナル伝達物質の一つである「cAMP」を5'-AMPに加水分解して、シグナル活性を消去・減衰させる図中の酵素「A」はどれか。", image: "2025 Q66.png", options: ["アデニル酸シクラーゼ", "ホスホジエステラーゼ (PDE)", "プロテインキナーゼA (PKA)", "ホスホリパーゼC (PLC)", "カルモジュリン"], answer: 1, explanation: "cAMP（環状AMP）の環状ジエステル構造を切断して不活性な5'-AMPに変換する酵素は「ホスホジエステラーゼ（PDE）」です。アデニル酸シクラーゼはATPからcAMPを「合成」する酵素です。" },
        { id: "2025-68", year: "2025", num: 68, text: "右図はマクロファージによる「食作用（ファゴサイトーシス）」の模式図である。図中の番号のうち、リソソームとファゴソームが合体して形成され、内部で化学的消化が展開される「ファゴリソソーム」を指すのはどれか。", image: "2025 Q67.png", options: ["①", "②", "③", "④", "⑤"], answer: 3, explanation: "マクロファージが異物（①）を取り込んで形成した食胞（ファゴソーム：③）に、加水分解酵素を満載したリソソーム（②）が融合して、消化を行う「ファゴリソソーム（④）」を形成します。" },

        { id: "2025-69", year: "2025", num: 69, text: "呼吸器疾患である非定型肺炎などを引き起こす「マイコプラズマ（Mycoplasma）」属の構造および特徴に関する記述のうち、正しいのはどれか。", options: ["真核生物である", "一般細菌より大型である", "細胞壁をもたない", "人工の寒天培地では増殖できない（寄生性）", "病原性は知られていない"], answer: 2, explanation: "マイコプラズマは、原核生物（細菌）でありながら「細胞壁を全く持たない」という特殊な特徴を持っています。そのため、細胞壁合成を阻害するペニシリンやセフェム系抗生物質（β-ラクタム系）が効きません。" },
        { id: "2025-70", year: "2025", num: 70, text: "ホルモンのうち、親油性（脂溶性）が極めて高いため単純拡散で容易に細胞膜を透過し、細胞内の「核内（または細胞質内）受容体」に直接結合して遺伝子の転写活性を制御するものはどれか。", options: ["アドレナリン", "エストロゲン", "グルカゴン", "成長ホルモン", "副甲状腺ホルモン"], answer: 1, explanation: "ステロイドホルモン（エストロゲン、プロゲステロン、グルココルチコイドなど）や甲状腺ホルモンは、脂溶性が高いため細胞膜を通過し、細胞内の受容体（核内受容体等）に直接結合して転写を制御します。" },
        { id: "2025-71", year: "2025", num: 71, text: "胃粘膜に生息して胃炎や胃潰瘍を誘発するヘリコバクター・ピロリが、胃内の強酸性環境に対抗するために尿素をアンモニアに分解し、胃酸を中和（セルフバリア形成）する特徴的な酵素はどれか。", options: ["アルギナーゼ", "グルタミナーゼ", "クレアチンキナーゼ", "デアミナーゼ", "ウレアーゼ"], answer: 4, explanation: "ヘリコバクター・ピロリは強力な「ウレアーゼ（Urease）」を産生し、胃内の尿素を二酸化炭素とアンモニア（塩基性）に分解します。生じたアンモニアが周囲の強酸（胃酸）を中和することで、ピロリ菌は胃の中で生存することができます。" },

        // --- 2025 画像付き問題セクション (問72) ---
        { id: "2025-72", year: "2025", num: 72, text: "右の図はDNAの相補的な塩基対（アデニンとチミン）の構造を示したものである。アデニン（A）とチミン（T）の間で形成されている「水素結合」の数は何本か。", image: "2025 Q72.png", options: ["1本", "2本", "3本", "4本", "5本"], answer: 1, explanation: "DNAの塩基対において、アデニン・チミン（A-T）対は「2本」の水素結合を形成します。グアニン・シトシン（G-C）対はより結合が強く、「3本」の水素結合を形成します。" },

        { id: "2025-73", year: "2025", num: 73, text: "ハース投影式で示される「α-D-グルコピラノース」の構造的特徴（アノマー炭素である1位の立体配置）について正しい記述はどれか。", options: ["1位のヒドロキシ基（-OH）が環の面に対して下を向いている", "1位のヒドロキシ基（-OH）が環の面に対して上を向いている", "4位のヒドロキシ基（-OH）が環の面に対して上を向いている", "5位に結合したヒドロキシメチル基（-CH₂OH）が下を向いている"], answer: 0, explanation: "D-グルコース（ピラノース環）において、アノマー炭素である1位のヒドロキシ基（-OH）が下向き（トランス配向）に配置されているものが「αアノマー（α-D-グルコピラノース）」です。上向きはβ型です。" },
        { id: "2025-74", year: "2025", num: 74, text: "真核細胞における糖・エネルギー代謝プロセスにおいて、1分子のグルコースから2分子のピルビン酸を嫌気的（酸素非依存的）に生成する「解糖系（Glycolysis）」の全酵素群が存在する、細胞内のコンパートメント（部位）はどこか。", options: ["細胞質（細胞質ゾル）", "小胞体（小胞体腔）", "リソソーム", "ペルオキシソーム", "ミトコンドリア（内膜・マトリクス）"], answer: 0, explanation: "解糖系の全10段階の酵素反応は、特定の細胞小器官内ではなく、細胞内の大部分を占める可溶性領域である「細胞質（細胞質ゾル）」にすべての酵素が局在して行われます。" },
        { id: "2025-75", year: "2025", num: 75, text: "生体内脂質である「コレステロール」を共通の発達出発材料（生合成前駆体）として合成され、副腎皮質などから分泌されて糖代謝や電解質制御を担うホルモンはどれか。", options: ["インスリン", "グルココルチコイド", "アドレナリン", "グルカゴン", "チロキシン"], answer: 1, explanation: "コレステロールはすべてのステロイドホルモン（グルココルチコイド、アルドステロン、エストロゲン、テストステロンなど）の共通の前駆体です。" },
        { id: "2025-76", year: "2025", num: 76, text: "筋肉を構成する筋原線維（サルコメア）において、太いフィラメントであるミオシン（Myosin）頭部と直接スライド結合してATPを消費し、筋収縮力を直接発生させる細いフィラメントの主構成タンパク質はどれか。", options: ["アクチン", "ケラチン", "コラーゲン", "チューブリン", "ヒストン"], answer: 0, explanation: "筋収縮は、太いフィラメント「ミオシン」と、細いフィラメント「アクチン（Actin）」が滑り込む相互作用（スライド説）によって引き起こされます。" },

        // --- 2025 画像付き問題セクション (問77) ---
        { id: "2025-77", year: "2025", num: 77, text: "右図は、人間上半身骨格の模式図である。1〜5のうち、「鎖骨（さこつ）」を明示しているのは何番か。", image: "2025 Q77.png", options: ["①", "②", "③", "④", "⑤"], answer: 0, explanation: "肩口と胸骨を繋ぐ上部のアーチ状の細い骨「①」が「鎖骨（さこつ）」です。②は胸骨、③は肋骨、④は上腕骨、⑤は椎骨（脊柱）です。" },

        { id: "2025-78", year: "2025", num: 78, text: "薬物の尿中排泄に重要な働きをする腎小体をボーマン嚢とともに構成しているのはどれか。", options: ["ヘンレ係蹄", "糸球体", "集合管", "近位尿細管", "遠位尿細管"], answer: 1, explanation: "腎小体（腎臓のろ過ユニットの核）は、毛細血管が網状に凝集した「糸球体」と、それを包みこんでろ過液を回収する「ボーマン嚢」から構成されています。" },
        { id: "2025-79", year: "2025", num: 79, text: "主要組織適合遺伝子複合体（MHC）のクラスI分子とクラスII分子の両方で抗原提示できる免疫担当細胞はどれか。", options: ["マクロファージ", "キラーT細胞", "好中球", "巨核球", "制御性T細胞"], answer: 0, explanation: "プロフェッショナル抗原提示細胞（APC）である「マクロファージ」、樹状細胞、B細胞は、MHCクラスIに加えて「MHCクラスII」を独自の標識として発現し、ヘルパーT細胞を直接活性化できます。" },
        { id: "2025-80", year: "2025", num: 80, text: "主たる発症機序がⅡ型アレルギー（組織障害型・細胞障害型）に分類される典型例はどれか。", options: ["スギ花粉症", "アトピー性皮膚炎", "薬剤性溶血性貧血", "接触性皮膚炎", "糸球体腎炎"], answer: 2, explanation: "「薬剤性溶血性貧血」は典型的なⅡ型アレルギーです。薬物が赤血球表面に吸着し、それに対する抗体反応により赤血球が破壊（溶血）されます。（花粉症・アトピーはⅠ型、かぶれはⅣ型、糸球体腎炎はⅢ型）" },
        { id: "2025-81", year: "2025", num: 81, text: "血管平滑筋細胞を持たず血管内皮細胞と基底膜から構成され、栄養成分や老廃物の物質交換が行われるのはどれか。", options: ["大動脈", "細動脈", "毛細血管", "大静脈", "胸管"], answer: 2, explanation: "「毛細血管（Capillary）」は平滑筋を持たず、内皮一層と薄い基底膜だけで出来ています。この極薄構造により、血液と組織液の間で高い物質透過・交換能を実現しています。" },

        // --- 2025 画像付き問題セクション (問82) ---
        { id: "2025-82", year: "2025", num: 82, text: "右の図は核酸を構成する代表的な「プリン塩基」の構造式である。このうち、プリン環6位にアミノ基を持つ「アデニン」に該当するものはどちらか。", image: "2025 Q82.png", options: ["① (アデニン)", "② (グアニン)"], answer: 0, explanation: "プリン環の6位にアミノ基（-NH₂）のみを有する「①」が「アデニン」です。2位にアミノ基、6位にカルボニル酸素（=O）を有する「②」は「グアニン」です。" },

        { id: "2025-83", year: "2025", num: 83, text: "胃底腺の実質細胞において、塩酸（胃酸）とともにビタミンB12の吸収に不可欠な内因子（Intrinsic factor）を分泌する細胞はどれか。", options: ["主細胞", "G細胞", "副細胞", "杯細胞", "壁細胞"], answer: 4, explanation: "胃底腺の「壁細胞（Parietal cell）」は、プロトンポンプによる胃酸（塩酸）の放出と同時に、ビタミンB12を保護し小腸での吸収を促進する糖タンパク質「内因子」を分泌します。" },
        { id: "2025-84", year: "2025", num: 84, text: "三胚葉の発生分化の過程において、大腸の内壁上皮や消化腺（肝臓・膵臓など）の起源となる胚葉はどれか。", options: ["内胚葉", "外胚葉", "中胚葉"], answer: 0, explanation: "大腸などの消化管内腔上皮、気管気管支上皮、肝臓、膵臓は「内胚葉」を起源とします。神経や皮膚表皮は外胚葉、筋肉や骨、循環器（心臓など）は中胚葉起源です。" },
        { id: "2025-85", year: "2025", num: 85, text: "女性の月経周期において、排卵直前に分泌量が急激に増加してピーク（サージ）に達し、排卵の開始を直接誘発するホルモンはどれか。", options: ["黄体形成ホルモン(LH)", "オキシトシン", "プロラクチン", "ヒト絨毛性性腺刺激ホルモン(hCG)", "プロゲステロン"], answer: 0, explanation: "排卵は「LHサージ（黄体形成ホルモンの一過性大量分泌）」が最大の引き金となってトリガーされます。これにより卵子が卵胞から放出されます。" },
        { id: "2025-86", year: "2025", num: 86, text: "末梢の細胞や血管壁に余剰に蓄積されたコレステロールを回収し、回収したコレステロールを異化・排泄のために肝臓へと逆輸送する善玉リポタンパク質はどれか。", options: ["高密度リポタンパク質 (HDL)", "中間密度リポタンパク質 (IDL)", "超低密度リポタンパク質 (VLDL)", "低密度リポタンパク質 (LDL)", "キロミクロン"], answer: 0, explanation: "「HDL（高密度リポタンパク質）」は、末梢からコレステロールを引き抜いて肝臓に戻す「逆転送系」を担い、血管内膜のアテローム硬化を抑制する善玉リポタンパク質です。" },
        { id: "2025-87", year: "2025", num: 87, text: "DNA/RNAを構成するペントース（五炭糖であるD-デオキシリボース、またはD-リボース）において、アデニンやチミンなどの塩基が共有結合（N-グリコシド結合）を形成する炭素原子の位置はどれか。", options: ["C1' 位", "C2' 位", "C3' 位", "C4' 位", "C5' 位"], answer: 0, explanation: "塩基（アデニンやピリミジンなど）は、常に五炭糖の「1'位（C1'位）」炭素と結合してヌクレオシドを形成します。リン酸基は「5'位」にエステル結合します。" },
        { id: "2025-88", year: "2025", num: 88, text: "特定の制限塩基配列を認識し、DNAのホスホジエステル結合を選択的に切断して遺伝子のハサミとして働く酵素はどれか。", options: ["DNA リガーゼ", "逆転写酵素", "DNA ポリメラーゼ", "制限酵素", "プライマーゼ"], answer: 3, explanation: "特定の配列を正確にターゲット認識して二本鎖DNAを切断するハサミに相当する酵素は「制限酵素」です。（切断されたDNAを結合するのはDNAリガーゼです）" },

        // --- 2025 画像付き問題セクション (問89) ---
        { id: "2025-89", year: "2025", num: 89, text: "右の図は、小腸絨毛での各種栄養素の膜輸送（吸収）を示したものである。モノアシルグリセロールや長鎖脂肪酸が上皮細胞内で再合成されて形成され、血管壁を通れずに絨毛中心部にあるリンパ管（乳糜管）「ア」へと選択的に放出・吸収される巨大なリポタンパク「キロミクロン」が通る、この図中「ア」のリンパ管の名称はどれか。", image: "2025 Q88.png", options: ["毛細血管", "門脈", "微絨毛", "乳糜管 (にゅうびかん)", "集合管"], answer: 3, explanation: "上皮細胞内で再合成された巨大な「キロミクロン（カイロミクロン）」は、分子が大きすぎて毛細血管の内皮を通過できず、隙間の大きい「乳糜管（にゅうびかん：絨毛中央の末梢リンパ管）」に入ってリンパ系へと吸収されます。" },

        { id: "2025-90", year: "2025", num: 90, text: "内因子（Intrinsic factor）の分泌が低下すると、骨髄において赤血球の成熟障害が起こり、DNA合成障害に起因するどのような貧血を引き起こすか。", options: ["再生不良性貧血", "悪性貧血（巨赤芽球性貧血）", "鉄欠乏性貧血", "溶血性貧血"], answer: 1, explanation: "内因子の欠乏やビタミンB12の吸収不全は、骨髄でのDNA合成障害を引き起こし、赤芽球の成熟が停止して巨大な赤血球が形成される「悪性貧血（巨赤芽球性貧血）」を誘発します。" },


        // ==================== 2023年度抜粋 ====================
        { id: "2023-1", year: "2023", num: 1, text: "自律神経系において、交感神経が優位に働いたときに起こる身体の反応として正しいのはどれか。", options: ["瞳孔の縮小", "心拍数の増加", "胃腸 of 運動促進", "気管支の収縮"], answer: 1, explanation: "交感神経優位時は、闘争に適した状態にするため心拍数の増加、気管支の拡張、瞳孔散大（瞳孔の拡大）が生じ、非緊急用の胃腸活動は抑制されます。" },
        { id: "2023-2", year: "2023", num: 2, text: "生薬カンゾウ（甘草）の基原植物の分類科として正しいのはどれか。", options: ["マメ科", "ナス科", "クスノキ科", "ボタン科"], answer: 0, explanation: "甘草（カンゾウ）の基原植物はGlycyrrhiza属であり、「マメ科」に分類されます。" },
        { id: "2023-3", year: "2023", num: 3, text: "ヒトの血清中に最も多く存在し、胎盤を通過して新生児に移行（受動免疫）できる抗体のクラスはどれか。", options: ["IgA", "IgE", "IgG", "IgM"], answer: 2, explanation: "血中抗体の8割を占める「IgG」は、抗体クラスの中で唯一能動輸送により「胎盤を通過できる」極めて重要な特徴を持ちます。" },
        { id: "2023-4", year: "2023", num: 12, text: "局方における製剤総則の注射剤の項目において、溶解用希釈剤として用いられる『注射用水』の純度基準として、特に不揮発性不純物とともに規制されている物質クラスはどれか。", options: ["残留農薬", "重金属イオン", "炭酸ガス", "エンドトキシン"], answer: 3, explanation: "注射用水では、発熱性物質である「エンドトキシン（パイロジェン）」の混入基準が極めて厳しく制限されています。" },
        { id: "2023-5", year: "2023", num: 18, text: "生薬シャクヤク（芍薬）の主要な配糖体成分であり、鎮痛・鎮痙作用を示すモノテルペン配糖体はどれか。", options: ["ペオニフロリン", "リクイリチン", "グリシルリジン", "センノシド"], answer: 0, explanation: "シャクヤク（ボタン科）の主成分はモノテルペン骨格を持つ「ペオニフロリン」であり、平滑筋のけいれんを和らげる効果（鎮痙鎮痛）を現します。" },
        { id: "2023-6", year: "2023", num: 25, text: "生薬マオウ（麻黄）の基原植物の科名および主成分アルカロイドの組み合わせとして、正しいのはどれか。", options: ["マオウ科 / エフェドリン", "ナス科 / アトロピン", "キンポウゲ科 / ベルベリン", "マメ科 / グリシルリジン"], answer: 0, explanation: "マオウ（マオウ科 Ephedraceae）は、交感神経興奮（気管支拡張等）を誘発するアルカロイド「エフェドリン」を多く含みます。" },
        { id: "2023-7", year: "2023", num: 33, text: "日本薬局方一般試験法において、液体試料が一定の偏光面を回転させる性質（旋光性）の度合いを表すために定義されている『比旋光度』の算出式に用いられる測定セルの長さ（層長）の標準単位はどれか。", options: ["1 mm", "1 cm", "10 cm (1 dm)", "100 mm"], answer: 2, explanation: "比旋光度の定義式において、層長（l）の単位は「100 mm（すなわち 1 dm = 1分米）」が標準として用いられます。" },
        { id: "2023-8", year: "2023", num: 45, text: "高速液体クロマトグラフィー（HPLC）において、分配比を一定に維持しつつ保持時間を短縮するために、移動相の有機溶媒比率（極性比）を時間経過とともに連続的に変化させる手法を何というか。", options: ["アイソクラティック溶出", "グラジエント溶出", "に向流分配溶出", "サイズ排除溶出"], answer: 1, explanation: "移動相の組成を測定時間内で連続して変化させる溶出法は「グラジエント（勾配）溶出法」と呼びます。" },


        // ==================== 2022年度抜粋 ====================
        { id: "2022-1", year: "2022", num: 77, text: "三胚葉の発生過程において、大腸の内壁上皮や消化腺（肝臓・膵臓など）の起源となる胚葉はどれか。", options: ["内胚葉", "外胚葉", "中胚葉"], answer: 0, explanation: "「内胚葉」は主に呼吸器や、大腸を含む消化管内壁の粘膜上皮、そこから分岐発展する肝臓や膵臓などに分化します。" },
        { id: "2022-2", year: "2022", num: 79, text: "エイコサノイド（プロスタグランジンやロイコトリエン等）の生合成における直接の共通前駆体となる多価不飽和脂肪酸はどれか。", options: ["アラキドン酸", "L-チロシン", "コリン", "L-トリプトファン", "L-ヒスチジン"], answer: 0, explanation: "アラキドン酸（20:4, n-6）は、ホスホリパーゼA2の働きによって細胞膜から切り出され、シクロオキシゲナーゼ（COX）等によってプロスタグランジンなどの各種エイコサノイドへと生合成されます。" },
        { id: "2022-3", year: "2022", num: 80, text: "真菌（カビ・酵母）に関する記述のうち、正しいのはどれか。", options: ["ミトコンドリアをもつ。", "コレステロールを含む細胞膜をもつ。", "葉緑体をもつ。", "細胞壁をもたない。", "70S リボソームをもつ。"], answer: 0, explanation: "真菌は真核生物（Eukaryote）であるため、膜結合型の細胞小器官である「ミトコンドリア」をしっかりと保有しています。（細胞膜にはコレステロールではなくエルゴステロール、リボソームは80S型です）" },
        { id: "2022-4", year: "2022", num: 81, text: "女性の月経周期において、排卵直前に分泌量が急激に増加してピークに達し、排卵の開始を直接誘発（サージ）するホルモンはどれか。", options: ["黄体形成ホルモン(LH)", "オキシトシン", "プロラクチン", "ヒト絨毛性性腺刺激ホルモン(hCG)", "プロゲステロン"], answer: 0, explanation: "視床下部・下垂体から分泌される「黄体形成ホルモン（LH）」が一時的に大量放出される現象（LHサージ）が排卵を直接決定づけます。" },
        { id: "2022-5", year: "2022", num: 15, text: "日本薬局方の純度試験において、対象不純物として『重金属』を検査する際、硫化ナトリウム試液を用いて生じる色変化の対比として規定されている、特定の重金属イオンを含む「標準液」はどれか。", options: ["鉛標準液", "銅標準液", "水銀標準液", "ヒ素標準液"], answer: 0, explanation: "重金属試験法では不純物の量を鉛（Pb）に換算して表現するため、基準となる対比溶液には「鉛標準液」を使用します。" },
        { id: "2022-6", year: "2022", num: 28, text: "赤外吸収スペクトル測定法（IR）において、分子内の官能基特有の変角振動や伸縮振動を励起する電磁波の波長領域（約2.5〜25μm）を波数（cm⁻¹）で表した際、最も一般的な測定測定範囲はどれか。", options: ["4000〜400 cm⁻¹", "40000〜4000 cm⁻¹", "400〜40 cm⁻¹", "400000〜40000 cm⁻¹"], answer: 0, explanation: "赤外スペクトルでは通常「4000 cm⁻¹ から 400 cm⁻¹」までの赤外光波数を一般測定範囲として、化合物の構造情報を取得します。" },


        // ==================== 2021年度抜粋 ====================
        { id: "2021-1", year: "2021", num: 79, text: "主たる発症機序がⅡ型アレルギー（細胞障害型アレルギー）に分類される疾患はどれか。", options: ["スギ花粉症", "アトピー性皮膚炎", "薬剤性溶血性貧血", "接触性皮膚炎", "糸球体腎炎"], answer: 2, explanation: "自己の細胞に結合した薬物等への抗体反応により、補体・食細胞が自細胞を破壊する「薬剤性溶血性貧血」は代表的なⅡ型アレルギーです。(花粉症・アトピーはⅠ型、かぶれはⅣ型)" },
        { id: "2021-2", year: "2021", num: 80, text: "マイコプラズマに関する記述のうち、正しいのはどれか。", options: ["原核生物である。", "一般細菌より大型である。", "細胞壁をもつ。", "人工培地では増殖しない。", "病原性は知られていない。"], answer: 0, explanation: "マイコプラズマは「原核生物（原核細胞）」ですが、ペプチドグリカン細胞壁を「一切持たない」という際立った分類上の特殊性を持っています。" },
        { id: "2021-3", year: "2021", num: 12, text: "日本薬局方の保存温度定義において、『標準温度』は何度を意味するか。", options: ["15℃", "20℃", "25℃", "1〜30℃"], answer: 1, explanation: "日本薬局方通則に基づき、標準温度は厳密に「20℃」と定義づけられています。" },
        { id: "2021-4", year: "2021", num: 24, text: "pH測定法において、pH値を決定する基礎となる『ガラス電極pHメーター』が検出する物理量は、溶液中の水素イオン活性に依存した何の変化か。", options: ["電気抵抗", "起電力（電位差）", "光透過率", "導電率"], answer: 1, explanation: "ガラス膜を介した内外液の水素イオン濃度差によって発生する「起電力（電位差）」の変化を検出し、ネルンストの式に基づいてpH値を算出します。" }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let mode = 'normal'; // 'normal' or 'random'
    let selectedYear = '2025';
    let bookmarks = [];

    // Initialize Application
    window.onload = function() {
        // Load settings & bookmarks from local storage
        if(localStorage.getItem('pharm_bookmarks')) {
            bookmarks = JSON.parse(localStorage.getItem('pharm_bookmarks'));
        }
        
        filterQuestionsByYear(selectedYear);
        updateStatsUI();
        renderBookmarkList();
    };

    function filterQuestionsByYear(year) {
        selectedYear = year;
        if (year === 'all') {
            currentQuestions = [...masterQuestions];
        } else {
            currentQuestions = masterQuestions.filter(q => q.year === year);
        }
        
        // Sort: Newer year first, then numerical order
        currentQuestions.sort((a, b) => {
            if (a.year !== b.year) return parseInt(b.year) - parseInt(a.year);
            return a.num - b.num;
        });

        if (mode === 'random') {
            shuffleArray(currentQuestions);
        }

        currentIdx = 0;
        loadQuestion(currentIdx);
        renderNavigationGrid();
        updateProgressUI();
    }

    function setMode(newMode) {
        mode = newMode;
        // Update selection UI buttons
        document.getElementById('btn-mode-normal').className = newMode === 'normal' 
            ? "flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition"
            : "flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition";
            
        document.getElementById('btn-mode-random').className = newMode === 'random'
            ? "flex items-center justify-between p-3 rounded-xl border-2 border-teal-500 bg-teal-50/50 text-left transition"
            : "flex items-center justify-between p-3 rounded-xl border border-slate-200 text-left hover:bg-slate-50 transition";

        // Refresh filter
        filterQuestionsByYear(selectedYear);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Load active question data into HTML rendering fields
    function loadQuestion(idx) {
        if (currentQuestions.length === 0) return;
        const q = currentQuestions[idx];
        
        document.getElementById('badge-year').innerText = q.year + "年度";
        document.getElementById('badge-num').innerText = "問 " + q.num;
        document.getElementById('problem-text').innerText = q.text;

        // Reset bookmark star state
        const isBookmarked = bookmarks.includes(q.id);
        document.getElementById('btn-star').className = isBookmarked 
            ? "text-amber-400 hover:text-amber-500 transition" 
            : "text-slate-300 hover:text-amber-400 transition";

        // Configure Image Display
        const imgWrap = document.getElementById('image-wrap');
        const imgEl = document.getElementById('problem-img');
        const errorText = document.getElementById('image-error-text');

        if (q.image) {
            imgWrap.classList.remove('hidden');
            imgEl.src = encodeURI(q.image);
            imgEl.classList.add('hidden'); // hidden until loaded
            errorText.classList.remove('hidden');
            errorText.innerText = "画像をロード中...";
        } else {
            imgWrap.classList.add('hidden');
            imgEl.src = "";
        }

        // Generate Option Choices
        const optionsWrap = document.getElementById('options-wrap');
        optionsWrap.innerHTML = "";
        
        q.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:border-slate-300 hover:bg-slate-50 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            btn.onclick = () => submitAnswer(oIdx);
            btn.innerHTML = `
                <span class="bg-slate-100 text-slate-700 w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs">${oIdx + 1}</span>
                <span class="text-slate-800 leading-relaxed">${opt}</span>
            `;
            optionsWrap.appendChild(btn);
        });

        // Hide Correction panel and reset reveal button text
        document.getElementById('correction-box').classList.add('hidden');
        document.getElementById('btn-reveal').innerText = "正解・解説を見る";

        // Highlight active navigation button
        updateNavigationHighlight(idx);
        updateProgressUI();
    }

    // Handle missing/unsupported image loading gracefully
    function handleImageError() {
        const errorText = document.getElementById('image-error-text');
        const imgEl = document.getElementById('problem-img');
        imgEl.classList.add('hidden'); // Hide empty image frame
        errorText.classList.remove('hidden');

        const activeQ = currentQuestions[currentIdx];
        if (activeQ && activeQ.image) {
            // Environment checking logic
            const isGithubPages = window.location.hostname.includes('github.io');
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';

            if (isGithubPages || isLocal) {
                // Actual Web deployment or offline development error output
                errorText.innerHTML = `
                    <div class="text-center p-3 text-rose-500 font-bold text-xs bg-rose-50 border border-rose-200 rounded-xl max-w-md mx-auto">
                        画像ファイル「${activeQ.image}」がロードできませんでした。<br>
                        <span class="text-[10px] text-slate-500 font-normal block mt-1.5 text-left leading-relaxed">
                            【確認事項】<br>
                            1. GitHubリポジトリの<b>「index.htmlと同じフォルダ（ルート）」</b>に画像ファイルを直接アップロードしてください（フォルダの中に入れないでください）。<br>
                            2. アップロードした画像ファイルの英大文字・小文字、半角スペース等が「<b>${activeQ.image}</b>」と完全に一致しているか確認してください。
                        </span>
                    </div>
                `;
            } else {
                // Iframe sandbox / AI preview system
                errorText.innerHTML = `
                    <div class="text-center p-2">
                        <p class="text-indigo-600 font-bold text-sm">[ ${activeQ.image} ]</p>
                        <p class="text-[11px] text-slate-500 mt-1">※プレビュー環境のため、図表は上記の該当PDF資料（問${activeQ.num}）を併せてご参照ください。</p>
                    </div>
                `;
            }
        }
    }

    // Image onLoad success trigger
    document.getElementById('problem-img').onload = function() {
        document.getElementById('problem-img').classList.remove('hidden');
        document.getElementById('image-error-text').classList.add('hidden');
    };

    function submitAnswer(chosenIdx) {
        const q = currentQuestions[currentIdx];
        const isCorrect = (chosenIdx === q.answer);
        
        // Log answer history
        saveAnswerRecord(q.id, isCorrect);
        
        revealAnswer(isCorrect, chosenIdx);
        updateStatsUI();
    }

    function revealAnswer(forcedCorrectState = null, chosenIdx = null) {
        const q = currentQuestions[currentIdx];
        const correctionBox = document.getElementById('correction-box');
        const cIcon = document.getElementById('correction-icon');
        const cStatus = document.getElementById('correction-status');
        const cDesc = document.getElementById('correction-desc');

        correctionBox.classList.remove('hidden');

        let isCorrect = forcedCorrectState;
        if (isCorrect === null) {
            isCorrect = true; // Default view as correct representation
        }

        if (chosenIdx !== null) {
            if (isCorrect) {
                correctionBox.className = "mt-6 p-5 rounded-2xl bg-emerald-50 border border-emerald-200 text-emerald-900";
                cIcon.innerText = "✓";
                cStatus.innerText = "正解";
                cDesc.innerHTML = `<span class="font-bold">あなたの選んだ選択肢: ${chosenIdx + 1}</span><br><br>${q.explanation}`;
            } else {
                correctionBox.className = "mt-6 p-5 rounded-2xl bg-rose-50 border border-rose-200 text-rose-900";
                cIcon.innerText = "✗";
                cStatus.innerText = "不正解";
                cDesc.innerHTML = `<span class="font-bold">正解は： 選択肢 ${q.answer + 1}</span><br><span class="text-xs text-rose-600 block mt-1">あなたの選んだ選択肢: ${chosenIdx + 1}</span><br>${q.explanation}`;
            }
        } else {
            // General "Reveal" click
            correctionBox.className = "mt-6 p-5 rounded-2xl bg-slate-100 border border-slate-200 text-slate-800";
            cIcon.innerText = "💡";
            cStatus.innerText = "正解提示";
            cDesc.innerHTML = `<span class="font-bold block mb-2 text-indigo-700">正解: 選択肢 ${q.answer + 1}</span>${q.explanation}`;
        }

        // Apply highlights on choice buttons
        const optionsWrap = document.getElementById('options-wrap');
        Array.from(optionsWrap.children).forEach((btn, idx) => {
            if (idx === q.answer) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50/30 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            } else if (chosenIdx !== null && idx === chosenIdx) {
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-50/30 font-bold text-sm sm:text-base flex items-start gap-3 transition shadow-sm";
            } else {
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 opacity-60 font-bold text-sm sm:text-base flex items-start gap-3 transition";
            }
        });

        document.getElementById('btn-reveal').innerText = "解説表示中";
    }

    function goToNext() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            loadQuestion(currentIdx);
        }
    }

    // Previous question navigability
    function goToPrev() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion(currentIdx);
        }
    }

    // Dynamic Navigation Grid Generator
    function renderNavigationGrid() {
        const grid = document.getElementById('grid-nav');
        grid.innerHTML = "";

        currentQuestions.forEach((q, idx) => {
            const btn = document.createElement('button');
            btn.id = "nav-btn-" + idx;
            btn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none";
            btn.innerText = q.num;
            
            // Check past performance of this question to color-code
            const records = getAnswerHistory();
            if (records[q.id] === true) {
                btn.className += " border-emerald-200 bg-emerald-50 text-emerald-700";
            } else if (records[q.id] === false) {
                btn.className += " border-rose-200 bg-rose-50 text-rose-700";
            } else {
                btn.className += " border-slate-200 bg-white text-slate-600 hover:bg-slate-50";
            }

            btn.onclick = () => {
                currentIdx = idx;
                loadQuestion(idx);
            };
            grid.appendChild(btn);
        });
    }

    function updateNavigationHighlight(activeIdx) {
        currentQuestions.forEach((_, idx) => {
            const btn = document.getElementById("nav-btn-" + idx);
            if (btn) {
                if (idx === activeIdx) {
                    btn.classList.add('ring-2', 'ring-indigo-500', 'scale-105', 'z-10');
                } else {
                    btn.classList.remove('ring-2', 'ring-indigo-500', 'scale-105', 'z-10');
                }
            }
        });
    }

    function updateProgressUI() {
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        const pct = ((currentIdx + 1) / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = pct + "%";
    }

    // Local Storage - Answer History persistence
    function getAnswerHistory() {
        return JSON.parse(localStorage.getItem('pharm_history') || '{}');
    }

    function saveAnswerRecord(questionId, isCorrect) {
        const history = getAnswerHistory();
        history[questionId] = isCorrect;
        localStorage.setItem('pharm_history', JSON.stringify(history));
        
        // Refresh individual nav button color without total rebuild
        const activeNavBtn = document.getElementById("nav-btn-" + currentIdx);
        if (activeNavBtn) {
            if (isCorrect) {
                activeNavBtn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none border-emerald-200 bg-emerald-50 text-emerald-700 ring-2 ring-indigo-500";
            } else {
                activeNavBtn.className = "py-2 text-xs font-bold rounded-lg border transition text-center focus:outline-none border-rose-200 bg-rose-50 text-rose-700 ring-2 ring-indigo-500";
            }
        }
    }

    function updateStatsUI() {
        const history = getAnswerHistory();
        let correctCount = 0;
        let wrongCount = 0;

        Object.values(history).forEach(val => {
            if (val === true) correctCount++;
            if (val === false) wrongCount++;
        });

        document.getElementById('stat-correct').innerText = correctCount;
        document.getElementById('stat-wrong').innerText = wrongCount;

        const totalAnswered = correctCount + wrongCount;
        const accuracyPct = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
        
        document.getElementById('header-accuracy').innerText = accuracyPct + "%";
    }

    function resetStats() {
        if (confirm("これまでの解答履歴を完全に削除してよろしいですか？")) {
            localStorage.removeItem('pharm_history');
            updateStatsUI();
            renderNavigationGrid();
            loadQuestion(currentIdx);
        }
    }

    // Bookmark Features
    function toggleBookmark() {
        const activeQ = currentQuestions[currentIdx];
        const bIdx = bookmarks.indexOf(activeQ.id);

        if (bIdx > -1) {
            bookmarks.splice(bIdx, 1);
        } else {
            bookmarks.push(activeQ.id);
        }

        localStorage.setItem('pharm_bookmarks', JSON.stringify(bookmarks));
        loadQuestion(currentIdx); // Toggle star graphic
        renderBookmarkList();
    }

    function renderBookmarkList() {
        const wrap = document.getElementById('bookmark-list');
        wrap.innerHTML = "";

        if (bookmarks.length === 0) {
            wrap.innerHTML = '<div class="text-center py-6 text-xs text-slate-400 font-bold italic">現在、お気に入り問題はありません。</div>';
            return;
        }

        bookmarks.forEach(bId => {
            const originQ = masterQuestions.find(q => q.id === bId);
            if (!originQ) return;

            const div = document.createElement('div');
            div.className = "py-2 px-3 hover:bg-slate-50 transition flex items-center justify-between text-xs sm:text-sm font-bold text-slate-700 cursor-pointer mb-1 border rounded-lg border-slate-100";
            div.innerHTML = `
                <div class="flex-grow flex items-center gap-2" onclick="loadSpecificQuestionByID('${originQ.id}')">
                    <span class="bg-indigo-50 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded">${originQ.year}年 問${originQ.num}</span>
                    <span class="truncate max-w-[200px] sm:max-w-md font-medium text-slate-600">${originQ.text}</span>
                </div>
                <button class="text-rose-400 hover:text-rose-600 px-1" onclick="removeBookmarkDirectly('${originQ.id}')">✕</button>
            `;
            wrap.appendChild(div);
        });
    }

    function loadSpecificQuestionByID(qId) {
        const targetQ = masterQuestions.find(q => q.id === qId);
        if (targetQ) {
            document.getElementById('global-year').value = targetQ.year;
            filterQuestionsByYear(targetQ.year);
            const listIdx = currentQuestions.findIndex(q => q.id === qId);
            if (listIdx > -1) {
                currentIdx = listIdx;
                loadQuestion(currentIdx);
            }
        }
    }

    function removeBookmarkDirectly(qId) {
        bookmarks = bookmarks.filter(id => id !== qId);
        localStorage.setItem('pharm_bookmarks', JSON.stringify(bookmarks));
        renderBookmarkList();
        if (currentQuestions[currentIdx] && currentQuestions[currentIdx].id === qId) {
            loadQuestion(currentIdx);
        }
    }
</script>

</body>
</html>
